<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOT TECHS — Proposal</title>
<script src="/vendor/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0B0F1A; --paper:#ffffff; --line:#e7e2d8; --slate:#2C3347; --gold:#C9A96E; --gold-d:#9c7f48;
         --muted:#7d8597; --green:#1f6b4f; --blue:#5B8DEF; --danger:#D9534F; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:#1c2230;
       background:radial-gradient(900px 480px at 50% -10%, rgba(201,169,110,.10), transparent 60%), #0a0e17;
       min-height:100vh;padding:30px 16px 120px;line-height:1.5;}
  .sheet{max-width:880px;margin:0 auto;background:var(--paper);border-radius:16px;overflow:hidden;
         box-shadow:0 30px 80px rgba(0,0,0,.5);}
  .top{background:linear-gradient(135deg,#1a2032,#0e131f);color:#fff;padding:30px 38px;border-bottom:4px solid var(--gold);}
  .brand{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  .brand h1{font-size:24px;letter-spacing:5px;font-weight:800;}
  .brand .tag{color:var(--gold);font-size:10.5px;letter-spacing:3px;text-transform:uppercase;margin-top:7px;}
  .pmeta{text-align:right;font-size:12.5px;color:#cfd5e2;}
  .pmeta .pnum{color:var(--gold-bright,#E0C384);font-weight:800;font-size:15px;letter-spacing:.5px;}
  .forwho{margin-top:22px;font-size:13px;color:#aeb6c6;}
  .forwho b{color:#fff;font-size:16px;font-weight:700;display:block;margin-top:3px;letter-spacing:.3px;}
  .banner{display:flex;align-items:center;gap:10px;padding:13px 38px;font-size:13.5px;font-weight:600;}
  .banner.ok{background:rgba(31,107,79,.12);color:#1f6b4f;border-bottom:1px solid var(--line);}
  .banner.info{background:rgba(91,141,239,.10);color:#3b62b8;border-bottom:1px solid var(--line);}
  .body{padding:26px 38px 32px;}
  .sec{margin-bottom:22px;}
  .sec h2{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);font-weight:800;
          padding-bottom:8px;border-bottom:2px solid var(--gold);margin-bottom:4px;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  td,th{padding:9px 6px;text-align:left;}
  th{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line);}
  tbody td{border-bottom:1px solid #f1ede4;}
  td.q,td.p,td.a,th.q,th.p,th.a{text-align:right;white-space:nowrap;}
  td.a{font-weight:700;color:#222;}
  .subtotal td{font-weight:700;color:var(--slate);border-bottom:0;padding-top:11px;}
  .totals{margin-top:8px;border-top:2px solid var(--ink);}
  .totals .row{display:flex;justify-content:space-between;padding:9px 6px;font-size:14px;}
  .totals .grand{background:var(--ink);color:#fff;border-radius:10px;padding:14px 16px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;}
  .totals .grand .v{color:var(--gold);font-size:22px;font-weight:800;}
  .terms{margin-top:22px;background:#faf8f3;border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
  .terms h3{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold-d);font-weight:800;margin-bottom:8px;}
  .terms .drow{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;}
  .terms .drow b{color:var(--slate);}
  .foot{padding:18px 38px;color:var(--muted);font-size:11px;border-top:1px solid var(--line);text-align:center;}
  /* sticky action bar */
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(11,15,26,.96);backdrop-filter:blur(8px);
       border-top:1px solid #2a3247;padding:13px 16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .bar .b{padding:13px 22px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;border:1px solid transparent;
          transition:.15s;display:inline-flex;align-items:center;gap:8px;}
  .bar .b:hover{transform:translateY(-1px);}
  .b.dl{background:linear-gradient(180deg,rgba(201,169,110,.16),rgba(201,169,110,.05));border-color:var(--gold-d);color:#E0C384;}
  .b.dl:hover{background:linear-gradient(180deg,#E0C384,var(--gold));color:var(--ink);}
  .b.sign{background:linear-gradient(180deg,#E0C384,var(--gold));color:var(--ink);box-shadow:0 4px 16px rgba(201,169,110,.35);}
  .b.pay{background:linear-gradient(180deg,#2a8c68,#1d6147);color:#fff;border-color:#2f9971;box-shadow:0 4px 16px rgba(31,107,79,.35);}
  .b:disabled{opacity:.45;cursor:default;transform:none;}
  /* modal */
  .ov{position:fixed;inset:0;z-index:40;background:rgba(5,8,14,.7);display:none;align-items:center;justify-content:center;padding:18px;}
  .ov.on{display:flex;}
  .modal{background:#fff;border-radius:16px;max-width:440px;width:100%;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.5);}
  .modal h3{font-size:18px;color:var(--slate);margin-bottom:4px;}
  .modal p{font-size:13px;color:var(--muted);margin-bottom:16px;}
  .fld{margin-bottom:14px;}
  .fld label{display:block;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:5px;}
  .fld input,.fld select{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:11px 13px;font-size:14px;outline:none;color:#1c2230;}
  .fld input:focus,.fld select:focus{border-color:var(--gold);}
  .sigprev{height:96px;border:1.5px solid var(--line);border-radius:10px;background:#fbfaf7;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  .sigprev .nm{font-family:'Dancing Script','Segoe Script','Brush Script MT',cursive;font-size:46px;color:#16233a;padding:0 16px;white-space:nowrap;line-height:1;}
  .sigprev .ph{position:absolute;font-size:13px;color:#b8b0a0;}
  .disc{display:flex;gap:11px;align-items:flex-start;background:#faf8f3;border:1px solid var(--line);border-radius:10px;padding:13px;margin:15px 0 4px;font-size:11.5px;color:#4a5263;line-height:1.5;cursor:pointer;}
  .disc input{margin-top:2px;width:18px;height:18px;flex:none;accent-color:var(--green);cursor:pointer;}
  /* signed block */
  .signedbox{margin-top:18px;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .signedbox .sh{background:#f1f8f4;color:#1f6b4f;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:9px 16px;border-bottom:1px solid var(--line);}
  .signedbox .sg{padding:16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .signedbox img{height:50px;max-width:260px;}
  .signedbox .sigtxt{font-family:'Dancing Script',cursive;font-size:40px;color:#16233a;}
  .signedbox .meta{font-size:12px;color:var(--muted);text-align:right;}
  .signedbox .meta b{color:#1c2230;display:block;font-size:13.5px;}
  /* documents */
  .docs h2{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);font-weight:800;padding-bottom:8px;border-bottom:2px solid var(--gold);margin-bottom:12px;}
  .docrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:#fff;}
  .docrow .di{width:34px;height:34px;border-radius:9px;background:#f3efe6;color:var(--gold-d);display:flex;align-items:center;justify-content:center;flex:none;}
  .docrow .dn{flex:1;min-width:0;font-size:13.5px;font-weight:600;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .docrow .dn small{display:block;font-weight:500;color:var(--muted);font-size:11px;}
  .docrow a{font-size:12px;font-weight:700;color:var(--gold-d);text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:7px 12px;white-space:nowrap;}
  .docrow a:hover{border-color:var(--gold);}
  .planwrap{margin:10px 0 4px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;}
  .planwrap iframe{width:100%;height:440px;border:0;display:block;background:#fff;}
  .svpanel{margin:14px 0 4px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fffdf8,#faf6ec);padding:16px 18px;}
  .svpanel .svhead{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--slate);}
  .svpanel .svhead svg{color:var(--gold-d);}
  .svpanel .svsub{font-size:13px;color:var(--muted);margin:6px 0 10px;line-height:1.5;}
  .svnotes{width:100%;box-sizing:border-box;min-height:78px;resize:vertical;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;font-size:13.5px;color:#222;background:#fff;}
  .svnotes:focus{outline:none;border-color:var(--gold);}
  .svact{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .svact button{font:inherit;font-size:13px;font-weight:800;border-radius:9px;padding:10px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .svsave{background:#fff;color:#5b6273;border:1px solid var(--line);}
  .svsave:hover{border-color:var(--gold);}
  .svapprove{background:linear-gradient(180deg,#2f9e58,#1f7e43);color:#fff;border:1px solid #1a6e3a;}
  .svapprove:hover{filter:brightness(1.05);}
  .svapprove svg{color:#fff;}
  .svstatus{font-size:12px;font-weight:700;margin-top:8px;min-height:14px;color:var(--muted);}
  .svstatus.ok{color:#1f7e43;} .svstatus.err{color:#c0392b;}
  .svpanel.approved{background:linear-gradient(180deg,#f1faf3,#e7f5ec);border-color:#bfe3cb;}
  .svpanel.approved .svhead{color:#1f7e43;} .svpanel.approved .svhead svg{color:#1f7e43;}
  .svmeta{font-size:13px;color:#3a5a47;margin-top:4px;}
  .svnotes-ro{margin-top:10px;} .svnotes-ro span{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);}
  .svnotes-ro p{margin:3px 0 0;font-size:13.5px;color:#222;white-space:pre-wrap;}
  .signline{border:2px dashed var(--gold);border-radius:12px;background:linear-gradient(180deg,#fffdf8,#faf6ec);padding:20px 22px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s;}
  .signline:hover{border-color:var(--gold-d);background:#f9f3e3;}
  .signline .tab{background:var(--gold);color:var(--ink);font-size:10.5px;font-weight:800;letter-spacing:1px;padding:6px 11px;border-radius:6px;text-transform:uppercase;flex:none;}
  .signline .lbl{font-size:15px;color:#5b6273;font-weight:600;}
  .signline .xx{font-family:'Dancing Script',cursive;font-size:32px;color:#ccc4b4;margin-left:auto;}
  .mact{display:flex;gap:10px;margin-top:6px;}
  .mact button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;border:1px solid transparent;}
  .mact .go{background:var(--ink);color:#fff;}
  .mact .go.green{background:var(--green);}
  .mact .cancel{background:#fff;border-color:var(--line);color:var(--muted);}
  .center{text-align:center;color:var(--muted);padding:80px 20px;}
  @media print{ body{background:#fff;padding:0;} .sheet{box-shadow:none;max-width:none;border-radius:0;} .bar{display:none;} }
</style>
</head>
<body>
<div id="root"><div class="center">Loading proposal…</div></div>

<div class="ov" id="signOv">
  <div class="modal">
    <h3>Adopt your signature</h3>
    <p>Type your full name — we'll create your signature.</p>
    <div class="fld"><label>Full name</label><input id="sigName" placeholder="First Last" autocomplete="name" autocapitalize="words"></div>
    <div class="fld"><label>Your signature</label><div class="sigprev"><span class="ph" id="sigPh">Type your name above</span><span class="nm" id="sigPrev"></span></div></div>
    <label class="disc"><input type="checkbox" id="discChk"><span>I agree that the name and signature above are the electronic representation of my signature, and that using them on this proposal is the legal equivalent of my handwritten signature. I consent to do business electronically.</span></label>
    <div class="mact"><button class="cancel" onclick="closeOv()">Cancel</button><button class="go" id="sigGo" disabled>Adopt &amp; Sign</button></div>
  </div>
</div>

<div class="ov" id="payOv">
  <div class="modal">
    <h3>Pay deposit</h3>
    <p id="payDesc">Mark your deposit as paid. We'll confirm it on our end.</p>
    <div class="fld"><label>How are you paying?</label>
      <select id="payMethod"><option>Zelle</option><option>Check</option><option>Cash</option><option>Card</option><option>Bank transfer</option><option>Other</option></select></div>
    <div class="mact"><button class="cancel" onclick="closeOv()">Cancel</button><button class="go green" id="payGo">I've paid the deposit</button></div>
  </div>
</div>

<script>
var TOKEN=(location.pathname.match(/\/p\/([A-Za-z0-9_-]+)/)||[])[1]||new URLSearchParams(location.search).get('token')||'';
var P=null;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function money(n){return '$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(s){try{var d=new Date((s+'').replace(' ','T'));return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch(e){return s;}}
function fmtDateTime(s){try{var d=new Date((s+'').replace(' ','T'));return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}catch(e){return s;}}
function depLabel(s){return s==='100'?'Paid in full to start':s==='50/30/20'?'50% deposit · 30% midpoint · 20% on completion':'50% deposit · 50% on completion';}

function signatureSection(){
  var s=P.signed;
  if(s){ var sig=s.signature?('<img src="'+s.signature+'" alt="signature">'):('<span class="sigtxt">'+esc(s.name||'')+'</span>');
    return '<div class="sec"><h2>Signature</h2><div class="signedbox"><div class="sh">'+ico('check')+' Electronically signed</div>'+
      '<div class="sg">'+sig+'<div class="meta"><b>'+esc(s.name||'')+'</b>Signed '+fmtDateTime(s.at)+'</div></div></div></div>'; }
  return '<div class="sec"><h2>Signature</h2><div class="signline" id="signLine"><span class="tab">Sign</span><span class="lbl">Click here to review &amp; sign</span><span class="xx">X</span></div></div>';
}
function documentsSection(){
  var docs=(P.documents||[]); if(!docs.length) return '';
  var plan=docs.filter(function(d){return d.kind==='floorplan' && /html/.test(d.mime||'');})[0];
  var planHtml=plan?'<div class="planwrap"><iframe src="/api/pub/proposal/'+TOKEN+'/doc/'+plan.id+'" title="Floor plan"></iframe></div>':'';
  var rows=docs.map(function(d){var u='/api/pub/proposal/'+TOKEN+'/doc/'+d.id;var sub=d.kind==='floorplan'?'Floor plan':(/pdf/.test(d.mime||'')?'PDF document':'Document');
    return '<div class="docrow"><div class="di">'+ico(d.kind==='floorplan'?'plan':'doc')+'</div><div class="dn">'+esc(d.name||'Document')+'<small>'+esc(sub)+'</small></div>'+
      '<a href="'+u+'" target="_blank" rel="noopener">View</a><a href="'+u+'?download=1">Download</a></div>';}).join('');
  return '<div class="sec docs"><h2>Documents &amp; Floor Plan</h2>'+planHtml+rows+surveyPanel()+'</div>';
}
function surveyPanel(){
  var sv=P.survey||{}; if(!sv.hasPlans) return '';
  if(sv.approvedAt){
    return '<div class="svpanel approved"><div class="svhead">'+ico('check')+' Floor plans approved</div>'+
      '<div class="svmeta">Approved by <b>'+esc(sv.approvedName||'you')+'</b> on '+fmtDateTime(sv.approvedAt)+'</div>'+
      (sv.notes?'<div class="svnotes-ro"><span>Your notes</span><p>'+esc(sv.notes)+'</p></div>':'')+'</div>';
  }
  return '<div class="svpanel"><div class="svhead">'+ico('plan')+' Review your floor plans</div>'+
    '<p class="svsub">Look over the camera &amp; device layout above. Add any notes for our team, then approve when it looks right.</p>'+
    '<textarea id="svNotes" class="svnotes" placeholder="Notes for the install team (optional) — e.g. move the entrance camera left, add coverage by the back door…">'+esc(sv.notes||'')+'</textarea>'+
    '<div class="svact"><button class="svsave" id="svSaveBtn" type="button">Save notes</button>'+
      '<button class="svapprove" id="svApproveBtn" type="button">'+ico('check')+' Approve floor plans</button></div>'+
    '<div class="svstatus" id="svStatus"></div></div>';
}

function render(){
  var c=P.customer, signed=P.signed, settled=P.depositSettled;
  var rows=P.sections.map(function(s){
    return '<div class="sec"><h2>'+esc(s.label)+'</h2><table><thead><tr><th>Item</th><th class="q">Qty</th><th class="p">Unit</th><th class="a">Amount</th></tr></thead><tbody>'+
      s.items.map(function(it){return '<tr><td>'+esc(it.desc)+'</td><td class="q">'+it.qty+'</td><td class="p">'+money(it.price)+'</td><td class="a">'+money(it.amount)+'</td></tr>';}).join('')+
      '<tr class="subtotal"><td colspan="3">Subtotal</td><td class="a">'+money(s.subtotal)+'</td></tr></tbody></table></div>';
  }).join('') || '<div class="center">This proposal has no line items yet.</div>';

  var html=''+
    '<div class="sheet"><div class="top"><div class="brand"><div><h1>IOT&nbsp;TECHS</h1><div class="tag">Security · Audio · Low-Voltage</div></div>'+
      '<div class="pmeta"><div class="pnum">Proposal '+esc(P.proposalNum||'')+'</div><div>'+fmtDate(P.viewedAt||new Date().toISOString())+'</div></div></div>'+
      '<div class="forwho">Prepared for<b>'+esc(c.business||c.name||'Customer')+'</b>'+(c.address?'<div style="color:#8b93a5;margin-top:2px">'+esc(c.address)+'</div>':'')+'</div></div>'+
    (signed?'<div class="banner ok">'+ico('check')+'Accepted &amp; signed by '+esc(signed.name||c.name||'')+' on '+fmtDateTime(signed.at)+'</div>':'')+
    (settled?'<div class="banner info">'+ico('check')+'Deposit received — thank you!</div>':'')+
    '<div class="body">'+rows+
      '<div class="totals"><div class="grand"><span>Project total</span><span class="v">'+money(P.total)+'</span></div></div>'+
      '<div class="terms"><h3>Payment terms</h3>'+
        '<div class="drow"><span>Schedule</span><b>'+depLabel(P.paymentStructure)+'</b></div>'+
        '<div class="drow"><span>Deposit to start</span><b>'+money(P.deposit.required)+'</b></div></div>'+
      documentsSection()+
      signatureSection()+
    '</div><div class="foot">IOT TECHS / La Vague Inc. · (646) 396-0775 · support@iot-techs.com · Viewed '+fmtDateTime(P.viewedAt||new Date().toISOString())+'</div></div>';
  document.getElementById('root').innerHTML=html;
  var sl=document.getElementById('signLine'); if(sl)sl.onclick=openSign;
  var sb=document.getElementById('svSaveBtn'); if(sb)sb.onclick=saveSurveyNotes;
  var ab=document.getElementById('svApproveBtn'); if(ab)ab.onclick=approveSurvey;

  var bar=document.createElement('div');bar.className='bar';
  bar.innerHTML='<button class="b dl" id="dlBtn">'+ico('dl')+'Download PDF</button>'+
    (signed?'':'<button class="b sign" id="signBtn">'+ico('pen')+'Accept &amp; Sign</button>')+
    ((signed&&!settled)?'<button class="b pay" id="payBtn">'+ico('card')+'Pay deposit '+money(P.deposit.required)+'</button>':'');
  document.body.appendChild(bar);
  document.getElementById('dlBtn').onclick=downloadPDF;
  if(document.getElementById('signBtn'))document.getElementById('signBtn').onclick=openSign;
  if(document.getElementById('payBtn'))document.getElementById('payBtn').onclick=openPay;
}
function ico(k){var p='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:2px">',e='</svg>';
  return {check:p+'<polyline points="20 6 9 17 4 12"/>'+e,dl:p+'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>'+e,
    pen:p+'<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>'+e,card:p+'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>'+e,
    plan:p+'<rect x="3" y="3" width="18" height="18" rx="1"/><path d="M3 9h18M9 9v12M15 3v6"/>'+e,
    doc:p+'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h8"/>'+e}[k];
}

/* ── Download PDF (jsPDF) ── */
function downloadPDF(){
  var JP=window.jspdf&&window.jspdf.jsPDF; if(!JP){alert('PDF unavailable');return;}
  var doc=new JP({orientation:'portrait',unit:'pt',format:'letter'});
  var PW=doc.internal.pageSize.getWidth(),PH=doc.internal.pageSize.getHeight(),M=44,y=0;
  doc.setFillColor(14,19,31);doc.rect(0,0,PW,86,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(20);doc.text('IOT TECHS',M,40);
  doc.setTextColor(201,169,110);doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text('SECURITY · AUDIO · LOW-VOLTAGE',M,56);
  doc.setTextColor(224,195,132);doc.setFont('helvetica','bold');doc.setFontSize(13);doc.text('Proposal '+(P.proposalNum||''),PW-M,40,{align:'right'});
  doc.setTextColor(70,70,70);doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.text('Prepared for: '+(P.customer.business||P.customer.name||'Customer'),M,112);
  y=140;
  P.sections.forEach(function(s){
    if(y>PH-90){doc.addPage();y=60;}
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(44,51,71);doc.text(s.label,M,y);
    doc.setDrawColor(201,169,110);doc.setLineWidth(1.4);doc.line(M,y+4,PW-M,y+4);y+=20;
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(50,50,50);
    s.items.forEach(function(it){ if(y>PH-50){doc.addPage();y=60;}
      doc.text(String(it.qty)+'  '+it.desc,M+4,y);doc.text(money(it.amount),PW-M,y,{align:'right'});y+=15;});
    doc.setFont('helvetica','bold');doc.text('Subtotal',M+4,y);doc.text(money(s.subtotal),PW-M,y,{align:'right'});y+=22;
  });
  if(y>PH-80){doc.addPage();y=60;}
  doc.setFillColor(11,15,26);doc.roundedRect(M,y,PW-M*2,38,6,6,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(12);doc.text('Project total',M+14,y+24);
  doc.setTextColor(201,169,110);doc.setFontSize(15);doc.text(money(P.total),PW-M-14,y+24,{align:'right'});y+=58;
  doc.setTextColor(90,90,90);doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.text('Payment: '+depLabel(P.paymentStructure)+'.  Deposit to start: '+money(P.deposit.required)+'.',M,y);
  if(P.signed){y+=18;doc.setTextColor(31,107,79);doc.setFont('helvetica','bold');doc.text('Accepted & signed by '+(P.signed.name||'')+' on '+fmtDate(P.signed.at),M,y);}
  doc.save('IOT-Techs-Proposal-'+(P.proposalNum||'')+'.pdf');
}

/* ── Signature pad ── */
/* ── DocuSign-style adopt signature ── */
function titleCase(s){return (s||'').replace(/^\s+/,'').replace(/ {2,}/g,' ').replace(/[a-zA-Z]+/g,function(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();});}
function sigState(){
  var name=titleCase(document.getElementById('sigName').value);
  var disc=document.getElementById('discChk').checked;
  document.getElementById('sigName').value=name;
  document.getElementById('sigPrev').textContent=name;
  document.getElementById('sigPh').style.display=name?'none':'';
  document.getElementById('sigGo').disabled=!(name && disc);
}
function openSign(){
  document.getElementById('signOv').classList.add('on');
  var nm=document.getElementById('sigName'),ck=document.getElementById('discChk');
  nm.value='';document.getElementById('sigPrev').textContent='';document.getElementById('sigPh').style.display='';ck.checked=false;
  document.getElementById('sigGo').disabled=true;
  nm.oninput=sigState;ck.onchange=sigState;
  document.getElementById('sigGo').onclick=submitSign;
  setTimeout(function(){nm.focus();},40);
}
function renderScriptSig(name){
  var cv=document.createElement('canvas');cv.width=760;cv.height=200;
  var x=cv.getContext('2d');x.fillStyle='#13233f';x.textBaseline='middle';
  var fs=72;x.font="italic "+fs+"px 'Dancing Script', cursive";
  while(x.measureText(name).width>720 && fs>26){fs-=2;x.font="italic "+fs+"px 'Dancing Script', cursive";}
  x.fillText(name,16,108);
  return cv.toDataURL('image/png');
}
function submitSign(){
  var name=titleCase(document.getElementById('sigName').value).trim();
  if(!name){alert('Please enter your full name');return;}
  if(!document.getElementById('discChk').checked){alert('Please agree to the e-signature disclosure');return;}
  var go=document.getElementById('sigGo');go.disabled=true;go.textContent='Signing…';
  var fontReady=(document.fonts&&document.fonts.load)?document.fonts.load("italic 72px 'Dancing Script'"):Promise.resolve();
  Promise.resolve(fontReady).catch(function(){}).then(function(){
    var sig;try{sig=renderScriptSig(name);}catch(e){sig='';}
    return fetch('/api/pub/proposal/'+TOKEN+'/sign',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,signature:sig,disclosure:true})});
  }).then(function(r){return r.json();}).then(function(d){ if(d.ok){closeOv();load();} else {alert(d.error||'Could not sign');go.disabled=false;go.textContent='Adopt & Sign';} })
    .catch(function(){alert('Network error');go.disabled=false;go.textContent='Adopt & Sign';});
}

/* ── Site survey: notes + approve ── */
function svStatus(msg,ok){var s=document.getElementById('svStatus');if(s){s.textContent=msg;s.className='svstatus'+(ok===false?' err':ok?' ok':'');}}
function saveSurveyNotes(){
  var ta=document.getElementById('svNotes'); if(!ta)return;
  var btn=document.getElementById('svSaveBtn'); btn.disabled=true; var t=btn.textContent; btn.textContent='Saving…';
  fetch('/api/pub/proposal/'+TOKEN+'/survey-notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:ta.value})})
    .then(function(r){return r.json();}).then(function(d){ btn.disabled=false; btn.textContent=t; svStatus(d.ok?'Notes saved.':'Could not save notes.', d.ok); if(P.survey)P.survey.notes=ta.value; })
    .catch(function(){ btn.disabled=false; btn.textContent=t; svStatus('Network error.',false); });
}
function approveSurvey(){
  var ta=document.getElementById('svNotes'); var notes=ta?ta.value:'';
  var name=titleCase((P.signed&&P.signed.name)||(P.customer&&(P.customer.name||P.customer.business))||'').trim();
  if(!confirm('Approve these floor plans? This confirms the camera & device layout looks right.'))return;
  var btn=document.getElementById('svApproveBtn'); btn.disabled=true; btn.textContent='Approving…';
  fetch('/api/pub/proposal/'+TOKEN+'/survey-approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:notes,name:name})})
    .then(function(r){return r.json();}).then(function(d){ if(d.ok){load();} else {alert(d.error||'Could not approve');btn.disabled=false;btn.innerHTML=ico('check')+' Approve floor plans';} })
    .catch(function(){alert('Network error');btn.disabled=false;btn.innerHTML=ico('check')+' Approve floor plans';});
}

/* ── Pay deposit ── */
function openPay(){document.getElementById('payOv').classList.add('on');
  document.getElementById('payDesc').textContent='Mark your '+money(P.deposit.required)+' deposit as paid. We’ll confirm it on our end.';
  document.getElementById('payGo').onclick=submitPay;}
function submitPay(){var go=document.getElementById('payGo');go.disabled=true;go.textContent='Saving…';
  fetch('/api/pub/proposal/'+TOKEN+'/deposit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:document.getElementById('payMethod').value})})
    .then(function(r){return r.json();}).then(function(d){ if(d.ok){closeOv();alert('Thanks! Your deposit is marked as paid and pending our confirmation.');load();} else {alert(d.error||'Could not record');go.disabled=false;go.textContent="I've paid the deposit";} })
    .catch(function(){alert('Network error');go.disabled=false;go.textContent="I've paid the deposit";});
}
function closeOv(){document.querySelectorAll('.ov').forEach(function(o){o.classList.remove('on');});}
document.querySelectorAll('.ov').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)closeOv();});});

function load(){
  var bar=document.querySelector('.bar'); if(bar)bar.remove();
  fetch('/api/pub/proposal/'+TOKEN).then(function(r){ if(!r.ok)throw 0; return r.json(); }).then(function(d){ P=d; render(); })
    .catch(function(){ document.getElementById('root').innerHTML='<div class="center">This proposal link is invalid or has expired.</div>'; });
}
if(TOKEN)load(); else document.getElementById('root').innerHTML='<div class="center">No proposal token.</div>';
</script>
