<!DOCTYPE html>
<!--
  PROJECT LINK · Smart Access Gateway (prototype)
  Spec §03–06: ONE project URL, gated by LOGIN or PIN, loads the view for that role.
  Roles: AD Admin · MG Manager · SA Sales · TX Technician · CX Customer.
  Rules: LOGIN ALWAYS WINS over PIN · PINs map to VIEW TYPES (not accounts) ·
         Admin/Manager get a "View As" preview switcher · one record, role-filtered views.

  Standalone (no server): logins are simulated (you pick the role you'd be signed in as),
  PINs are demo codes shown on the gateway. Wire the gateway resolver to your real
  session + PIN table later — the routing logic is the part that matters.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project 1001 · IOT Techs</title>
<style>
  :root{ --ink:#0B0F1A; --slate:#1A1F2E; --slate2:#222838; --line:#333B50; --cream:#F4EFE6;
    --gold:#C9A96E; --gold-dim:#8A6A10; --muted:#8A93A8; --green:#7FA98C; --red:#D98E8E; --blue:#6CA0F0; }
  /* Light / Day mode — same layout, warm cream surfaces + dark ink text */
  /* Vault Auto Professional — toast.html palette: cream sheet, slate ink, gold accents */
  body.light{ --ink:#ECE5D8; --slate:#FFFFFF; --slate2:#FAF8F4; --line:#E2DDD3; --cream:#2C3347;
    --gold:#A6814A; --gold-dim:#8A6A10; --muted:#6B7280; --green:#13371F; --red:#8C2F2F; --blue:#3A6EA0;
    background:#ECE5D8; color:#2C3347; }
  body.light .topbar{ background:var(--ink); border-bottom:1px solid var(--line); }
  body.light .topbar .who{ color:#2C3347; }
  body.light .card h2{ color:var(--gold); }
  body.light .lc-label,body.light .li-group-h{ color:var(--gold); }
  body.light .topbar{ box-shadow:0 1px 0 rgba(0,0,0,.04); }
  body.light .card,body.light .tile,body.light .rrow,body.light .optcard{ box-shadow:0 1px 3px rgba(120,100,60,.07); }
  /* PIN error + shake */
  @keyframes pinshake{ 0%,100%{transform:translateX(0);} 18%,54%{transform:translateX(-7px);} 36%,72%{transform:translateX(7px);} }
  #pincode.shake{ animation:pinshake .42s; border-color:var(--red)!important; }
  #pin-err{ transition:color .15s; }
  #pin-err.show{ color:var(--red)!important; font-weight:700; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; min-height:100%; background:var(--ink); color:var(--cream);
    font-family:'Helvetica Neue',Helvetica,-apple-system,'Segoe UI',Arial,sans-serif; font-size:14px; }
  h1,h2,h3{ margin:0; font-weight:800; }
  button{ font-family:inherit; cursor:pointer; }
  input,select{ font-family:inherit; font-size:14px; background:var(--slate2); color:var(--cream); border:1px solid var(--line); border-radius:9px; padding:10px 12px; outline:none; }
  input:focus{ border-color:var(--gold); }
  .muted{ color:var(--muted); } .gold{ color:var(--gold); } .green{ color:var(--green); }
  .btn{ background:var(--slate2); border:1px solid var(--line); color:var(--cream); border-radius:10px; padding:10px 16px; font-size:13.5px; font-weight:700; display:inline-flex; align-items:center; gap:8px; }
  .btn:hover{ border-color:var(--gold); }
  .btn.gold{ background:var(--gold); color:var(--ink); border-color:var(--gold); }
  .btn.ghost{ background:transparent; } .btn.sm{ padding:6px 11px; font-size:12px; }
  .wrap{ max-width:920px; margin:0 auto; padding:20px; }
  .card{ background:var(--slate); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px; }
  .card h2{ font-size:12px; letter-spacing:1.6px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
  .pill{ display:inline-block; font-size:10px; font-weight:800; letter-spacing:.1em; border-radius:20px; padding:3px 10px; }
  .pill.gold{ background:var(--gold); color:var(--ink); } .pill.slate{ background:var(--slate2); color:var(--cream); border:1px solid var(--line); }

  /* ── Gateway ── */
  .gw{ max-width:430px; margin:7vh auto; padding:20px; }
  .gw .logo{ text-align:center; margin-bottom:22px; }
  .gw .logo h1{ font-size:26px; letter-spacing:.04em; }
  .gw .logo .t{ font-size:10px; letter-spacing:3px; color:var(--gold); margin-top:4px; }
  .gw .proj{ text-align:center; color:var(--muted); font-size:13px; margin-bottom:20px; }
  .gwtabs{ display:flex; background:var(--slate2); border:1px solid var(--line); border-radius:11px; padding:4px; margin-bottom:16px; }
  .gwtabs button{ flex:1; background:transparent; border:0; color:var(--muted); padding:9px; border-radius:8px; font-weight:800; }
  .gwtabs button.on{ background:var(--gold); color:var(--ink); }
  .gwpane{ display:none; } .gwpane.on{ display:block; }
  .gwpane input{ width:100%; margin-bottom:10px; }
  .pinrow{ display:flex; gap:8px; justify-content:center; margin-bottom:12px; }
  .pinrow input{ width:54px; height:60px; text-align:center; font-size:26px; font-weight:800; margin:0; }
  .demo{ margin-top:18px; font-size:11.5px; color:var(--muted); border-top:1px solid var(--line); padding-top:14px; }
  .demo b{ color:var(--cream); } .demo code{ color:var(--gold); }
  .rolebtns{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  /* ── Banner ── */
  .topbar{ display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--slate); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10; flex-wrap:wrap; }
  .topbar .who{ font-weight:800; } .topbar .spacer{ flex:1; }
  .viewas{ display:flex; align-items:center; gap:6px; }
  .preview-banner{ background:linear-gradient(90deg,rgba(201,169,110,.18),transparent); border:1px solid var(--gold); color:var(--gold); border-radius:10px; padding:8px 14px; margin-bottom:14px; font-weight:700; font-size:12.5px; }

  /* progress */
  .steps{ display:flex; gap:4px; flex-wrap:wrap; }
  .step{ flex:1; min-width:70px; text-align:center; }
  .step .dot{ height:6px; border-radius:4px; background:var(--line); margin-bottom:6px; }
  .step.done .dot{ background:var(--green); } .step.cur .dot{ background:var(--gold); }
  .step .lb{ font-size:10px; color:var(--muted); } .step.cur .lb{ color:var(--gold); font-weight:800; }
  /* lifecycle bar with inline forward/back icon controls */
  .lc-head{ display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .lc-label{ font-size:10px; letter-spacing:1.6px; color:var(--muted); }
  .lc-cur{ font-size:18px; font-weight:800; display:flex; align-items:center; gap:9px; margin-top:2px; }
  .lc-bucket{ font-size:9px; font-weight:800; letter-spacing:.1em; padding:3px 9px; border-radius:20px; }
  .b-OPEN{ background:rgba(108,160,240,.18); color:var(--blue); }
  .b-INPROGRESS{ background:rgba(201,169,110,.18); color:var(--gold); }
  .b-CLOSED{ background:rgba(127,169,140,.18); color:var(--green); }
  .lc-meta{ color:var(--muted); font-size:12px; font-weight:700; }
  .lc-nav{ display:flex; gap:8px; }
  .navbtn{ width:38px; height:38px; border-radius:50%; background:var(--slate2); border:1px solid var(--line); color:var(--cream); display:inline-flex; align-items:center; justify-content:center; }
  .navbtn:hover:not(:disabled){ border-color:var(--gold); color:var(--gold); }
  .navbtn.gold{ background:var(--gold); color:var(--ink); border-color:var(--gold); }
  .navbtn.gold:hover{ color:var(--ink); filter:brightness(1.05); }
  .navbtn:disabled{ opacity:.3; cursor:not-allowed; }
  .navbtn svg{ width:18px; height:18px; }
  .lc-track{ display:flex; gap:3px; }
  .lc-step{ flex:1; min-width:0; text-align:center; }
  .lc-step .seg{ display:block; height:5px; border-radius:3px; background:var(--line); margin-bottom:6px; transition:.15s; }
  .lc-step.done .seg{ background:var(--green); }
  .lc-step.cur .seg{ background:var(--gold); box-shadow:0 0 0 2px rgba(201,169,110,.25); }
  .lc-step .lb{ font-size:9px; line-height:1.2; color:var(--muted); display:block; }
  .lc-step.cur .lb{ color:var(--gold); font-weight:800; } .lc-step.done .lb{ color:var(--cream); }
  /* management dashboard tiles */
  .dash-head{ display:flex; align-items:baseline; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
  .dash-head h1{ font-size:22px; }
  .dash-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; }
  .tile{ background:var(--slate); border:1px solid var(--line); border-radius:16px; padding:18px; cursor:pointer; transition:.15s; display:flex; flex-direction:column; gap:8px; min-height:150px; }
  .tile:hover{ border-color:var(--gold); transform:translateY(-2px); }
  .tile .ti{ width:44px; height:44px; border-radius:12px; background:var(--slate2); display:flex; align-items:center; justify-content:center; color:var(--gold); }
  .tile .ti svg{ width:22px; height:22px; }
  .tile .tt{ font-weight:800; font-size:15px; } .tile .ts{ font-size:12px; color:var(--muted); }
  .tile .tstat{ margin-top:auto; font-size:13px; color:var(--gold); font-weight:800; }
  /* status segmented control + completed/cancelled buckets + terminal row */
  .b-COMPLETED{ background:rgba(127,169,140,.22); color:var(--green); }
  .b-CLOSED{ background:rgba(138,147,168,.22); color:var(--muted); }
  .b-CANCELLED{ background:rgba(217,142,142,.20); color:var(--red); }
  .statrow{ display:flex; gap:6px; margin:4px 0 14px; flex-wrap:wrap; }
  .statseg{ flex:1; min-width:96px; background:var(--slate2); border:1px solid var(--line); color:var(--muted); border-radius:9px; padding:9px 8px; font-weight:800; font-size:12px; letter-spacing:.02em; }
  .statseg.done{ color:var(--cream); border-color:var(--line); }
  .statseg.on{ color:var(--cream); border-width:1.5px; }
  .statseg.on.b-OPEN{ border-color:var(--blue); } .statseg.on.b-INPROGRESS{ border-color:var(--gold); }
  .statseg.on.b-COMPLETED{ border-color:var(--green); } .statseg.on.b-CLOSED{ border-color:var(--muted); } .statseg.on.b-CANCELLED{ border-color:var(--red); }
  .statseg:not([disabled]):hover{ border-color:var(--gold); color:var(--cream); }
  .term-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }
  .term-row .btn{ margin-left:auto; } .term-row .btn + .btn{ margin-left:0; }
  /* dashboard sub-screen tables/rows */
  .subhead{ display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .subhead h1{ font-size:21px; } .subhead .spacer{ flex:1; }
  .search{ width:100%; margin-bottom:14px; }
  .rows{ display:flex; flex-direction:column; gap:8px; }
  .rrow{ display:flex; align-items:center; gap:12px; background:var(--slate); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .rrow.click{ cursor:pointer; } .rrow.click:hover{ border-color:var(--gold); }
  .rrow .rtitle{ font-weight:800; } .rrow .rsub{ font-size:12px; color:var(--muted); }
  .rrow .rright{ margin-left:auto; text-align:right; }
  .rrow .ramt{ font-weight:800; color:var(--gold); }
  .sbadge{ font-size:10px; font-weight:800; letter-spacing:.05em; border-radius:20px; padding:3px 9px; background:var(--slate2); border:1px solid var(--line); }
  .sbadge.due{ color:var(--gold); border-color:rgba(201,169,110,.4); } .sbadge.overdue{ color:var(--red); border-color:rgba(217,142,142,.4); }
  .sbadge.paid{ color:var(--green); border-color:rgba(127,169,140,.4); }
  .calperson{ margin-bottom:12px; } .calperson .cpname{ font-weight:800; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .calev{ display:flex; gap:10px; font-size:12.5px; padding:5px 0; border-bottom:1px solid rgba(255,255,255,.05); }
  .calev .cd{ color:var(--gold); font-weight:800; width:38px; } .calev .ct{ color:var(--muted); width:56px; }
  /* multi-service tabs + proposal builder + stage panels */
  .svctabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; border-bottom:1px solid var(--line); }
  .svctab{ background:transparent; border:1px solid var(--line); border-bottom:0; color:var(--muted); border-radius:9px 9px 0 0; padding:8px 14px; font-weight:800; font-size:12.5px; position:relative; top:1px; }
  .svctab.on{ background:var(--slate2); color:var(--gold); border-color:var(--gold); }
  .svctab-x{ margin-left:9px; opacity:.5; font-size:11px; font-weight:700; }
  .svctab-x:hover{ opacity:1; color:var(--red); }
  .pill-pres{ background:#1c8a45; color:#fff; }   /* "Presented" — readable in both themes */
  .optedit{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.05); }
  .optedit .oname{ flex:1; } .optedit .oprice{ width:110px; text-align:right; }
  .optedit.sel .pill{ background:var(--gold); }
  .kv input{ width:100%; }
  .kvlink{ color:var(--gold); text-decoration:none; border-bottom:1px solid transparent; font-weight:700; }
  .kvlink:hover{ border-bottom-color:var(--gold); }
  .inq-svc{ margin-top:14px; padding:12px 14px; background:var(--slate2); border:1px solid var(--line); border-radius:12px; }
  /* proposal builder: option blocks + line-item tables */
  .optblock{ border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:12px; }
  .optblock.sel{ border-color:var(--gold); }
  .optblock-head{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .optblock-head .oname{ flex:1; font-weight:700; }
  .li-table{ width:100%; border-collapse:collapse; }
  .li-table th{ text-align:left; font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); padding:4px 5px; border-bottom:1px solid var(--line); }
  .li-table th.r,.li-table td.r{ text-align:right; }
  .li-table td{ padding:4px 5px; border-bottom:1px solid rgba(255,255,255,.05); }
  .li-table input{ width:100%; padding:6px 8px; font-size:12.5px; }
  .li-table input.qty{ width:58px; text-align:center; } .li-table input.price{ width:90px; text-align:right; }
  .li-table td.amt{ font-weight:700; white-space:nowrap; }
  .opttot{ text-align:right; font-size:13px; margin-top:8px; } .opttot b{ color:var(--gold); }
  /* Equipment / Labor groups in the builder */
  .li-group{ margin-top:10px; }
  .li-group-h{ display:flex; align-items:center; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold); font-weight:800; padding:6px 2px 3px; border-bottom:1px solid var(--line); }
  .li-add{ margin-top:6px; width:100%; font-size:12px; }
  /* customer: line items revealed under the selected option */
  .li-list{ margin:10px 0; border-top:1px solid var(--line); padding-top:8px; }
  .li-row{ display:flex; justify-content:space-between; gap:12px; font-size:12.5px; padding:4px 0; }
  .li-grouphdr{ font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:800; margin:10px 0 2px; }
  /* price-book portal modal */
  .pb-scrim{ position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto; }
  .pb-modal{ background:var(--slate); border:1px solid var(--line); border-radius:16px; max-width:660px; width:100%; padding:20px; box-shadow:0 30px 80px rgba(0,0,0,.5); }
  .pb-row{ display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.06); }
  .pb-row input{ padding:7px 9px; font-size:13px; }
  .link-row{ display:flex; gap:8px; margin-top:6px; }
  .link-row input{ flex:1; font-size:12.5px; color:var(--gold); }
  .logrow{ display:flex; gap:10px; padding:8px 0; border-bottom:1px solid rgba(127,127,127,.12); }
  .logdot{ width:8px; height:8px; border-radius:50%; background:var(--gold); margin-top:5px; flex:none; }
  .logtext{ font-size:13px; } .logmeta{ font-size:11px; color:var(--muted); margin-top:2px; }
  .cxstepinfo{ margin-top:12px; padding:12px 14px; background:var(--slate2); border:1px solid var(--line); border-radius:12px; }
  /* Dark "vault" proposal document (always dark, regardless of theme) */
  .vaultdoc{ background:#0B0F1A; border:1px solid #333B50; border-top:3px solid #C9A96E; border-radius:14px; padding:22px; color:#F4EFE6; margin-bottom:14px; box-shadow:0 24px 60px -34px rgba(0,0,0,.7); }
  .vaultdoc .vd-head{ display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid #333B50; padding-bottom:13px; margin-bottom:16px; }
  .vaultdoc .vd-brand{ font-weight:900; letter-spacing:3px; font-size:16px; color:#fff; }
  .vaultdoc .vd-sub{ color:#C9A96E; font-size:10.5px; letter-spacing:1.5px; margin-top:4px; text-transform:uppercase; }
  .vaultdoc .vd-no{ color:#C9A96E; font-weight:800; font-size:12.5px; }
  .vaultdoc .optcard{ background:#161b2a; border-color:#333B50; }
  .vaultdoc .optcard.sel{ border-color:#C9A96E; box-shadow:0 0 0 3px rgba(201,169,110,.16); }
  .vaultdoc .optcard .nm{ color:#F4EFE6; } .vaultdoc .optcard .pr{ color:#C9A96E; }
  .vaultdoc .li-row{ color:#cdd2dc; } .vaultdoc .li-grouphdr{ color:#8A93A8; }
  .vaultdoc .li-list{ border-top-color:#333B50; }
  .vaultdoc .muted{ color:#8A93A8; }
  .vaultdoc .btn.ghost{ background:transparent; color:#F4EFE6; border-color:#3a4258; }
  .vaultdoc .btn.gold{ background:linear-gradient(145deg,#C9A96E,#b08f4f); color:#0B0F1A; border-color:#C9A96E; }
  .vd-total{ text-align:right; font-size:14px; margin-top:14px; color:#cdd2dc; } .vd-total b{ color:#C9A96E; font-size:18px; }
  .vd-sign{ margin-top:22px; border-top:1px dashed #333B50; padding-top:16px; }
  .vd-sig-name{ font-family:'Brush Script MT','Segoe Script','Snell Roundhand',cursive; font-size:32px; line-height:1; color:#C9A96E; min-height:36px; }
  .vd-sig-line{ border-bottom:1.5px solid #C9A96E; margin:4px 0 0; }
  .vd-sig-meta{ font-size:11px; color:#8A93A8; margin-top:7px; }
  .step:hover .lb{ color:var(--gold); } .step.open .lb{ color:var(--gold); font-weight:800; }
  body.light .pb-modal{ box-shadow:0 30px 80px -30px rgba(14,19,32,.4); }
  .kvs{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
  .kv .k{ font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
  .kv .v{ font-size:15px; font-weight:700; }
  .optcards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
  .optcard{ background:var(--slate2); border:1.5px solid var(--line); border-radius:14px; padding:16px; }
  .optcard.sel{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,169,110,.14); }
  .optcard .nm{ font-weight:900; } .optcard .pr{ font-size:26px; font-weight:900; color:var(--gold); margin:6px 0; }
  .check{ display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.05); }
  .toggle{ width:40px; height:22px; border-radius:20px; background:var(--line); position:relative; flex:none; cursor:pointer; transition:.15s; }
  .toggle.on{ background:var(--green); } .toggle .k{ position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.15s; }
  .toggle.on .k{ left:20px; }
  .lock{ opacity:.5; pointer-events:none; }
  /* collapsible Access Settings header */
  .acc-head{ display:flex; align-items:center; gap:10px; cursor:pointer; color:var(--gold); }
  .acc-head h2{ margin:0; } .acc-head svg{ width:18px; height:18px; flex:none; }
  .acc-head .chev{ margin-left:auto; color:var(--muted); transition:transform .15s; }
  .acc-head .chev.open{ transform:rotate(180deg); }
  .acc-head:hover .chev{ color:var(--gold); }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  var $=function(s,r){ return (r||document).querySelector(s); };
  function money(n){ return '$'+(Math.round((+n||0)*100)/100).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function nowStr(){ var d=new Date(); return todayStr()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
  function last4(phone){ var d=String(phone||'').replace(/\D/g,''); return d.length>=4 ? d.slice(-4) : ''; }

  // ── Lifecycle: 5 top-level STATUSES; the detailed stages live as SUB-steps within ──
  var STATUSES={
    open:       { label:'Open',        cls:'b-OPEN',        subs:['Inquiry','Services & Survey','Mockup','Proposal','Approval','Deposit'] },
    inprogress: { label:'In Progress', cls:'b-INPROGRESS',  subs:['Work Order','Schedule','Install','Tech QC','Customer QC'] },
    completed:  { label:'Completed',   cls:'b-COMPLETED',   subs:['Payment','Completion'] },

  function openDemoProject(no){

      }
      else if(sub==='Services & Survey') h+=cxMsg('Scheduling your survey', P.appointment?('Your site survey is scheduled for '+P.appointment+'.'):'Your site survey appointment is being scheduled — we’ll confirm a time with you.');
      else h+=cxMsg('Designing your system', P.mockupUploaded?'Your coverage mockup is ready — review it in Documents below.':'We’re preparing your coverage mockup for you to review before the proposal.');
      h+=cxDocsCard();
      return h+'</div>';
    }
    // Proposal not yet submitted by the team → customer waits.
    if(!P.proposalSubmitted){
      h+=cxMsg('Proposal in progress','Your proposal is being prepared — we’ll notify you when it’s ready to review and sign.');
      h+=cxDocsCard();
      return h+'</div>';
    }
    // one proposal section per service — a dark "vault" document the customer signs at the bottom
    P.services.forEach(function(s){
      var sel=s.options.filter(function(o){return o.id===s.selected;})[0];
      h+='<div class="vaultdoc">'+
        '<div class="vd-head"><div><div class="vd-brand">IOT&nbsp;TECHS</div><div class="vd-sub">Proposal · '+esc(s.label)+'</div></div>'+
          '<div style="text-align:right;"><div class="vd-no">#'+esc(P.no)+'</div><div class="vd-sub">'+esc(P.business)+'</div></div></div>'+
        optionCards(s, a.allowSignature && !ro)+
        (sel?('<div class="vd-total">Total <b>'+money(optTotal(sel))+'</b> &middot; '+money(optDeposit(sel))+' deposit</div>'):'')+
        (a.allowSignature ? ('<div class="vd-sign">'+
          (s.signed
            ? '<div class="vd-sig-name">'+esc(s.signed.name)+'</div><div class="vd-sig-line"></div><div class="vd-sig-meta">✓ Accepted &amp; signed · Option '+esc(s.signed.opt)+' · '+money(optTotal(sel))+'</div>'
            : '<div class="vd-sig-name">&nbsp;</div><div class="vd-sig-line"></div><div class="vd-sig-meta">Authorized signature — sign to accept <b style="color:#C9A96E;">Option '+esc(s.selected)+'</b> at '+money(optTotal(sel))+'</div>'+
              '<button class="btn gold '+(ro?'lock':'')+'" data-csign="'+s.key+'" style="margin-top:14px;">Accept &amp; sign '+esc(s.label)+'</button>')+
        '</div>') : '')+
      '</div>';
    });
    // payments
    if(a.allowPayment){
      h+='<div class="card"><h2>Payments</h2>'+P.payments.map(function(p){ return '<div class="check"><div class="grow">'+esc(p.label)+'</div><b>'+money(p.amount)+'</b>'+
        (p.status==='Paid'?'<span class="pill gold">Paid</span>':'<button class="btn gold sm '+(ro?'lock':'')+'" data-pay="'+esc(p.label)+'">Pay '+money(p.amount)+'</button>')+'</div>'; }).join('')+'</div>';
    }
    // documents — collapsible, only what's available so far (hidden if none)
    h+=cxDocsCard();
    h+='</div>';
    return h;
  }

  // ───────────────────────── Render + wiring ─────────────────────────
  function render(){
    applyTheme();
    var v=activeView();
    if(!v){ screen='project'; renderGateway(); return; }
    if(screen==='dashboard'){ $('#app').innerHTML=renderDashboard(); wireShell(); wireDash(); return; }   // every role has a dashboard
    var html = v==='AD'||v==='MG' ? viewAdmin() : v==='SA' ? viewSales() : v==='TX' ? viewTech() : viewCustomer();
    $('#app').innerHTML=html;
    wireShell();
    var at=$('#acc-toggle'); if(at) at.onclick=function(){ accOpen=!accOpen; render(); };   // collapse is UI-only, works in preview too
    var ct=$('#cust-toggle'); if(ct) ct.onclick=function(){ custOpen=!custOpen; render(); };
    [].forEach.call(document.querySelectorAll('[data-panel]'),function(el){ el.onclick=function(){ var n=el.getAttribute('data-panel'); panelOpen[n]=!panelOpen[n]; render(); }; });
    // Customer progress: tap a step to expand its description; collapsible documents
    [].forEach.call(document.querySelectorAll('[data-cxstep]'),function(el){ el.onclick=function(){ var i=+el.getAttribute('data-cxstep'); cxStepInfo=(cxStepInfo===i?null:i); render(); }; });
    var cxd=$('#cxdocs-toggle'); if(cxd) cxd.onclick=function(){ cxDocsOpen=!cxDocsOpen; render(); };
    // Business / contact name → open the customer's profile (CRM, filtered to them)
    [].forEach.call(document.querySelectorAll('[data-custprofile]'),function(el){ el.onclick=function(e){ e.preventDefault(); var name=P.business||P.contact||'';
      screen='dashboard'; dashView='crm'; dashConfirm=''; crmSearch=name; render();
      var cs=$('#crmsearch'); if(cs){ cs.value=name; cs.oninput(); } }; });
    var ro = session && viewAs && viewAs!==session;     // preview is read-only
    if(ro) return;                                       // don't wire mutations in preview

    // Admin — lifecycle: forward/back through sub-steps, jump status, close/cancel/reopen (each logged)
    var fwd=$('#fwd'); if(fwd) fwd.onclick=function(){ stMove(1); logEvent('Advanced to '+curSubLabel()); render(); };
    var back=$('#back'); if(back) back.onclick=function(){ stMove(-1); logEvent('Moved back to '+curSubLabel()); render(); };
    [].forEach.call(document.querySelectorAll('[data-status]'),function(b){ b.onclick=function(){ var k=b.getAttribute('data-status'); setStatus(k); logEvent('Status set to '+STATUSES[k].label); render(); }; });
    var cp=$('#closeproj'); if(cp) cp.onclick=function(){ setStatus('closed'); logEvent('Project closed'); render(); };
    var xp=$('#cancelproj'); if(xp) xp.onclick=function(){ setStatus('cancelled'); logEvent('Project cancelled'); render(); };
    var ro2=$('#reopen'); if(ro2) ro2.onclick=function(){ setStatus('completed'); P.sub=STATUSES.completed.subs.length-1; logEvent('Project reopened'); render(); };
    var cxr=$('#cx-reopen'); if(cxr) cxr.onclick=function(){ P.reopenRequested=true; logEvent('Customer requested to reopen'); render(); };
    [].forEach.call(document.querySelectorAll('[data-acc]'),function(t){ t.onclick=function(){ var k=t.getAttribute('data-acc'); P.access[k]=!P.access[k]; render(); }; });
    var rg=$('#regen'); if(rg) rg.onclick=function(){ var old=pinForView('CX'); var n=String(Math.floor(1000+Math.random()*9000)); delete P.access.pins[old]; P.access.pins[n]='CX'; logEvent('Customer PIN regenerated'); render(); };
    var ce=$('#cxpin-edit'); if(ce){ ce.oninput=function(){ ce.value=ce.value.replace(/\D/g,''); }; ce.onchange=function(){ var nw=ce.value.replace(/\D/g,''), old=pinForView('CX'); if(!nw||nw===old){ ce.value=old; return; }
      if(P.access.pins[nw]&&P.access.pins[nw]!=='CX'){ alert('That PIN is already used by another role.'); ce.value=old; return; }
      delete P.access.pins[old]; P.access.pins[nw]='CX'; logEvent('Customer PIN changed to '+nw); render(); }; }
    var cl=$('#copy-link'); if(cl) cl.onclick=function(){ var i=$('#proj-link'); if(!i)return; i.select(); try{ navigator.clipboard.writeText(i.value); }catch(e){ try{document.execCommand('copy');}catch(_){} } cl.textContent='Copied!'; setTimeout(function(){ if($('#copy-link'))$('#copy-link').textContent='Copy'; },1400); };
    var an=$('#acc-next'); if(an) an.onclick=function(){ stMove(1); logEvent('Advanced to '+curSubLabel()); render(); };   // Submit & continue → next step
    // Project Log: add a manual note
    var la=$('#log-add'); if(la) la.onclick=function(){ var n=($('#log-note')||{}).value||''; if(!n.trim())return; logEvent('Note: '+n.trim()); render(); };
    // Stage flow: Inquiry → (schedule survey) → Services & Survey → (create project) → Proposal
    var ss=$('#sched-survey'); if(ss) ss.onclick=function(){ P.sub=STATUSES.open.subs.indexOf('Services & Survey'); logEvent('Moved to Services & Survey'); render(); };
    var ca=$('#create-appt'); if(ca) ca.onclick=function(){ var d=($('#appt-date')||{}).value||'', t=($('#appt-time')||{}).value||''; P.appointment=(d+' '+t).trim(); logEvent('Survey appointment scheduled — '+P.appointment); render(); };
    var cpj2=$('#createproj2'); if(cpj2) cpj2.onclick=function(){ if(!P.services.length){ alert('Select at least one service.'); return; } P.projectCreated=true; P.sub=STATUSES.open.subs.indexOf('Proposal'); logEvent('Project created — proposal started ('+P.services.map(function(s){return s.label;}).join(', ')+')'); render(); };
    [].forEach.call(document.querySelectorAll('[data-svcpick]'),function(el){ el.onclick=function(){ var k=el.getAttribute('data-svcpick');
      if(hasService(k)){ if(P.services.length<=1) return; P.services=P.services.filter(function(s){return s.key!==k;}); if(P.activeService===k)P.activeService=P.services[0].key; logEvent('Service removed: '+svcLabel(k)); }
      else { P.services.push(newService(k)); P.activeService=k; logEvent('Service added: '+svcLabel(k)); }
      render(); }; });
    // Service tabs (shared: admin builder, sales, tech)
    [].forEach.call(document.querySelectorAll('[data-stab]'),function(b){ b.onclick=function(){ P.activeService=b.getAttribute('data-stab'); render(); }; });
    [].forEach.call(document.querySelectorAll('[data-stabx]'),function(x){ x.onclick=function(e){ e.stopPropagation(); var k=x.getAttribute('data-stabx');
      if(P.services.length<=1) return;
      if(!confirm('Are you sure you want to close out and delete this service tab? This removes its proposal and work order.')) return;
      var lbl=(P.services.filter(function(s){return s.key===k;})[0]||{}).label||'service';
      P.services=P.services.filter(function(s){return s.key!==k;}); if(P.activeService===k)P.activeService=P.services[0].key; logEvent('Service tab deleted: '+lbl); render(); }; });
    // Add a service line from the proposal builder
    var as=$('#addsvc'); if(as) as.onchange=function(){ var k=as.value; if(!k||hasService(k))return; P.services.push(newService(k)); P.activeService=k; logEvent('Service added: '+svcLabel(k)); render(); };
    // Payments: open the Add-Payment form, add (with project pick if multiple), or cancel
    var apb=$('#add-pay-btn'); if(apb) apb.onclick=function(){ payForm=true; render(); };
    var pc2=$('#pay-cancel'); if(pc2) pc2.onclick=function(){ payForm=false; render(); };
    var pad=$('#pay-add'); if(pad) pad.onclick=function(){
      var label=($('#pay-label')||{}).value||'Deposit to start', amt=+(($('#pay-amt')||{}).value)||0, date=($('#pay-date')||{}).value||todayStr(),
          proj=$('#pay-proj')?$('#pay-proj').value:'';
      P.payments.push({label:label, amount:amt, date:date, project:proj||''});
      logEvent('Payment added: '+label+' '+money(amt)+(date?(' · '+date):''));
      payForm=false; render();
    };
    [].forEach.call(document.querySelectorAll('[data-paymark]'),function(b){ b.onclick=function(){ var p=P.payments[+b.getAttribute('data-paymark')]; if(p){ p.status='Paid'; p.date=p.date||todayStr(); logEvent('Payment recorded: '+p.label+' '+money(p.amount)); render(); } }; });
    // Proposal builder (admin + sales): option name, line items, add/remove option & line items, present
    function findOpt(key,id){ var s=P.services.filter(function(x){return x.key===key;})[0]; return s? s.options.filter(function(x){return x.id===id;})[0] : null; }
    [].forEach.call(document.querySelectorAll('[data-sopt]'),function(el){ el.oninput=function(){ var a=el.getAttribute('data-sopt').split(','), o=findOpt(a[0],a[1]); if(o&&a[2]==='name') o.name=el.value; }; });
    [].forEach.call(document.querySelectorAll('[data-li]'),function(el){
      el.oninput=function(){ var a=el.getAttribute('data-li').split(','), o=findOpt(a[0],a[1]); if(!o)return; var li=o.lineItems[+a[2]]; if(!li)return;
        if(a[3]==='desc') li.desc=el.value; else li[a[3]]=+el.value||0; };
      if(el.type==='number') el.onchange=function(){ render(); };   // refresh amounts + totals on blur
    });
    // Add a line item from the price book (or a blank line) into the Equipment/Labor group
    [].forEach.call(document.querySelectorAll('[data-addcat]'),function(sel){ sel.onchange=function(){ var a=sel.getAttribute('data-addcat').split(','), o=findOpt(a[0],a[1]), kind=a[2], v=sel.value; if(!o||!v)return;
      if(v==='__blank') o.lineItems.push({kind:kind,desc:'',qty:1,price:0});
      else { var p=v.split('|'); o.lineItems.push({kind:kind,desc:p[0],qty:1,price:+p[1]||0}); }
      render(); }; });
    [].forEach.call(document.querySelectorAll('[data-delli]'),function(b){ b.onclick=function(){ var a=b.getAttribute('data-delli').split(','), o=findOpt(a[0],a[1]); if(o){ o.lineItems.splice(+a[2],1); render(); } }; });
    [].forEach.call(document.querySelectorAll('[data-addopt]'),function(b){ b.onclick=function(){ var s=P.services.filter(function(x){return x.key===b.getAttribute('data-addopt');})[0]; if(!s||s.options.length>=3)return;
      var id=['A','B','C'][s.options.length], names={A:'Essential',B:'Recommended',C:'Premium'};
      // a new tier starts as a copy of the last option (keeps Equipment/Labor kinds) so you tweak instead of rebuild
      var base=s.options[s.options.length-1], items=base.lineItems.map(function(li){return {kind:li.kind||'equipment',desc:li.desc,qty:li.qty,price:li.price};});
      s.options.push(newOption(id,names[id],items)); render(); }; });
    [].forEach.call(document.querySelectorAll('[data-delopt]'),function(b){ b.onclick=function(){ var a=b.getAttribute('data-delopt').split(','), s=P.services.filter(function(x){return x.key===a[0];})[0]; if(!s||s.options.length<=1)return;
      s.options=s.options.filter(function(o){return o.id!==a[1];});
      // re-letter A/B/C and keep a valid presented option
      s.options.forEach(function(o,i){ o.id=['A','B','C'][i]; });
      if(!s.options.some(function(o){return o.id===s.selected;})) s.selected=s.options[0].id;
      render(); }; });
    [].forEach.call(document.querySelectorAll('[data-spresent]'),function(b){ b.onclick=function(){ var a=b.getAttribute('data-spresent').split(','), s=P.services.filter(function(x){return x.key===a[0];})[0]; if(s){ s.selected=a[1]; render(); } }; });
    // Price-book portal: open/close + edit prices, add/remove items, toggle defaults
    var pbo=$('#pb-open'); if(pbo) pbo.onclick=function(){ pbPortal=true; render(); };
    var pbc=$('#pb-close'); if(pbc) pbc.onclick=function(){ pbPortal=false; render(); };
    var pbs=$('#pb-scrim'); if(pbs) pbs.onclick=function(e){ if(e.target===pbs){ pbPortal=false; render(); } };
    [].forEach.call(document.querySelectorAll('[data-pb]'),function(el){ el.oninput=function(){ var a=el.getAttribute('data-pb').split(','), pb=pbFor(curService().key), it=pb[a[0]][+a[1]]; if(!it)return; if(a[2]==='desc') it.desc=el.value; else it.price=+el.value||0; }; });
    [].forEach.call(document.querySelectorAll('[data-pbdef]'),function(t){ t.onclick=function(){ var a=t.getAttribute('data-pbdef').split(','), pb=pbFor(curService().key), it=pb[a[0]][+a[1]]; if(it){ it.def=!it.def; render(); } }; });
    [].forEach.call(document.querySelectorAll('[data-pbdel]'),function(b){ b.onclick=function(){ var a=b.getAttribute('data-pbdel').split(','), pb=pbFor(curService().key); pb[a[0]].splice(+a[1],1); render(); }; });
    [].forEach.call(document.querySelectorAll('[data-pbadd]'),function(b){ b.onclick=function(){ var kind=b.getAttribute('data-pbadd'), pb=pbFor(curService().key); pb[kind].push({desc:'',price:0,def:false}); render(); }; });
    // Work Order builder: edit per-task tech pay, re-pull from proposal
    [].forEach.call(document.querySelectorAll('[data-wotask]'),function(el){ el.oninput=function(){ var a=el.getAttribute('data-wotask').split(','), s=P.services.filter(function(x){return x.key===a[0];})[0]; if(!s||!s.wo.tasks)return; var tk=s.wo.tasks[+a[1]]; if(tk)tk.pay=+el.value||0; }; if(el.type==='number') el.onchange=function(){ render(); }; });
    [].forEach.call(document.querySelectorAll('[data-worebuild]'),function(b){ b.onclick=function(){ var s=P.services.filter(function(x){return x.key===b.getAttribute('data-worebuild');})[0]; if(s){ buildWO(s); logEvent('Work order rebuilt from proposal: '+s.label); render(); } }; });
    // Technician pay-rate portal
    var tpo=$('#techpb-open'); if(tpo) tpo.onclick=function(){ techPbOpen=true; render(); };
    var tpc=$('#techpb-close'); if(tpc) tpc.onclick=function(){ techPbOpen=false; render(); };
    var tps=$('#techpb-scrim'); if(tps) tps.onclick=function(e){ if(e.target===tps){ techPbOpen=false; render(); } };
    [].forEach.call(document.querySelectorAll('[data-techpb]'),function(el){ el.oninput=function(){ TECH_PAYBOOK[el.getAttribute('data-techpb')]=+el.value||0; }; });
    [].forEach.call(document.querySelectorAll('[data-techpb-k]'),function(el){ el.onchange=function(){ var old=el.getAttribute('data-techpb-k'), nw=el.value.trim(); if(!nw||nw===old)return; if(TECH_PAYBOOK[nw]==null){ TECH_PAYBOOK[nw]=TECH_PAYBOOK[old]; delete TECH_PAYBOOK[old]; render(); } }; });
    [].forEach.call(document.querySelectorAll('[data-techpb-del]'),function(b){ b.onclick=function(){ delete TECH_PAYBOOK[b.getAttribute('data-techpb-del')]; render(); }; });
    var tpa=$('#techpb-add'); if(tpa) tpa.onclick=function(){ var n='New labor item',i=1; while(TECH_PAYBOOK[n]!=null){ n='New labor item '+(++i); } TECH_PAYBOOK[n]=0; render(); };
    // Tech checklist / QC (active service's work order)
    [].forEach.call(document.querySelectorAll('[data-chk]'),function(t){ t.onclick=function(){ var c=curService().wo.checklist[+t.getAttribute('data-chk')]; c.done=!c.done; render(); }; });
    var qc=$('#qc'); if(qc) qc.onclick=function(){ var s=curService(); s.wo.qc = s.wo.qc==='Passed'?'Pending':'Passed'; render(); };
    // Customer: choose option + sign PER service
    [].forEach.call(document.querySelectorAll('[data-pick]'),function(b){ b.onclick=function(){ var a=b.getAttribute('data-pick').split(','), s=P.services.filter(function(x){return x.key===a[0];})[0]; if(s){ s.selected=a[1]; render(); } }; });
    [].forEach.call(document.querySelectorAll('[data-csign]'),function(b){ b.onclick=function(){ var s=P.services.filter(function(x){return x.key===b.getAttribute('data-csign');})[0]; if(!s)return; var n=prompt('Type your full legal name to accept & sign '+s.label+':'); if(n&&n.trim()){
      s.signed={name:n.trim(),opt:s.selected,at:new Date().toISOString()}; logEvent('Customer signed '+s.label+' — Option '+s.selected+' by '+n.trim());
      // When every service is signed → advance to Approval and auto-request the deposit.
      if(P.services.every(function(x){return x.signed;})){
        if(STATUSES.open.subs[P.sub]==='Proposal'){ P.sub=STATUSES.open.subs.indexOf('Approval'); logEvent('All proposals signed — advanced to Approval'); }
        if(!P.payments.some(function(p){return p.deposit;})){ var dep=Math.round(presentedTotal()/2); P.payments.push({label:'Deposit to start', amount:dep, date:'', status:'Due', deposit:true}); logEvent('Deposit requested: '+money(dep)); }
      }
      render();
    } }; });
    // Inquiry availability (customer) · mockup upload + proposal submit (admin)
    var av=$('#cx-avail-submit'); if(av) av.onclick=function(){ var v=($('#cx-avail')||{}).value||''; if(!v.trim())return; P.availability=v.trim(); logEvent('Customer submitted availability'); render(); };
    var mu=$('#mockup-upload'); if(mu) mu.onclick=function(){ P.mockupUploaded=true; if(!P.documents.some(function(d){return d.name==='Coverage Mockup';})) P.documents.push({name:'Coverage Mockup', from:1}); logEvent('Mockup uploaded & shared with customer'); render(); };
    var psb=$('#proposal-submit'); if(psb) psb.onclick=function(){ P.proposalSubmitted=true; logEvent('Proposal submitted to customer'); render(); };
    var pus=$('#proposal-unsubmit'); if(pus) pus.onclick=function(){ P.proposalSubmitted=false; render(); };
    [].forEach.call(document.querySelectorAll('[data-pay]'),function(b){ b.onclick=function(){ var lbl=b.getAttribute('data-pay'); var p=P.payments.filter(function(x){return x.label===lbl;})[0]; if(p){ p.status='Paid'; p.date=p.date||todayStr(); logEvent('Customer paid: '+p.label+' '+money(p.amount)); render(); } }; });
  }

  window.ProjectLink={ get state(){return {session:session,pin:pinView,viewAs:viewAs,screen:screen,dashView:dashView,record:P};}, loginAs:function(r){session=r;pinView=null;viewAs=null;screen='project';dashView='home';render();}, enterPin:function(c){var v=P.access.pins[c];if(v){pinView=v;session=null;screen='project';dashView='home';render();return v;}return null;}, reset:function(){session=null;pinView=null;viewAs=null;screen='project';dashView='home';render();} };
  render();
})();
</script>
</body>
</html>
