<!DOCTYPE html>
<!--
  PROPOSAL TOOL v3  —  self-contained (no dependencies, no server required).
  Vault Dark · multi-service · Options A/B/C (view → select → sign → download).

  ADD IT LATER — three ways:
    1. Open/serve directly:  /proposal-v3.html
    2. Embed:  <iframe src="/proposal-v3.html" style="width:100%;height:900px;border:0"></iframe>
    3. Inline: copy the <style>, #pv-root markup, and <script>, then call ProposalV3.mount('pv-root').

  API (window.ProposalV3): serialize() -> JSON · restore(json) · setMode('build'|'present') · model
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proposal Tool · v3</title>
<style>
  :root{
    --ink:#0B0F1A; --slate:#1A1F2E; --slate2:#222838; --line:#333B50; --cream:#F4EFE6;
    --gold:#C9A96E; --gold-dim:#8A6A10; --muted:#8A93A8; --green:#7FA98C; --red:#D98E8E;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--ink); color:var(--cream);
    font-family:'Helvetica Neue',Helvetica,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; font-size:14px; }
  #pv-root{ max-width:1080px; margin:0 auto; padding:18px; }
  h1,h2,h3{ margin:0; font-weight:800; letter-spacing:.02em; }
  .row{ display:flex; gap:12px; flex-wrap:wrap; }
  .grow{ flex:1; min-width:0; }
  .muted{ color:var(--muted); }
  .gold{ color:var(--gold); }
  button{ font-family:inherit; cursor:pointer; }
  input,select,textarea{ font-family:inherit; font-size:13.5px; background:var(--slate2); color:var(--cream);
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; outline:none; }
  input:focus,select:focus,textarea:focus{ border-color:var(--gold); }
  .btn{ background:var(--slate2); border:1px solid var(--line); color:var(--cream); border-radius:9px;
    padding:9px 14px; font-size:13px; font-weight:700; display:inline-flex; align-items:center; gap:7px; }
  .btn:hover{ border-color:var(--gold); }
  .btn.gold{ background:var(--gold); color:var(--ink); border-color:var(--gold); }
  .btn.ghost{ background:transparent; }
  .btn.sm{ padding:5px 9px; font-size:12px; border-radius:7px; }
  .btn.danger:hover{ border-color:var(--red); color:var(--red); }

  /* header bar */
  .pv-top{ display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .brand h1{ font-size:20px; }
  .brand .tag{ font-size:10px; letter-spacing:2px; color:var(--gold); }
  .pv-top .spacer{ flex:1; }
  .modeswitch{ display:flex; background:var(--slate); border:1px solid var(--line); border-radius:10px; padding:3px; }
  .modeswitch button{ background:transparent; border:0; color:var(--muted); padding:7px 14px; border-radius:7px; font-weight:700; font-size:12.5px; }
  .modeswitch button.on{ background:var(--gold); color:var(--ink); }

  .card{ background:var(--slate); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; }
  .card h2{ font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
  .fields{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
  .fields label{ display:block; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .fields input{ width:100%; }

  /* option tabs */
  .opttabs{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  .opttab{ background:var(--slate2); border:1px solid var(--line); color:var(--cream); border-radius:10px 10px 0 0;
    padding:9px 16px; font-weight:800; font-size:13px; border-bottom:0; position:relative; top:1px; }
  .opttab.on{ background:var(--slate); border-color:var(--gold); color:var(--gold); }
  .opttab .x{ margin-left:8px; opacity:.6; }
  .opttab .x:hover{ opacity:1; color:var(--red); }

  /* service section */
  .svc{ border:1px solid var(--line); border-radius:12px; margin-bottom:12px; overflow:hidden; }
  .svc-head{ display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--slate2); }
  .svc-head .nm{ font-weight:800; font-size:14px; }
  .svc-head .sub{ margin-left:auto; font-weight:800; color:var(--gold); }
  .svc-body{ padding:6px 14px 12px; }
  table.items{ width:100%; border-collapse:collapse; }
  table.items th{ text-align:left; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); padding:6px 6px; border-bottom:1px solid var(--line); }
  table.items th.r,table.items td.r{ text-align:right; }
  table.items td{ padding:5px 6px; border-bottom:1px solid rgba(255,255,255,.05); }
  table.items input{ width:100%; padding:6px 8px; }
  table.items input.qty{ width:62px; text-align:center; }
  table.items input.price{ width:96px; text-align:right; }
  td.amt{ font-weight:700; white-space:nowrap; }
  .addrow{ display:flex; gap:8px; align-items:center; margin-top:8px; }
  .addrow select{ flex:1; }

  /* totals */
  .totals{ display:flex; gap:14px; flex-wrap:wrap; }
  .totals .tline{ display:flex; justify-content:space-between; gap:30px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.06); }
  .totals .grand{ font-size:20px; font-weight:900; color:var(--gold); border:0; }
  .totbox{ flex:1; min-width:240px; }
  .cfg{ flex:1; min-width:220px; }

  /* present mode — option cards */
  .present-head{ text-align:center; margin:6px 0 18px; }
  .present-head .big{ font-size:24px; font-weight:900; }
  .optcards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; }
  .optcard{ background:var(--slate); border:1.5px solid var(--line); border-radius:16px; padding:18px; display:flex; flex-direction:column; }
  .optcard.sel{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,169,110,.15); }
  .optcard .oname{ font-size:16px; font-weight:900; }
  .optcard .opill{ display:inline-block; font-size:10px; font-weight:800; letter-spacing:.1em; color:var(--ink); background:var(--gold); border-radius:20px; padding:2px 9px; margin-bottom:8px; width:max-content; }
  .optcard .oprice{ font-size:30px; font-weight:900; color:var(--gold); margin:6px 0; }
  .optcard ul{ list-style:none; padding:0; margin:8px 0 14px; }
  .optcard li{ font-size:12.5px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.05); display:flex; justify-content:space-between; gap:10px; }
  .optcard li .q{ color:var(--muted); }
  .optcard .pick{ margin-top:auto; }

  /* signature */
  .sign-wrap{ max-width:520px; margin:22px auto 0; text-align:center; }
  .sigline{ border:1.5px dashed var(--line); border-radius:12px; padding:18px; cursor:pointer; }
  .sigline:hover{ border-color:var(--gold); }
  .sigline .cursive{ font-family:'Brush Script MT','Segoe Script',cursive; font-size:34px; color:var(--gold); min-height:42px; }
  .signed-badge{ color:var(--green); font-weight:700; }

  @media print{
    body{ background:#fff; color:#111; }
    .no-print{ display:none !important; }
    .card,.optcard{ border-color:#ccc; background:#fff; color:#111; }
    .optcard.sel{ box-shadow:none; border:2px solid var(--gold-dim); }
    .oprice,.gold,.card h2{ color:var(--gold-dim) !important; }
  }
</style>
</head>
<body>
<div id="pv-root">
  <div class="pv-top no-print">
    <div class="brand"><h1>IOT&nbsp;TECHS</h1><div class="tag">PROPOSAL · v3</div></div>
    <div class="spacer"></div>
    <div class="modeswitch" id="pv-mode">
      <button data-m="build" class="on">Build</button>
      <button data-m="present">Present</button>
    </div>
    <button class="btn ghost sm" id="pv-save">Save JSON</button>
    <button class="btn ghost sm" id="pv-load">Load</button>
    <button class="btn gold sm" id="pv-print">Download PDF</button>
    <input type="file" id="pv-loadfile" accept="application/json,.json" hidden>
  </div>
  <div id="pv-view"></div>
</div>

<script>
(function(){
  // ── Catalog: starter line items per service (all prices editable) ──────────
  var CATALOG = {
    camera:{ label:'Security Cameras', items:[
      {desc:'4K Bullet Camera',price:185},{desc:'4K Dome Camera',price:175},{desc:'4K Turret Camera',price:175},
      {desc:'Cat6 Cable Drop',price:95},{desc:'Camera Mounting & Aiming',price:45},{desc:'Termination & Testing',price:25},
      {desc:'NVR (8-Channel)',price:650},{desc:'NVR (16-Channel)',price:1100},{desc:'4TB Storage Drive',price:160}]},
    sound:{ label:'Sound System', items:[
      {desc:'Ceiling Speaker',price:120},{desc:'Surface Speaker',price:135},{desc:'Speaker Wire Run',price:65},
      {desc:'Amplifier (4-zone)',price:480},{desc:'Volume Control',price:75},{desc:'Tuning & Setup',price:120}]},
    toast:{ label:'Toast POS', items:[
      {desc:'Toast Terminal',price:0},{desc:'Kitchen Display (KDS)',price:0},{desc:'Network Switch',price:140},
      {desc:'Router / Firewall',price:220},{desc:'Cabling & Setup',price:120}]},
    alarm:{ label:'Alarm System', items:[
      {desc:'Control Panel',price:320},{desc:'Door/Window Sensor',price:45},{desc:'Motion Sensor',price:65},
      {desc:'Glass-Break Sensor',price:70},{desc:'Keypad',price:110},{desc:'Smoke / CO Detector',price:85}]},
    access:{ label:'Access Control', items:[
      {desc:'Card Reader',price:260},{desc:'Electric Strike',price:180},{desc:'Door Controller',price:340},
      {desc:'REX / Exit Button',price:60},{desc:'Maglock',price:210}]},
    wiring:{ label:'Wiring / Low-Voltage', items:[
      {desc:'Cat6 Drop',price:95},{desc:'Conduit Run (per ft)',price:8},{desc:'Patch Panel',price:160},{desc:'Rack & Dress',price:240}]},
    custom:{ label:'Custom', items:[] }
  };
  var OPT_NAMES = ['Essential','Recommended','Premium'];
  var LETTERS = ['A','B','C'];

  // ── Model ──────────────────────────────────────────────────────────────────
  function blankItem(){ return { desc:'', qty:1, price:0 }; }
  function blankOption(i){ return { id:LETTERS[i], name:OPT_NAMES[i]||('Option '+LETTERS[i]), services:[] }; }
  var model = {
    customer:{ business:'', contact:'', email:'', phone:'', address:'', projectNo:'', date:'' },
    taxRate:0, depositPct:50,
    options:[ blankOption(0) ],
    selected:'A',
    signature:null   // {name, at}
  };
  var mode = 'build', activeOpt = 'A';
  var view, $=function(id){ return document.getElementById(id); };
  function money(n){ return '$'+(Math.round((+n||0)*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function opt(id){ return model.options.filter(function(o){return o.id===id;})[0]; }

  // ── Totals ─────────────────────────────────────────────────────────────────
  function svcSubtotal(svc){ return svc.items.reduce(function(s,it){ return s+(+it.qty||0)*(+it.price||0); },0); }
  function optSubtotal(o){ return o.services.reduce(function(s,svc){ return s+svcSubtotal(svc); },0); }
  function optTotals(o){
    var sub = optSubtotal(o);
    var tax = sub*(+model.taxRate||0)/100;
    var grand = sub+tax;
    var deposit = Math.round(grand*(+model.depositPct||0)/100*100)/100;
    return { sub:sub, tax:tax, grand:grand, deposit:deposit };
  }

  // ── Build view ──────────────────────────────────────────────────────────────
  function renderBuild(){
    var o = opt(activeOpt) || model.options[0]; activeOpt = o.id;
    var c = model.customer;
    var h = '';
    // customer card
    h += '<div class="card"><h2>Customer & Project</h2><div class="fields">'+
      fld('business','Business','customer.business',c.business)+
      fld('contact','Contact name','customer.contact',c.contact)+
      fld('email','Email','customer.email',c.email)+
      fld('phone','Phone','customer.phone',c.phone)+
      fld('address','Site address','customer.address',c.address)+
      fld('projectNo','Project #','customer.projectNo',c.projectNo)+
    '</div></div>';

    // option tabs
    h += '<div class="opttabs">';
    model.options.forEach(function(op){
      h += '<button class="opttab '+(op.id===activeOpt?'on':'')+'" data-opt="'+op.id+'">Option '+op.id+
           (model.options.length>1?'<span class="x" data-delopt="'+op.id+'">✕</span>':'')+'</button>';
    });
    if(model.options.length<3) h += '<button class="btn sm ghost" id="pv-addopt">+ Add option</button>';
    h += '<span class="muted" style="margin-left:8px;font-size:11.5px;">Options A/B/C let the customer compare & pick one</span>';
    h += '</div>';

    // active option editor
    h += '<div class="card">';
    h += '<div class="row" style="align-items:center;margin-bottom:10px;">'+
         '<label class="muted" style="font-size:11px;">OPTION NAME</label>'+
         '<input class="grow" data-model="optname" value="'+esc(o.name)+'" placeholder="e.g. Recommended" style="max-width:280px;">'+
         '</div>';
    if(!o.services.length) h += '<div class="muted" style="padding:8px 0;">No services yet — add one below.</div>';
    o.services.forEach(function(svc,si){
      h += '<div class="svc"><div class="svc-head"><span class="nm">'+esc(svc.label)+'</span>'+
           '<span class="sub">'+money(svcSubtotal(svc))+'</span>'+
           '<button class="btn sm danger ghost" data-delsvc="'+si+'" title="Remove service">✕</button></div>'+
           '<div class="svc-body"><table class="items"><thead><tr><th>Item</th><th class="r">Qty</th><th class="r">Unit</th><th class="r">Amount</th><th></th></tr></thead><tbody>';
      svc.items.forEach(function(it,ii){
        h += '<tr>'+
          '<td><input value="'+esc(it.desc)+'" data-it="'+si+','+ii+',desc" placeholder="Description"></td>'+
          '<td class="r"><input class="qty" type="number" min="0" value="'+(+it.qty||0)+'" data-it="'+si+','+ii+',qty"></td>'+
          '<td class="r"><input class="price" type="number" min="0" step="0.01" value="'+(+it.price||0)+'" data-it="'+si+','+ii+',price"></td>'+
          '<td class="r amt">'+money((+it.qty||0)*(+it.price||0))+'</td>'+
          '<td class="r"><button class="btn sm ghost danger" data-delit="'+si+','+ii+'">✕</button></td>'+
        '</tr>';
      });
      h += '</tbody></table>'+
           '<div class="addrow"><select data-additem="'+si+'"><option value="">+ Add item from '+esc(svc.label)+'…</option>'+
              (CATALOG[svc.key]?CATALOG[svc.key].items.map(function(ci){return '<option value="'+esc(ci.desc)+'|'+ci.price+'">'+esc(ci.desc)+' · '+money(ci.price)+'</option>';}).join(''):'')+
              '<option value="__blank">+ Blank line</option>'+
           '</select></div></div></div>';
    });
    // add service
    h += '<div class="addrow"><select id="pv-addsvc"><option value="">+ Add a service line…</option>'+
         Object.keys(CATALOG).map(function(k){return '<option value="'+k+'">'+esc(CATALOG[k].label)+'</option>';}).join('')+
         '</select></div>';
    h += '</div>';

    // totals + config
    var t = optTotals(o);
    h += '<div class="card"><h2>Totals · Option '+o.id+'</h2><div class="totals">'+
      '<div class="cfg">'+
        '<label class="muted" style="font-size:11px;">PAYMENT STRUCTURE / DEPOSIT %</label>'+
        '<div class="row" style="margin:6px 0 12px;">'+
          '<select data-model="depositPct" style="flex:1;">'+
            depOpt(50,'50% deposit')+depOpt(30,'30% deposit')+depOpt(100,'Paid in full (100%)')+depOpt(0,'No deposit')+
          '</select></div>'+
        '<label class="muted" style="font-size:11px;">TAX RATE %</label>'+
        '<div class="row" style="margin-top:6px;"><input type="number" min="0" step="0.001" value="'+(+model.taxRate||0)+'" data-model="taxRate" style="flex:1;"></div>'+
      '</div>'+
      '<div class="totbox">'+
        tline('Subtotal',t.sub)+ (t.tax?tline('Tax ('+model.taxRate+'%)',t.tax):'')+
        '<div class="tline grand"><span>Total</span><span>'+money(t.grand)+'</span></div>'+
        tline('Deposit to start ('+model.depositPct+'%)',t.deposit)+
      '</div>'+
    '</div></div>';

    view.innerHTML = h;
    wireBuild();
  }
  function fld(id,label,path,val){ return '<div><label>'+label+'</label><input data-model="'+path+'" value="'+esc(val)+'" placeholder="'+label+'"></div>'; }
  function tline(l,v){ return '<div class="tline"><span class="muted">'+l+'</span><span>'+money(v)+'</span></div>'; }
  function depOpt(v,l){ return '<option value="'+v+'"'+(+model.depositPct===v?' selected':'')+'>'+l+'</option>'; }

  function setByPath(path,val){ var p=path.split('.'); var o=model; for(var i=0;i<p.length-1;i++)o=o[p[i]]; o[p[p.length-1]]=val; }

  function wireBuild(){
    // customer + global fields
    [].forEach.call(view.querySelectorAll('[data-model]'),function(el){
      el.addEventListener('input',function(){
        var m=el.getAttribute('data-model');
        if(m==='optname'){ opt(activeOpt).name=el.value; return; }
        if(m==='taxRate'||m==='depositPct'){ model[m]=+el.value||0; renderBuild(); return; }
        setByPath(m, el.value);
      });
    });
    // option tabs
    [].forEach.call(view.querySelectorAll('[data-opt]'),function(el){ el.addEventListener('click',function(e){ if(e.target.hasAttribute('data-delopt'))return; activeOpt=el.getAttribute('data-opt'); renderBuild(); }); });
    [].forEach.call(view.querySelectorAll('[data-delopt]'),function(el){ el.addEventListener('click',function(e){ e.stopPropagation();
      if(model.options.length<=1)return; var id=el.getAttribute('data-delopt');
      model.options=model.options.filter(function(o){return o.id!==id;});
      // re-letter so they stay A/B/C
      model.options.forEach(function(o,i){ o.id=LETTERS[i]; });
      activeOpt=model.options[0].id; if(model.selected===id)model.selected=activeOpt; renderBuild(); }); });
    var ao=$('pv-addopt'); if(ao) ao.addEventListener('click',function(){
      if(model.options.length>=3)return; var idx=model.options.length;
      var src=opt(activeOpt); var clone=JSON.parse(JSON.stringify(src.services));   // start from the current option
      model.options.push({ id:LETTERS[idx], name:OPT_NAMES[idx]||('Option '+LETTERS[idx]), services:clone });
      activeOpt=LETTERS[idx]; renderBuild(); });
    // add service
    var as=$('pv-addsvc'); if(as) as.addEventListener('change',function(){ var k=as.value; if(!k)return;
      opt(activeOpt).services.push({ key:k, label:CATALOG[k].label, items:[] }); renderBuild(); });
    // per-service delete
    [].forEach.call(view.querySelectorAll('[data-delsvc]'),function(el){ el.addEventListener('click',function(){
      opt(activeOpt).services.splice(+el.getAttribute('data-delsvc'),1); renderBuild(); }); });
    // add item
    [].forEach.call(view.querySelectorAll('[data-additem]'),function(el){ el.addEventListener('change',function(){
      var si=+el.getAttribute('data-additem'), v=el.value; if(!v)return; var svc=opt(activeOpt).services[si];
      if(v==='__blank') svc.items.push(blankItem());
      else { var parts=v.split('|'); svc.items.push({desc:parts[0],qty:1,price:+parts[1]||0}); }
      renderBuild(); }); });
    // item edits
    [].forEach.call(view.querySelectorAll('[data-it]'),function(el){ el.addEventListener('input',function(){
      var a=el.getAttribute('data-it').split(','), svc=opt(activeOpt).services[+a[0]], it=svc.items[+a[1]], f=a[2];
      it[f] = (f==='desc') ? el.value : (+el.value||0);
      // light refresh: update the amount + subtotals without losing focus
      if(f==='desc') return;
      renderBuild();
    }); });
    // delete item
    [].forEach.call(view.querySelectorAll('[data-delit]'),function(el){ el.addEventListener('click',function(){
      var a=el.getAttribute('data-delit').split(','); opt(activeOpt).services[+a[0]].items.splice(+a[1],1); renderBuild(); }); });
  }

  // ── Present view (customer-facing) ───────────────────────────────────────────
  function renderPresent(){
    var c=model.customer;
    var h='<div class="present-head">'+
      '<div class="big">'+esc(c.business||'Your Project')+'</div>'+
      '<div class="muted">'+[esc(c.address),c.projectNo?('Project #'+esc(c.projectNo)):''].filter(Boolean).join(' · ')+'</div>'+
      '<div class="muted" style="margin-top:6px;">Choose the option that fits you best — then review and sign below.</div>'+
    '</div>';
    h+='<div class="optcards">';
    model.options.forEach(function(o){
      var t=optTotals(o); var sel=model.selected===o.id;
      h+='<div class="optcard '+(sel?'sel':'')+'">'+
        '<span class="opill">OPTION '+o.id+'</span>'+
        '<div class="oname">'+esc(o.name)+'</div>'+
        '<div class="oprice">'+money(t.grand)+'</div>'+
        '<div class="muted" style="font-size:12px;margin-bottom:6px;">'+money(t.deposit)+' deposit to start</div>'+
        '<ul>'+ o.services.map(function(svc){ return '<li><span>'+esc(svc.label)+'</span><span class="q">'+money(svcSubtotal(svc))+'</span></li>'; }).join('') + (o.services.length?'':'<li class="muted">No items</li>') +'</ul>'+
        '<div class="pick no-print"><button class="btn '+(sel?'gold':'')+'" style="width:100%;" data-pick="'+o.id+'">'+(sel?'✓ Selected':'Select this option')+'</button></div>'+
      '</div>';
    });
    h+='</div>';

    // signature
    var sel=opt(model.selected); var t=sel?optTotals(sel):null;
    h+='<div class="sign-wrap">';
    if(model.signature){
      h+='<div class="card"><h2>Signed</h2><div class="signed-badge">✓ Accepted by '+esc(model.signature.name)+'</div>'+
         '<div class="muted" style="font-size:12px;margin-top:4px;">'+esc(fmt(model.signature.at))+' · Option '+esc(model.selected)+' · '+money(t.grand)+'</div>'+
         '<button class="btn ghost sm no-print" id="pv-unsign" style="margin-top:12px;">Undo signature</button></div>';
    } else {
      h+='<div class="muted" style="font-size:12px;margin-bottom:8px;">By signing you accept <b>Option '+esc(model.selected)+' — '+esc(sel?sel.name:'')+'</b> at '+money(t?t.grand:0)+'.</div>'+
         '<div class="sigline no-print" id="pv-sigline"><div class="cursive" id="pv-sigtext">Click to sign</div>'+
         '<div class="muted" style="font-size:11px;margin-top:6px;">Type your full name to adopt a signature</div></div>';
    }
    h+='</div>';

    view.innerHTML=h;
    // wire present
    [].forEach.call(view.querySelectorAll('[data-pick]'),function(el){ el.addEventListener('click',function(){ model.selected=el.getAttribute('data-pick'); renderPresent(); }); });
    var sl=$('pv-sigline'); if(sl) sl.addEventListener('click',function(){
      var name=prompt('Type your full legal name to sign:'); if(!name||!name.trim())return;
      model.signature={ name:name.trim(), at:new Date().toISOString() }; renderPresent(); });
    var us=$('pv-unsign'); if(us) us.addEventListener('click',function(){ model.signature=null; renderPresent(); });
  }
  function fmt(iso){ try{ var d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }catch(e){ return iso; } }

  function render(){ (mode==='present'?renderPresent:renderBuild)(); }

  // ── Top bar ──────────────────────────────────────────────────────────────────
  function wireTop(){
    [].forEach.call($('pv-mode').querySelectorAll('button'),function(b){ b.addEventListener('click',function(){
      mode=b.getAttribute('data-m');
      [].forEach.call($('pv-mode').querySelectorAll('button'),function(x){ x.classList.toggle('on',x===b); });
      render(); }); });
    $('pv-print').addEventListener('click',function(){ var pm=mode; mode='present'; render(); setTimeout(function(){ window.print(); mode=pm; render(); },120); });
    $('pv-save').addEventListener('click',function(){ var blob=new Blob([JSON.stringify(serialize(),null,2)],{type:'application/json'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(model.customer.business||'proposal').replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'-v3.json'; a.click(); URL.revokeObjectURL(a.href); });
    $('pv-load').addEventListener('click',function(){ $('pv-loadfile').click(); });
    $('pv-loadfile').addEventListener('change',function(e){ var f=e.target.files[0]; if(!f)return; var rd=new FileReader();
      rd.onload=function(){ try{ restore(JSON.parse(rd.result)); }catch(err){ alert('Not a valid proposal file'); } }; rd.readAsText(f); e.target.value=''; });
  }

  // ── Public API ────────────────────────────────────────────────────────────────
  function serialize(){ return JSON.parse(JSON.stringify(model)); }
  function restore(json){ if(!json)return; model=Object.assign(model,json); if(!model.options||!model.options.length)model.options=[blankOption(0)]; activeOpt=model.options[0].id; render(); }
  function setMode(m){ mode=m; [].forEach.call($('pv-mode').querySelectorAll('button'),function(x){ x.classList.toggle('on',x.getAttribute('data-m')===m); }); render(); }
  function mount(rootElOrId){ view=$('pv-view'); wireTop(); render(); return window.ProposalV3; }

  window.ProposalV3={ mount:mount, serialize:serialize, restore:restore, setMode:setMode, get model(){return model;} };
  if($('pv-view')) document.addEventListener('DOMContentLoaded',function(){ mount('pv-root'); });
})();
</script>
</body>
</html>
