<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOT TECHS — Site Surveys</title>
<script>window.IOT_REQUIRE='manager'</script><script src="/auth.js"></script>
<style>
  :root{ --cream:#FAF8F4; --ink:#0B0F1A; --ink-2:#121726; --panel:#161B2A; --panel-2:#1C2336; --slate:#2C3347; --slate-line:#3A4259;
    --gold:#C9A96E; --gold-bright:#E0C384; --muted:#8A93A8; --isp:#6FCF97; --danger:#D9534F; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:var(--ink);min-height:100%;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--cream);min-height:100vh;
    background:radial-gradient(1000px 540px at 50% -8%, rgba(201,169,110,.12), transparent 60%), var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;padding-bottom:60px;}
  header{background:linear-gradient(180deg,var(--slate) 0%, #232a3b 100%);border-bottom:3px solid var(--gold);padding:26px 0;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px;}
  .navlinks{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .navlinks a{font-size:12.5px;color:var(--cream);background:var(--panel-2);border:1px solid var(--slate-line);border-radius:8px;padding:7px 13px;text-decoration:none;font-weight:700;}
  .navlinks a:hover{border-color:var(--gold);}
  .navlinks a.gold{background:var(--gold);color:var(--ink);border-color:var(--gold);}
  h1{font-size:24px;letter-spacing:1px;color:#fff;}
  .sub{color:var(--gold);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:6px;}
  .tools{display:flex;gap:10px;margin:22px 0 8px;flex-wrap:wrap;align-items:center;}
  .tools input{flex:1;min-width:200px;background:var(--ink-2);border:1px solid var(--slate-line);color:var(--cream);border-radius:9px;padding:10px 13px;font-size:13.5px;outline:none;}
  .tools input:focus{border-color:var(--gold);}
  .count{color:var(--muted);font-size:12.5px;}
  table{width:100%;border-collapse:collapse;margin-top:14px;}
  th{text-align:left;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:800;padding:10px 12px;border-bottom:1px solid var(--slate-line);}
  td{padding:13px 12px;border-bottom:1px solid var(--slate-line);font-size:13.5px;vertical-align:middle;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .biz{font-weight:700;color:#fff;}
  .addr{color:var(--muted);font-size:12px;margin-top:2px;}
  .when{color:var(--muted);font-size:12.5px;white-space:nowrap;}
  .loc{color:var(--cream);font-size:13px;}
  .has{color:var(--isp);font-size:12.5px;font-weight:600;white-space:nowrap;}
  .none{color:var(--muted);font-size:12.5px;}
  .acts{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap;}
  .acts a{font-size:11.5px;font-weight:700;text-decoration:none;padding:6px 11px;border-radius:7px;border:1px solid var(--slate-line);color:var(--cream);background:var(--panel-2);white-space:nowrap;}
  .acts a:hover{border-color:var(--gold);}
  .acts a.gold{background:var(--gold);color:var(--ink);border-color:var(--gold);}
  .acts a.muted{opacity:.4;pointer-events:none;}
  .empty{padding:60px 20px;text-align:center;color:var(--muted);}
  .empty a{color:var(--gold);}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="navlinks"><a href="/home.html">← Workspace</a><a href="/survey.html" class="gold">+ New Site Survey</a><a href="/dashboard.html">Dashboard</a></div>
  <h1>Site Surveys</h1><div class="sub">Floor Plans · Device Layouts</div>
</div></header>

<div class="wrap">
  <div class="tools">
    <input id="q" placeholder="Search by business, name, or address…" autocomplete="off">
    <span class="count" id="count"></span>
  </div>
  <div id="list"></div>
</div>

<script>
var ALL=[];
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmtDate(s){ if(!s)return '—'; try{var d=new Date((s+'').replace(' ','T')); if(isNaN(d))return s; return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}catch(e){return s;} }
function row(s){
  // s.id is the PROJECT id; s.customer_id is the customer. Links carry both.
  var cust=s.customer_id||s.id;
  var qp='customer='+cust+'&project='+s.id;
  var biz=s.business||s.name||('#'+cust);
  var pname=s.project_name||s.site_address||'';
  var name=esc(biz)+(pname&&pname!==biz?' <span class="addr" style="font-weight:400;">· '+esc(pname)+'</span>':'');
  var sub=(s.name&&s.name!==s.business)?('<div class="addr">'+esc(s.name)+'</div>'):'';
  var loc=esc(s.site_address||s.address||'—');
  var acts, plans;
  if(s.hasSurvey){
    var pdf=s.pdf_id?('<a href="/api/documents/'+s.pdf_id+'/file" target="_blank">PDF</a>'):'';
    acts='<a class="gold" href="/survey.html?'+qp+'&load=1">Open current plans</a>'+pdf+'<a href="/project.html?'+qp+'">Project</a>';
    plans='<span class="has"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg> '+fmtDate(s.updated)+'</span>';
  } else {
    acts='<a class="gold" href="/survey.html?'+qp+'">+ Add location plans</a><a href="/project.html?'+qp+'">Project</a>';
    plans='<span class="none">No plans yet</span>';
  }
  return '<tr><td><div class="biz">'+name+'</div>'+sub+'</td>'+
    '<td><span class="loc">'+loc+'</span></td>'+
    '<td>'+plans+'</td>'+
    '<td><div class="acts">'+acts+'</div></td></tr>';
}
function render(){
  var q=document.getElementById('q').value.trim().toLowerCase();
  var rows=ALL.filter(function(s){ if(!q)return true; return ((s.business||'')+' '+(s.name||'')+' '+(s.project_name||'')+' '+(s.site_address||'')+' '+(s.address||'')).toLowerCase().indexOf(q)>=0; });
  var withPlans=rows.filter(function(s){return s.hasSurvey;}).length;
  document.getElementById('count').textContent=withPlans+' with plans · '+rows.length+' project'+(rows.length===1?'':'s');
  var el=document.getElementById('list');
  if(!rows.length){ el.innerHTML='<div class="empty">No projects yet. <a href="/survey.html">Start a survey →</a></div>'; return; }
  el.innerHTML='<table><thead><tr><th>Project</th><th>Location</th><th>Floor plans</th><th style="text-align:right;">Actions</th></tr></thead><tbody>'+rows.map(row).join('')+'</tbody></table>';
}
document.getElementById('q').addEventListener('input',render);
fetch('/api/surveys').then(function(r){return r.json();}).then(function(d){ ALL=[].concat((d&&d.surveys)||[],(d&&d.projects)||[]); render(); })
  .catch(function(){ document.getElementById('list').innerHTML='<div class="empty">Could not load projects.</div>'; });
</script>
</body>
</html>
