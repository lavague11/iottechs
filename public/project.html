<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOT TECHS — Project</title>
<style>
  :root{ --cream:#FAF8F4; --slate:#2C3347; --slate-2:#363E54; --gold:#C9A96E; --gold-dim:#9c7f48;
    --ink:#0B0F1A; --ink-2:#121726; --line:#2a3247; --green:#1f6b4f; --green-l:#4ADE80; --tech:#7FA98C; --cust:#6E8FB0; --red:#7a2f33; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:var(--ink);min-height:100%;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--cream);min-height:100vh;
    background:radial-gradient(900px 500px at 80% -5%, rgba(201,169,110,.10), transparent 60%),
               radial-gradient(700px 600px at -10% 30%, rgba(110,143,176,.06), transparent 55%), var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;padding-bottom:80px;}
  .wrap{max-width:1000px;margin:0 auto;padding:0 22px;}
  header{background:linear-gradient(180deg,var(--slate) 0%, #232a3b 100%);border-bottom:3px solid var(--gold);padding:26px 0 22px;}
  .hwrap{max-width:1000px;margin:0 auto;padding:0 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
  .brand h1{font-size:22px;letter-spacing:4px;font-weight:700;color:#fff;}
  .brand .tag{color:var(--gold);letter-spacing:3px;font-size:10px;margin-top:5px;text-transform:uppercase;}
  .roles{display:flex;gap:6px;background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:4px;}
  .role{padding:8px 14px;border-radius:7px;font-size:12px;font-weight:700;letter-spacing:.04em;cursor:pointer;color:#9aa3b5;border:none;background:transparent;}
  .role.on{background:var(--gold);color:var(--ink);}

  .pcard{background:var(--ink-2);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:14px;padding:20px 22px;margin-top:22px;}
  .pcard .pn{font-size:22px;font-weight:800;color:#fff;letter-spacing:.3px;}
  .pcard .pm{font-size:13px;color:#9aa3b5;margin-top:3px;}
  .pcard .ptot{font-size:13px;color:var(--gold);font-weight:700;margin-top:6px;}
  .statusbadge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:20px;background:#3a3220;border:1px solid var(--gold-dim);color:#e8cf9d;margin-top:8px;}
  .nextstep{display:flex;align-items:center;gap:13px;margin-top:16px;padding:13px 16px;border-radius:12px;
    background:linear-gradient(180deg,rgba(201,169,110,.13),rgba(201,169,110,.05));border:1px solid var(--gold-dim);}
  .nextstep .ns-ic{font-size:22px;line-height:1;flex:0 0 auto;}
  .nextstep .ns-body{flex:1;min-width:0;}
  .nextstep .ns-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);}
  .nextstep .ns-title{font-size:15px;font-weight:800;color:#fff;margin-top:2px;}
  .nextstep .ns-sub{font-size:12px;color:#b9c0cf;margin-top:2px;}
  .nextstep .ns-cta{flex:0 0 auto;background:var(--gold);color:var(--ink);border:none;border-radius:9px;padding:10px 16px;
    font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;white-space:nowrap;}
  .nextstep .ns-cta:hover{background:#d8bd86;}
  .nextstep .ns-staff{flex:0 0 auto;font-size:11px;font-weight:700;color:#cdb482;background:#2a2616;border:1px solid var(--gold-dim);border-radius:8px;padding:6px 11px;white-space:nowrap;}

  /* progress tracker — horizontal stepper */
  .track{margin-top:22px;background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:22px 18px 18px;}
  .track h2{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:20px;}
  .hsteps{display:flex;align-items:flex-start;overflow-x:auto;padding-bottom:4px;}
  .hstep{flex:1 0 auto;min-width:78px;position:relative;text-align:center;padding:24px 4px 0;font-size:11px;line-height:1.25;color:#7e879a;}
  .hstep i{position:absolute;top:0;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:#2a3247;border:2px solid #3a4258;box-sizing:border-box;z-index:2;}
  .hstep::before{content:"";position:absolute;top:7px;left:50%;width:100%;height:2px;background:#2a3247;z-index:1;}
  .hstep:last-child::before{display:none;}
  .hstep.done{color:#cfd5e0;} .hstep.done i{background:var(--green-l);border-color:var(--green-l);} .hstep.done::before{background:var(--green-l);}
  .hstep.active{color:#fff;font-weight:700;} .hstep.active i{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,169,110,.18);}
  .hstep.skipped{color:#e8cf9d;} .hstep.skipped i{background:#f0c674;border-color:#b5862f;} .hstep.skipped::before{background:#b5862f;}
  .skipctl{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .skipctl .sk-lbl{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#f0c674;}
  .skipctl button{background:#2a2616;border:1px solid #b5862f;color:#f0c674;border-radius:8px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;}
  .skipctl button:hover{background:#3a2e16;}

  .section{margin-top:22px;}
  .section h2{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#fff;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
  .section h2 .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
  .row .t{font-weight:700;color:#fff;font-size:14px;} .row .m{font-size:12px;color:#9aa3b5;}
  select,.minput{background:var(--ink);border:1px solid var(--line);color:#fff;border-radius:7px;padding:7px 9px;font-size:12px;outline:none;font-family:inherit;}
  .btn{background:var(--gold);color:var(--ink);border:none;border-radius:8px;padding:10px 16px;font-size:12px;font-weight:800;letter-spacing:.04em;cursor:pointer;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:#aab2c4;}
  .btn.green{background:var(--green);color:#fff;}
  .iconbtn{background:none;border:1px solid var(--line);color:#aab2c4;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
  .bar{height:6px;background:var(--ink);border-radius:4px;overflow:hidden;width:120px;}
  .bar>i{display:block;height:100%;background:var(--tech);}
  .muted{color:#8b93a5;font-size:13px;}
  .navlinks{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .navlinks a{font-size:11px;color:var(--gold);text-decoration:none;border:1px solid var(--gold-dim);border-radius:20px;padding:5px 12px;}
  .maplink{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold-dim);}
  .maplink:hover{color:#e8cf9d;}
  .wonum{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--gold);background:#2a2418;border:1px solid var(--gold-dim);border-radius:6px;padding:2px 8px;margin-right:8px;vertical-align:middle;font-variant-numeric:tabular-nums;}
  /* signature-required banner */
  .signbanner{display:flex;align-items:center;gap:12px;margin-top:22px;padding:14px 18px;border-radius:12px;text-decoration:none;
    background:linear-gradient(90deg,#1b3a7a,#22489a);border:1px solid #3a5bb0;color:#eaf0ff;box-shadow:0 8px 26px rgba(20,40,100,.35);}
  .signbanner.staff{background:linear-gradient(90deg,#3a3220,#4a3f25);border-color:var(--gold-dim);color:#f0e3c8;box-shadow:none;}
  .signbanner .sb-ic{font-size:22px;line-height:1;}
  .signbanner .sb-tx{flex:1;font-size:13.5px;}
  .signbanner .sb-tx b{font-weight:800;letter-spacing:.02em;}
  .signbanner .sb-btn{flex:0 0 auto;background:var(--gold);color:var(--ink);font-weight:800;font-size:12px;letter-spacing:.04em;
    padding:9px 15px;border-radius:8px;border:none;cursor:pointer;text-decoration:none;white-space:nowrap;}
  .signbanner .sb-btn.ghost{background:transparent;border:1px solid var(--gold-dim);color:#f0e3c8;}
  /* customer help + start-another-project */
  .needhelp{margin-left:12px;vertical-align:middle;background:#3a1d1d;border:1px solid #7a3b3b;color:#ffd7d7;border-radius:18px;padding:5px 12px;font:700 12px inherit;cursor:pointer;}
  .needhelp:hover{background:#4a2424;}
  .cust-actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;}
  .cbtn{background:var(--ink);border:1px solid var(--gold-dim);color:var(--gold);border-radius:9px;padding:10px 16px;font:800 12px inherit;letter-spacing:.03em;cursor:pointer;}
  .cbtn:hover{background:#1a1f2e;}
  .helpflag{margin-top:12px;background:#3a1d1d;border:1px solid #7a3b3b;color:#ffd7d7;border-radius:10px;padding:10px 14px;font-size:13px;}
  .helpflag .hresolve{margin-left:10px;background:var(--green);border:none;color:#fff;border-radius:7px;padding:5px 11px;font:700 11px inherit;cursor:pointer;}
  .mscrim{position:fixed;inset:0;background:rgba(5,8,15,.74);display:none;z-index:10001;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;}
  .mscrim.on{display:flex;}
  .msheet{background:var(--ink-2);border:2px solid var(--gold);border-radius:14px;max-width:460px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .mhead{background:var(--ink);color:var(--gold);padding:14px 18px;font-weight:800;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0;}
  .mhead .x{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;line-height:1;}
  .mbody{padding:18px;}
  .mbody label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#8b93a5;font-weight:700;margin:12px 0 6px;}
  .mbody input,.mbody textarea{width:100%;background:var(--ink);border:1px solid var(--line);color:#fff;border-radius:8px;padding:11px 12px;font-size:14px;outline:none;font-family:inherit;}
  .mbody input:focus,.mbody textarea:focus{border-color:var(--gold);}
  .mchoice{display:flex;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
  .mopt{flex:1;min-width:150px;text-align:left;background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;color:#cfd5e0;}
  .mopt.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.2);}
  .mopt .ot{font-weight:800;color:#fff;font-size:13px;} .mopt .od{font-size:11.5px;color:#9aa3b5;margin-top:3px;}
  .addrbox{position:relative;}
  .addrsug{position:absolute;left:0;right:0;top:100%;background:var(--ink-2);border:1px solid var(--gold-dim);border-radius:8px;margin-top:4px;z-index:5;max-height:200px;overflow-y:auto;}
  .addrsug div{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--line);}
  .addrsug div:hover{background:#1a1f2e;color:var(--gold);}
  /* activity log + notes */
  textarea.minput{font-family:inherit;}
  .logfeed{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
  .logitem{background:var(--ink-2);border:1px solid var(--line);border-left:3px solid var(--gold-dim);border-radius:9px;padding:10px 13px;}
  .logitem.ev{border-left-color:var(--cust);}
  .lmeta{display:flex;align-items:center;gap:9px;font-size:11px;color:#7e879a;margin-bottom:4px;}
  .lwhen{font-variant-numeric:tabular-nums;}
  .lauthor{color:#9aa3b5;font-weight:600;}
  .ldel{margin-left:auto;background:none;border:none;color:#8b6b6e;cursor:pointer;font-size:16px;line-height:1;}
  .ldel:hover{color:#d98a8e;}
  .lbadge{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:10px;}
  .lbadge.int{background:#3a3220;color:#e8cf9d;border:1px solid var(--gold-dim);}
  .lbadge.ext{background:#1d2f24;color:#8fd6b3;border:1px solid #2f6b4f;}
  .lbadge.sign{background:#3a1d1d;color:#ffc9c9;border:1px solid #7a3b3b;}
  .lbadge.ok{background:#1d2f24;color:#8fd6b3;border:1px solid #2f6b4f;}
  .iconbtn.gold{background:var(--gold);color:var(--ink);border-color:var(--gold);}
  .lbody{font-size:13px;color:#dfe3ec;white-space:pre-wrap;word-break:break-word;}
  /* signature */
  .sigwrap{position:relative;width:100%;max-width:600px;}
  #sigpad{width:100%;height:180px;background:#fff;border:1px solid var(--gold-dim);border-radius:10px;touch-action:none;cursor:crosshair;display:block;}
  .sigclear{position:absolute;top:8px;right:8px;background:rgba(11,15,26,.06);border:1px solid #c9c2b0;color:#555;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;}
  .signedbox{font-size:13px;color:#cfd5e0;}
  .signedbox .okdot{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;margin-right:6px;vertical-align:middle;}
  .sigimg{display:block;margin-top:12px;max-width:320px;width:100%;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px;}
  /* payments */
  .paysum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .paycard{background:var(--ink-2);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:11px;padding:13px 15px;}
  .paycard .pl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8b93a5;font-weight:700;}
  .paycard .pv{font-size:22px;font-weight:800;color:#fff;margin-top:4px;font-variant-numeric:tabular-nums;}
  .payrow{display:flex;align-items:center;gap:12px;background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:11px 14px;}
  .paybadge{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:10px;margin-left:6px;}
  .paybadge.paid{background:#1d2f24;color:#8fd6b3;border:1px solid #2f6b4f;}
  .paybadge.due{background:#3a3220;color:#e8cf9d;border:1px solid var(--gold-dim);}
  .paybadge.pending{background:#3a3220;color:#f0c674;border:1px solid #b5862f;}
  .paybadge.waived{background:#23314a;color:#9bb6d8;border:1px solid #3f5a82;}
  .depositbar{margin-top:12px;padding:11px 15px;border-radius:10px;font-size:13px;font-weight:600;}
  .depositbar b{font-weight:800;}
  .depositbar.short{background:#3a1d1d;border:1px solid #7a3b3b;color:#ffd7d7;}
  .depositbar.met{background:#1d2f24;border:1px solid #2f6b4f;color:#a7d3b5;}
  .depositbar.pending{background:#3a3220;border:1px solid #b5862f;color:#f0c674;}
  @media(max-width:620px){ .paysum{grid-template-columns:1fr;} }
  /* signature modal (draw / type) */
  .sigscrim{position:fixed;inset:0;background:rgba(5,8,15,.74);display:none;z-index:1000;align-items:center;justify-content:center;padding:16px;}
  .sigscrim.on{display:flex;}
  .sigsheet{width:100%;max-width:540px;background:var(--cream);color:var(--ink);border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);max-height:92vh;display:flex;flex-direction:column;}
  .sigsheet-head{background:var(--slate);color:#fff;padding:15px 20px;border-left:4px solid var(--gold);display:flex;justify-content:space-between;align-items:center;}
  .sigsheet-head h3{margin:0;font-size:14px;letter-spacing:.12em;text-transform:uppercase;}
  .sigx{background:none;border:none;color:#cfd3dc;font-size:24px;cursor:pointer;line-height:1;}
  .sigsheet-body{padding:18px 20px;overflow-y:auto;}
  .sigfield label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);font-weight:700;margin-bottom:6px;}
  .sigfield input{width:100%;font:inherit;font-size:16px;padding:11px 13px;border:1px solid #d9d4ca;border-radius:8px;background:#fff;color:var(--ink);}
  .sigfield input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.25);}
  .sigtabs{display:flex;gap:6px;margin:14px 0 12px;background:#eceae4;padding:4px;border-radius:9px;}
  .sigtab{flex:1;font:inherit;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:9px;border:none;border-radius:7px;background:transparent;color:var(--slate);cursor:pointer;}
  .sigtab.sel{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12);}
  .sigpadwrap{position:relative;border:1px solid #d9d4ca;border-radius:10px;background:#fff;overflow:hidden;}
  #sig-pad{display:block;width:100%;height:190px;touch-action:none;cursor:crosshair;}
  .sigbaseline{position:absolute;left:24px;right:24px;bottom:44px;border-top:1px dashed var(--gold);pointer-events:none;}
  .sigpadhint{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;color:#c3bdb1;font-size:14px;letter-spacing:.06em;pointer-events:none;}
  .sigpadbar{display:flex;align-items:center;gap:12px;margin-top:10px;}
  .siginks{display:flex;gap:8px;}
  .sigink{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid #d9d4ca;}
  .sigink.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.3);}
  .siglink{background:none;border:none;color:var(--slate);font:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;}
  .sigtypeprev{min-height:104px;display:flex;align-items:center;justify-content:center;border:1px solid #d9d4ca;border-radius:10px;background:#fff;font-size:46px;color:#0B0F1A;padding:8px 16px;overflow:hidden;text-align:center;white-space:nowrap;}
  .sigtypeprev.empty{color:#c3bdb1;font-size:16px;letter-spacing:.06em;}
  .sigstylebar{display:flex;gap:8px;margin-top:12px;}
  .sigstyleopt{flex:1;min-width:0;font-size:20px;padding:11px 6px;border:1px solid #d9d4ca;border-radius:8px;background:#fff;color:var(--slate);cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .sigstyleopt.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.28);color:var(--ink);}
  .sigagree{display:flex;align-items:center;gap:9px;margin-top:16px;font-size:13px;color:var(--slate);}
  .sigagree input{width:16px;height:16px;accent-color:var(--gold);}
  .sigsheet-foot{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid #ece8e0;background:#faf8f4;}
  .sigsheet-foot .btn.ghost{color:var(--slate);border-color:#d9d4ca;background:#eceae4;}
  .hide{display:none;}
  /* Project switcher (multi-project per customer) */
  .projsel{position:relative;margin-left:auto;margin-right:14px;}
  .projsel-btn{display:flex;align-items:center;gap:8px;background:var(--slate);border:1px solid var(--line);color:var(--cream);padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;max-width:300px;}
  .projsel-btn .pn{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .projsel-btn .cv{color:var(--gold);font-size:10px;}
  .projsel-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:280px;background:var(--slate);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.35);padding:6px;z-index:60;display:none;}
  .projsel-menu.on{display:block;}
  .projsel-item{display:flex;flex-direction:column;gap:2px;padding:9px 11px;border-radius:7px;cursor:pointer;color:var(--cream);}
  .projsel-item:hover{background:rgba(255,255,255,.06);}
  .projsel-item.cur{background:rgba(212,175,110,.14);}
  .projsel-item .t{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px;}
  .projsel-item .s{font-size:10.5px;color:#9aa1b2;}
  .projsel-item .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex:none;}
  .projsel-new{border-top:1px solid var(--line);margin-top:4px;padding-top:8px;}
  .projsel-new button{width:100%;background:transparent;border:1px dashed #4a5163;color:var(--cream);padding:8px;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;}
  .projsel-new button:hover{border-color:var(--gold);color:var(--gold);}
  footer{margin-top:50px;border-top:1px solid var(--line);padding-top:20px;text-align:center;color:#6b7385;font-size:11px;letter-spacing:1.5px;}
  footer .g{color:var(--gold);}
</style>
<script>window.IOT_REQUIRE='public'</script><script src="/auth.js"></script>
</head>
<body>
<header>
  <div class="hwrap">
    <div class="brand"><h1>IOT&nbsp;TECHS</h1><div class="tag">Project</div></div>
    <div class="projsel" id="projsel" style="display:none;"></div>
    <div class="roles" id="roles">
      <button class="role" data-v="customer" onclick="setView('customer')">Customer</button>
      <button class="role" data-v="admin" onclick="setView('admin')">Admin</button>
      <button class="role" data-v="tech" onclick="setView('tech')">Technician</button>
    </div>
  </div>
</header>

<div class="wrap" id="app"><div class="muted" style="margin-top:30px;">Loading project…</div></div>

<script>
let project = null, view = 'admin', custId = null;

function qs(k){ try{ return new URLSearchParams(location.search).get(k); }catch(e){ return null; } }
function money(n){ return (Number(n)||0).toLocaleString('en-US',{maximumFractionDigits:0}); }
function money2(n){ return (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(s){ if(!s) return ''; try{ return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return s;} }
function fmtDateTime(iso){ if(!iso) return ''; try{ const d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }catch(e){ return iso; } }
function isApple(){ return /iPad|iPhone|iPod|Macintosh|Mac OS X/i.test(navigator.userAgent||''); }
function mapsHref(addr){ const q=encodeURIComponent(addr); return isApple()?('https://maps.apple.com/?q='+q):('https://www.google.com/maps/search/?api=1&query='+q); }
function mapsLink(addr,cls){ if(!addr) return ''; return '<a class="'+(cls||'maplink')+'" href="'+mapsHref(addr)+'" target="_blank" rel="noopener" title="Open in '+(isApple()?'Apple':'Google')+' Maps">'+esc(addr)+' ↗</a>'; }
function toast(msg){ let t=document.getElementById('t'); if(!t){t=document.createElement('div');t.id='t';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--slate);border:1px solid var(--gold);color:var(--cream);padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:99;opacity:0;transition:opacity .25s;';document.body.appendChild(t);} t.textContent=msg;t.style.opacity='1';clearTimeout(t._x);t._x=setTimeout(()=>t.style.opacity='0',2200); }

// The lifecycle is computed server-side (single source of truth) and rendered identically to every role.
function lc(){ return (project && project.lifecycle) || { stages:[], currentKey:'', currentIndex:0 }; }
function lcDone(key){ const s=lc().stages.find(x=>x.key===key); return s && s.status==='done'; }
function currentStage(){ return lc().currentIndex||0; }
function projectClosed(){ const s=lc().stages.find(x=>x.key==='complete'); return !!(s && s.status==='done'); }
function stepCls(st){ return st==='done'?'done':st==='current'?'active':st==='skipped'?'skipped':''; }
function trackerBar(title, steps, extra){
  return '<div class="track"><h2>'+esc(title)+'</h2><div class="hsteps">'+
    steps.map(s=>'<div class="hstep '+stepCls(s.status)+'"><i></i><span>'+esc(s.label)+
      (s.detail?'<br><span style="font-size:9px;color:#6b7385;font-weight:400;">'+esc(s.detail)+'</span>':'')+'</span></div>').join('')+
    '</div>'+(extra||'')+'</div>';
}
// Collapse the canonical 13-stage ladder into a role-appropriate view (same underlying status).
function stStatus(key){ const s=lc().stages.find(x=>x.key===key); return s?s.status:'todo'; }
function rollup(map){
  const arr=map.map(m=>{ const st=stStatus(m.key); return { label:m.label, done:st==='done', skipped:st==='skipped' }; });
  let cur=arr.findIndex(s=>!s.done && !s.skipped); if(cur<0) cur=arr.length-1;
  return arr.map((s,i)=>({ label:s.label, status: s.done?'done':(s.skipped?'skipped':(i===cur?'current':'todo')) }));
}
function customerStages(){ return rollup([
  {key:'survey',label:'Site Survey'},{key:'proposal_signed',label:'Sign'},{key:'deposit',label:'Deposit'},
  {key:'installation',label:'Install'},{key:'final_payment',label:'Final Payment'},{key:'complete',label:'Complete'}]); }
function techStages(){
  const wos=project.workOrders||[];
  const assigned=wos.some(w=>w.technician_id)||wos.some(w=>w.tech_accepted);
  const completed=wos.some(w=>w.status==='Completed')||project.status==='Completed'||project.status==='Closed';
  const paid=!!project.techPaid;
  const arr=[{label:'Technician Assigned',done:assigned},{label:'Completed',done:completed},{label:'Paid',done:paid}];
  let cur=arr.findIndex(s=>!s.done); if(cur<0) cur=arr.length-1;
  return arr.map((s,i)=>({label:s.label,status:s.done?'done':(i===cur?'current':'todo')}));
}
function tracker(){
  if(!lc().stages.length) return '';
  if(view==='customer') return trackerBar('Your Project', customerStages());
  if(view==='tech') return trackerBar('Your Job', techStages());
  // admin/manager: the full ladder, with skipped steps yellow + a mark-complete control
  const skipped=lc().stages.filter(s=>s.status==='skipped');
  const ctl = skipped.length ? '<div class="skipctl"><span class="sk-lbl">Skipped</span>'+
    skipped.map(s=>'<button onclick="markStageComplete(\''+s.key+'\')">'+esc(s.label)+' — mark complete</button>').join('')+'</div>' : '';
  return trackerBar('Project Lifecycle', lc().stages, ctl);
}
window.markStageComplete=async function(key){
  const r=await (await fetch(actionUrl('/stage-override'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stageKey:key,done:true})})).json();
  if(r&&r.ok){ toast('Marked complete'); load(); } else toast((r&&r.error)||'Failed',true);
};

function header(){
  const c=project; const p=(c.proposals||[])[0];
  const isCust = view==='customer';
  const staffHelp = (!isCust && c.help_open) ? '<div class="helpflag"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> <b>Help requested</b>'+(c.help_message?': '+esc(c.help_message):'')+' <button class="hresolve" onclick="resolveHelp()">Resolve</button></div>' : '';
  return '<div class="pcard">'+
    '<div class="pn">'+esc(c.business||c.name||'Project')+'</div>'+
    '<div class="pm">'+[esc(c.name&&c.name!==c.business?c.name:''),esc(c.phone),esc(c.email)].filter(Boolean).join('  ·  ')+'</div>'+
    (c.address?'<div class="pm">'+mapsLink(c.address)+'</div>':'')+
    (p?'<div class="ptot"><span class="wonum" title="Proposal # · Work Order ID · Invoice #">#'+esc(p.proposal_num||'')+'</span>'+(view==='tech'?'':'$'+money2(p.grand_total))+'</div>':'')+
    '<div><span class="statusbadge">'+esc(c.status||'New')+'</span></div>'+
    nextStepCard()+
    staffHelp+
    (isCust && projectClosed() ? '<div class="cust-actions"><button class="cbtn" onclick="openNewProject()"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Start Another Project</button></div>' : '')+
    '</div>';
}
// ── Next-step guide: the single actionable step for where this project is now ──
// The action panel is driven by the canonical lifecycle key — same stage for everyone,
// but the call-to-action is tailored to who's looking (customer / admin / tech).
function nextStep(){
  const c=project, sum=c.paymentSummary||{}, wos=c.workOrders||[], isCust=view==='customer', isTech=view==='tech';
  const sr=c.signatureRequest;
  const sched=wos.map(w=>w.scheduled_date).filter(Boolean).sort()[0];
  const reschedReq=wos.some(w=>w.reschedule_requested && ['Completed','Cancelled'].indexOf(w.status)<0);
  const key=lc().currentKey;
  // Pending addendum (extra work) takes priority — the customer must approve the charge, staff can act on their behalf
  if((c.pendingAddendums||0)>0){
    if(isCust) return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49"/></svg>', title:'Extra work needs your approval', sub:'Additional work was found on site — review & approve the charge below.' };
    return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49"/></svg>', title:(c.pendingAddendums)+' addendum'+(c.pendingAddendums>1?'s':'')+(c.pendingAddendums>1?' need':' needs')+' a decision', sub:'Awaiting the customer — or decide on their behalf below.', staff:'Review addendums ↓' };
  }
  switch(key){
    case 'inquiry':
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.5A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.7 1.5z"/></svg>', title: isCust?'Inquiry received':'New inquiry', sub: isCust?'Thanks for reaching out — we\'ll be in touch.':'Reach out and book a site survey.', staff:'Contact & schedule survey' };
    case 'survey':
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h8M8 9h2"/></svg>', title:'Site survey', sub: c.survey_date?('Scheduled '+fmtDate(c.survey_date)):(isCust?'We\'ll schedule a quick site visit.':'Schedule the site survey, or skip it.'),
        cta: (!isCust&&!isTech)?{label: c.survey_date?'Update survey':'Schedule survey', onclick:'scheduleSurvey()'}:null, staff: c.survey_date?('Survey '+fmtDate(c.survey_date)):'Schedule / skip survey' };
    case 'proposal_sent':
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>', title: isCust?'Your proposal is being prepared':'Send the proposal',
        sub: isCust?'We\'ll send it for your signature shortly.':'Build & send the proposal for signature.', staff:'Send proposal for signature' };
    case 'proposal_signed':
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M12 19h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>', title:'Sign your proposal', sub:'Review & sign to get started.',
        cta: (isCust&&sr)?{label:'Review & Sign →', href:'/s/'+sr.token}:null, staff:'Awaiting customer signature' };
    case 'deposit':
      if(sum.depositPending) return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M6 2h12M6 22h12M6 2c0 5 4 6 6 8 2-2 6-3 6-8M6 22c0-5 4-6 6-8 2 2 6 3 6 8"/></svg>', title:'Deposit under review', sub:'We\'re confirming your deposit.', staff:'Review reported deposit ↓' };
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>', title:'Pay your deposit', sub:'A $'+money2(sum.depositRequired)+' deposit starts your project.',
        cta: isCust?{label:'Mark deposit as paid', onclick:'depositClaim()'}:null, staff:'Awaiting deposit — or waive ↓' };
    case 'work_order':
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M14.7 6.3a4 4 0 0 0-5 5L3 18l3 3 6.7-6.7a4 4 0 0 0 5-5l-2.8 2.8-2.2-2.2z"/></svg>', title:'Preparing your work order', sub: isCust?'We\'re setting up your job.':'Work order being created.', staff:'Work order being prepared' };
    case 'tech_assigned': {
      const myWO=wos.find(w=>w.technician_id && !w.tech_accepted);
      if(isTech && myWO) return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4"/></svg>', title:'Accept your job', sub:esc(myWO.title||'Installation'), cta:{ico:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg> ', label:'Accept job', onclick:'acceptJob('+myWO.id+')'}, staff:'' };
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4"/></svg>', title: isCust?'Assigning your technician':'Assign a technician', sub: isCust?'We\'re lining up your installer.':'Assign a tech in Dispatch and await their accept.', staff:'Assign tech in Dispatch →' };
    }
    case 'scheduled':
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>', title: isCust?'Your installation is being scheduled':'Request to schedule',
        sub: isCust?'We\'re setting up your install date — we\'ll confirm shortly.':'Deposit\'s in — book this install in Dispatch.', staff:'Open Dispatch →' };
    case 'installation':
      if(reschedReq) return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>', title:'Reschedule requested',
        sub: isCust?'We\'ll confirm a new date shortly.':'Customer asked to move the date — re-book in Dispatch.', staff:'Re-book in Dispatch →' };
      if(isCust) return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>', title:'Your installation is scheduled', sub:fmtDate(sched), cta:{label:'Reschedule', onclick:'rescheduleRequest()'}, staff:'' };
      if(isTech) return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M14.7 6.3a4 4 0 0 0-5 5L3 18l3 3 6.7-6.7a4 4 0 0 0 5-5l-2.8 2.8-2.2-2.2z"/></svg>', title:'Your job is scheduled', sub:fmtDate(sched)+' — complete the job & checklist in Dispatch.', staff:'' };
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M14.7 6.3a4 4 0 0 0-5 5L3 18l3 3 6.7-6.7a4 4 0 0 0 5-5l-2.8 2.8-2.2-2.2z"/></svg>', title:'Installation', sub:'Scheduled '+fmtDate(sched)+' — mark complete after install.', staff:'Complete the install ↓' };
    case 'qc':
      if(isTech) return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>', title:'Quality check', sub:'Run QC on the finished job in Dispatch.', staff:'' };
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>', title:'Quality check', sub: isCust?'Final quality check underway.':'Tech to pass QC.', staff:'Awaiting QC pass' };
    case 'customer_approval':
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg>', title:'Approve your completed project', sub:'Confirm everything looks great.',
        cta: isCust?{ico:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg> ', label:'Approve & accept', onclick:'approveCompletion()'}:null, staff:'Awaiting customer sign-off' };
    case 'final_payment':
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>', title:'Final payment', sub:'Balance due: $'+money2(sum.balance),
        cta: isCust?{label:'Mark balance as paid', onclick:'balanceClaim()'}:null, staff:'Awaiting final payment' };
    case 'complete':
    default:
      return { icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M2 22l4.5-13.5L15.5 17.5z"/><path d="M14 3c1.5 1 1.5 3 0 4M18 6c1.5 1 1.5 3 0 4M20 13h.01M16 2h.01M11 4h.01"/></svg>', title:'Welcome to your new system', sub:'Everything\'s set — here\'s your guide.',
        cta:{label:'View your welcome guide →', href:'/welcome.html?customer='+custId+(urlToken?'&token='+encodeURIComponent(urlToken):'')} };
  }
}
function nextStepCard(){
  const s=nextStep(); if(!s) return '';
  let cta='';
  if(s.cta){
    cta = s.cta.href ? '<a class="ns-cta" href="'+s.cta.href+'"'+(/welcome\.html/.test(s.cta.href)?' target="_blank" rel="noopener"':'')+'>'+(s.cta.ico||'')+esc(s.cta.label)+'</a>'
                     : '<button class="ns-cta" onclick="'+s.cta.onclick+'">'+(s.cta.ico||'')+esc(s.cta.label)+'</button>';
  } else if(view!=='customer' && s.staff){ cta='<span class="ns-staff">'+esc(s.staff)+'</span>'; }
  return '<div class="nextstep"><div class="ns-ic">'+s.icon+'</div>'+
    '<div class="ns-body"><div class="ns-lbl">Next step</div><div class="ns-title">'+esc(s.title)+'</div>'+
    (s.sub?'<div class="ns-sub">'+esc(s.sub)+'</div>':'')+'</div>'+cta+'</div>';
}

function adminBlock(){
  const c=project; const p=(c.proposals||[])[0]; const wos=c.workOrders||[];
  const statusList=['New','Contacted','Quoted','Follow-Up','Approved','Scheduled','In Progress','Completed','Closed'];
  let h='<div class="section"><h2>Manage <div class="ln"></div></h2>'+
    '<div class="row"><span class="t">Pipeline status</span>'+
      '<select onchange="setLeadStatus(this.value)">'+statusList.map(s=>'<option'+((c.status||'New')===s?' selected':'')+'>'+s+'</option>').join('')+'</select>'+
      '<button class="btn green" onclick="createWO()">+ Work Order</button>'+
      '<button class="btn ghost" onclick="copyCustomerLink()">Copy customer link</button>'+
      (p?'<button class="btn gold" onclick="proposalLink('+p.id+')">Proposal link</button>':'')+
    '</div>'+
    '<div class="navlinks"><a href="/dashboard.html">Dashboard</a><a href="/dispatch.html">Dispatch</a><a href="/index.html?customer='+c.id+(activeProject?('&project='+activeProject):'')+'">Open in Calculator</a><a href="/payroll.html">Payroll</a></div>';
  h+='</div>';
  h+=woSection('admin');
  return h;
}
function techBlock(){
  return '<div class="section"><h2>Assigned Jobs <div class="ln"></div></h2>'+
    ((project.workOrders||[]).length?'':'<div class="muted">No work orders yet for this project.</div>')+
    '</div>'+woSection('tech');
}
// ── Technician estimated compensation (no project costs shown) ──────────────
function techEstimateSection(){
  const e=project.techEstimate;
  let h='<div class="section"><h2>Estimated Compensation <div class="ln"></div></h2>';
  if(!e || !e.hasData){ return h+'<div class="muted" style="margin-top:8px;">'+esc((e&&e.note)||'Estimate not available yet.')+'</div></div>'; }
  const counts=[e.cameras?e.cameras+' camera'+(e.cameras===1?'':'s'):'', e.drops?e.drops+' drop'+(e.drops===1?'':'s'):''].filter(Boolean).join(' · ');

// ── Signature modal (draw / type) — adapted from the IOT PDF-sign tool ──────
let signModalOpen=false, sigMode='draw', sigInk='#0B0F1A', sigStyle=0, sigHasStroke=false, sigCtx=null, sigPadEl=null;
const SIG_STYLES=[
  "'Snell Roundhand','Segoe Script','Brush Script MT',cursive",
  "'Lucida Handwriting','Apple Chancery','Bradley Hand',cursive",
  "'Palatino Linotype','Book Antiqua','Georgia',serif"
];
const SIG_ITALIC=[false,false,true];
function ensureSignModal(){
  if(document.getElementById('sigscrim')) return;
  const d=document.createElement('div'); d.id='sigscrim'; d.className='sigscrim';
  d.innerHTML=
    '<div class="sigsheet">'+
      '<div class="sigsheet-head"><h3>Sign Proposal</h3><button class="sigx" onclick="closeSignModal()">&times;</button></div>'+
      '<div class="sigsheet-body">'+
        '<div class="sigfield"><label>Full name</label><input id="sig-name" type="text" autocomplete="name" placeholder="e.g. John Carter"></div>'+
        '<div class="sigtabs"><button class="sigtab sel" type="button" onclick="sigSetMode(\'draw\')">Draw</button><button class="sigtab" type="button" onclick="sigSetMode(\'type\')">Auto Text</button></div>'+
        '<div id="sig-panel-draw">'+
          '<div class="sigpadwrap"><canvas id="sig-pad"></canvas><div class="sigbaseline"></div><div class="sigpadhint" id="sig-padhint">Sign with your finger or mouse</div></div>'+
          '<div class="sigpadbar"><div class="siginks"><div class="sigink sel" data-ink="#0B0F1A" style="background:#0B0F1A"></div><div class="sigink" data-ink="#1c3faa" style="background:#1c3faa"></div></div><span style="flex:1"></span><button class="siglink" type="button" onclick="sigClear()">Clear</button></div>'+
        '</div>'+
        '<div id="sig-panel-type" style="display:none">'+
          '<div class="sigtypeprev empty" id="sig-typeprev">Enter a name above</div>'+
          '<div class="sigstylebar" id="sig-stylebar"><button class="sigstyleopt sel" type="button">Sign</button><button class="sigstyleopt" type="button">Sign</button><button class="sigstyleopt" type="button">Sign</button></div>'+
        '</div>'+
        '<label class="sigagree"><input type="checkbox" id="sig-agree"> I have reviewed and agree to the proposal terms.</label>'+
      '</div>'+
      '<div class="sigsheet-foot"><button class="btn ghost" type="button" onclick="closeSignModal()">Cancel</button><button class="btn green" id="sig-apply" type="button" onclick="sigApply()" disabled><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg> Accept &amp; Sign</button></div>'+
    '</div>';
  document.body.appendChild(d);
  // wire pad
  sigPadEl=document.getElementById('sig-pad'); sigCtx=sigPadEl.getContext('2d');
  let drawing=false,lx=0,ly=0;
  const pos=e=>{ const r=sigPadEl.getBoundingClientRect(),t=e.touches?e.touches[0]:e; return {x:t.clientX-r.left,y:t.clientY-r.top}; };
  sigPadEl.addEventListener('pointerdown',e=>{ e.preventDefault(); drawing=true; const p=pos(e); lx=p.x; ly=p.y; document.getElementById('sig-padhint').style.display='none'; });
  sigPadEl.addEventListener('pointermove',e=>{ if(!drawing)return; e.preventDefault(); const p=pos(e); sigCtx.strokeStyle=sigInk; sigCtx.lineWidth=2.6; sigCtx.lineJoin=sigCtx.lineCap='round'; sigCtx.beginPath(); sigCtx.moveTo(lx,ly); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); lx=p.x; ly=p.y; sigHasStroke=true; sigRefresh(); });
  window.addEventListener('pointerup',()=>{ drawing=false; });
  // ink swatches
  d.querySelectorAll('.sigink').forEach(sw=>sw.addEventListener('click',()=>{ d.querySelectorAll('.sigink').forEach(i=>i.classList.remove('sel')); sw.classList.add('sel'); sigInk=sw.dataset.ink; }));
  // type styles
  d.querySelectorAll('.sigstyleopt').forEach((b,i)=>b.addEventListener('click',()=>{ sigStyle=i; sigUpdateType(); }));
  document.getElementById('sig-name').addEventListener('input',()=>{ sigUpdateType(); sigRefresh(); });
  document.getElementById('sig-agree').addEventListener('change',sigRefresh);
  d.addEventListener('click',e=>{ if(e.target===d) closeSignModal(); });
}
function sigSizePad(){
  const r=sigPadEl.getBoundingClientRect(); if(!r.width) return;
  const dpr=window.devicePixelRatio||1;
  sigPadEl.width=r.width*dpr; sigPadEl.height=r.height*dpr;
  sigCtx.setTransform(dpr,0,0,dpr,0,0); sigCtx.lineJoin=sigCtx.lineCap='round'; sigCtx.strokeStyle=sigInk; sigCtx.lineWidth=2.6;
}
window.sigSetMode=function(m){
  sigMode=m;
  document.querySelectorAll('.sigtab').forEach(t=>t.classList.toggle('sel', t.textContent.toLowerCase().indexOf(m==='draw'?'draw':'auto')>=0));
  document.getElementById('sig-panel-draw').style.display=m==='draw'?'block':'none';
  document.getElementById('sig-panel-type').style.display=m==='type'?'block':'none';
  if(m==='draw') requestAnimationFrame(sigSizePad);
  sigRefresh();
};
window.sigClear=function(){ if(sigCtx){ sigCtx.clearRect(0,0,sigPadEl.width,sigPadEl.height); sigHasStroke=false; document.getElementById('sig-padhint').style.display='block'; sigRefresh(); } };
function sigUpdateType(){
  const raw=(document.getElementById('sig-name').value||'').trim(), prev=document.getElementById('sig-typeprev');
  if(!raw){ prev.textContent='Enter a name above'; prev.classList.add('empty'); }
  else { prev.textContent=raw; prev.classList.remove('empty'); prev.style.fontFamily=SIG_STYLES[sigStyle]; prev.style.fontStyle=SIG_ITALIC[sigStyle]?'italic':'normal'; }
  document.querySelectorAll('.sigstyleopt').forEach((b,i)=>{ b.textContent=raw||'Sign'; b.style.fontFamily=SIG_STYLES[i]; b.style.fontStyle=SIG_ITALIC[i]?'italic':'normal'; b.classList.toggle('sel',i===sigStyle); });
}
function sigRefresh(){
  const hasName=!!(document.getElementById('sig-name').value||'').trim();
  const agreed=document.getElementById('sig-agree').checked;
  const ok = sigMode==='draw' ? (hasName&&sigHasStroke&&agreed) : (hasName&&agreed);
  document.getElementById('sig-apply').disabled=!ok;
}
window.openSignModal=function(){
  ensureSignModal();
  signModalOpen=true; sigMode='draw'; sigStyle=0; sigHasStroke=false;
  document.getElementById('sig-name').value = (view==='customer' ? (project.name||project.business||'') : '');
  document.getElementById('sig-agree').checked=false;
  document.getElementById('sigscrim').classList.add('on');
  sigSetMode('draw'); sigClear(); sigUpdateType();
  requestAnimationFrame(()=>{ sigSizePad(); document.getElementById('sig-name').focus(); });
};
window.closeSignModal=function(){ signModalOpen=false; const s=document.getElementById('sigscrim'); if(s) s.classList.remove('on'); };
// build the final stamp PNG: signature mark + name + "Signed <timestamp>"
function sigBuildStamp(name){
  const ts=new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
  const S=2, W=520, sigH=150, labH=60, H=sigH+labH;
  const c=document.createElement('canvas'); c.width=W*S; c.height=H*S; const x=c.getContext('2d'); x.scale(S,S);
  x.fillStyle='#ffffff'; x.fillRect(0,0,W,H);
  // signature mark
  if(sigMode==='draw'){
    const b=sigStrokeBounds();
    if(b){ const fit=Math.min((W-40)/b.w,(sigH-20)/b.h), dw=b.w*fit, dh=b.h*fit; x.drawImage(sigPadEl,b.x,b.y,b.w,b.h,(W-dw)/2,(sigH-dh)/2,dw,dh); }
  } else {
    const fs=80, font=(SIG_ITALIC[sigStyle]?'italic ':'')+'400 '+fs+'px '+SIG_STYLES[sigStyle];
    x.font=font; x.fillStyle=sigInk; x.textBaseline='middle'; x.textAlign='center';
    let size=fs; const maxW=W-60; while(x.measureText(name).width>maxW && size>22){ size-=2; x.font=(SIG_ITALIC[sigStyle]?'italic ':'')+'400 '+size+'px '+SIG_STYLES[sigStyle]; }
    x.fillText(name, W/2, sigH/2); x.textAlign='left';
  }
  x.strokeStyle='#C9A96E'; x.lineWidth=1.4; x.beginPath(); x.moveTo(16,sigH); x.lineTo(W-16,sigH); x.stroke();
  x.fillStyle='#0B0F1A'; x.font='700 22px Helvetica,Arial,sans-serif'; x.textBaseline='alphabetic'; x.fillText(name,18,sigH+28);
  x.fillStyle='#1f8a4d'; x.font='600 13px Helvetica,Arial,sans-serif'; x.fillText('Signed '+ts,18,sigH+48);
  return c.toDataURL('image/png');
}
function sigStrokeBounds(){
  const img=sigCtx.getImageData(0,0,sigPadEl.width,sigPadEl.height).data;
  let minX=sigPadEl.width,minY=sigPadEl.height,maxX=0,maxY=0,found=false;
  for(let y=0;y<sigPadEl.height;y++) for(let xp=0;xp<sigPadEl.width;xp++) if(img[(y*sigPadEl.width+xp)*4+3]>10){ found=true; if(xp<minX)minX=xp; if(xp>maxX)maxX=xp; if(y<minY)minY=y; if(y>maxY)maxY=y; }
  if(!found) return null;
  const pad=8; minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad); maxX=Math.min(sigPadEl.width,maxX+pad); maxY=Math.min(sigPadEl.height,maxY+pad);
  return { x:minX, y:minY, w:maxX-minX, h:maxY-minY };
}
window.sigApply=async function(){
  const name=(document.getElementById('sig-name').value||'').trim();
  if(!name){ toast('Please enter your name'); return; }
  if(!document.getElementById('sig-agree').checked){ toast('Please agree to the terms'); return; }
  if(sigMode==='draw' && !sigHasStroke){ toast('Please draw your signature'); return; }
  const signature=sigBuildStamp(name);
  const p=(project.proposals||[])[0]||{};
  document.getElementById('sig-apply').disabled=true;
  await fetch(actionUrl('/sign'),{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name, signature, proposal_num:p.proposal_num||'', total:p.grand_total||0})});
  closeSignModal(); toast('Thank you — proposal signed!'); load();
};

// Deposit approval workflow: customer self-reports (Pending) → staff Approve / Waive / Follow-up
function depositBlock(staff, sum){
  if(!(sum.depositRequired>0)) return '';
  let cls, txt;
  if(sum.depositWaived){ cls='met'; txt='<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg> Deposit waived'; }
  else if(sum.depositMet){ cls='met'; txt='<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg> Deposit received'; }
  else if(sum.depositPending){ cls='pending'; txt='<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M6 2h12M6 22h12M6 2c0 5 4 6 6 8 2-2 6-3 6-8M6 22c0-5 4-6 6-8 2 2 6 3 6 8"/></svg> Deposit reported by customer — awaiting confirmation'; }
  else { cls='short'; txt=(staff?'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M10.3 3.5 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.5a2 2 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Deposit not yet received':'Deposit required to start'); }
  let h='<div class="depositbar '+cls+'">'+txt+' &nbsp;Deposit to start: <b>$'+money2(sum.depositRequired)+'</b>'+
    (sum.depositMet?'':(sum.depositPending&&sum.depositMethod?' &nbsp;·&nbsp; via '+esc(sum.depositMethod):(sum.paid>0?' &nbsp;·&nbsp; paid $'+money2(sum.paid):'')))+'</div>';
  if(staff && sum.depositPending){
    h+='<div class="row" style="margin-top:10px;gap:8px;flex-wrap:wrap;">'+
      '<button class="btn green" onclick="depositDecision(\'approve\')"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg> Approve deposit</button>'+
      '<button class="btn" onclick="depositDecision(\'waive\')">Waive deposit</button>'+
      '<button class="btn ghost" onclick="depositDecision(\'followup\')">Circle back / follow up</button>'+
    '</div>';
  }
  if(!staff && !sum.depositMet && !sum.depositPending){
    h+='<div class="row" style="margin-top:10px;gap:8px;flex-wrap:wrap;align-items:center;">'+
      '<select id="dep-method" class="minput"><option value="">How did you pay?</option><option>Zelle</option><option>Check</option><option>Cash</option><option>Card</option></select>'+
      '<button class="btn green" onclick="depositClaim()">I\'ve paid the deposit</button>'+
    '</div><div class="muted" style="margin-top:6px;font-size:12px;">Mark it paid and IOT Techs will confirm, then start scheduling.</div>';
  }
  if(!staff && sum.depositPending){
    h+='<div class="muted" style="margin-top:8px;font-size:12px;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M6 2h12M6 22h12M6 2c0 5 4 6 6 8 2-2 6-3 6-8M6 22c0-5 4-6 6-8 2 2 6 3 6 8"/></svg> Thanks! We received your deposit notice and will confirm shortly.</div>';
  }
  return h;
}

function fmtSize(b){ b=Number(b)||0; if(b<1024)return b+' B'; if(b<1048576)return Math.round(b/1024)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
// Friendly document type → clean label (no long file names, no duplicates)
function cleanDocName(n){ return String(n||'').replace(/\.[a-z0-9]+$/i,'').replace(/[\-_]+/g,' ').replace(/\s+/g,' ').trim() || 'Document'; }
function docMeta(d){
  const src=(d.source||'').toLowerCase(), nm=(d.name||'').toLowerCase();
  if(src.indexOf('proposal')>=0 || nm.indexOf('proposal')>=0) return {type:'proposal', label:'Proposal', icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h8M8 9h2"/></svg>'};
  if(src.indexOf('addendum')>=0 || nm.indexOf('addendum')>=0) return {type:'addendum', label:'Work Order Addendum', icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M21.4 11.05 12.25 20.2a5 5 0 0 1-7.07-7.07l9.19-9.19a3 3 0 0 1 4.24 4.24l-9.2 9.19a1 1 0 0 1-1.41-1.41l8.49-8.49"/></svg>'};
  if(src.indexOf('completion')>=0 || nm.indexOf('completion')>=0 || nm.indexOf('certificate')>=0) return {type:'completion', label:'Job Completion Certificate', icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><circle cx="12" cy="15" r="6"/><path d="M9 9.5 7 2h10l-2 7.5"/><path d="M12 13l.9 1.8 2 .3-1.4 1.4.3 2-1.8-1-1.8 1 .3-2-1.4-1.4 2-.3z"/></svg>'};
  if(src.indexOf('receipt')>=0 || nm.indexOf('receipt')>=0) return {type:'receipt', label:'Payment Receipt', icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M5 2v20l2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1z"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="9" y1="12" x2="15" y2="12"/></svg>'};
  if(src.indexOf('invoice')>=0 || nm.indexOf('invoice')>=0) return {type:'invoice', label:'Invoice', icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M5 2v20l2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1z"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="9" y1="12" x2="15" y2="12"/></svg>'};
  if(src.indexOf('work order')>=0 || src.indexOf('workorder')>=0 || nm.indexOf('work order')>=0) return {type:'workorder', label:'Work Order', icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M14.7 6.3a4 4 0 0 0-5 5L3 18l3 3 6.7-6.7a4 4 0 0 0 5-5l-2.8 2.8-2.2-2.2z"/></svg>'};
  if(src==='for-signature' || src.indexOf('signature')>=0) return {type:'tosign', label:'Document for Signature', icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M12 19h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>'};
  return {type:'doc', label:cleanDocName(d.name), icon:'<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h8M8 9h2"/></svg>'};
}
// keep one document per known type (newest first → signed proposal wins over unsigned); arbitrary uploads kept as-is
function dedupeDocs(docs){
  const seen={}, out=[];
  docs.forEach(d=>{ const m=docMeta(d); d._meta=m;
    const key = m.type==='doc' ? ('doc:'+m.label.toLowerCase()) : m.type;   // known types: one each; uploads: one per name
    if(!seen[key]){ seen[key]=1; out.push(d); } });
  return out;
}

  return '<div class="payrow"><div style="flex:1;min-width:0;"><span class="t">'+m.icon+' '+esc(m.label)+'</span>'+badges+

  '</div>';

    '</div>';
  }
  return h+'</div>';
}
window.uploadDoc=async function(){
  const inp=document.getElementById('doc-file'); const f=inp.files&&inp.files[0]; if(!f){ toast('Choose a file first'); return; }
  if(f.size>18*1024*1024){ toast('File too large (max ~18MB)'); return; }
  const signReq=document.getElementById('doc-sign').checked;
  const vis=signReq?'external':(document.getElementById('doc-vis').checked?'external':'internal');
  toast('Uploading…');
  const data=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(); r.readAsDataURL(f); });
  const r=await (await fetch(actionUrl('/documents'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:f.name,mime:f.type||'application/octet-stream',data,visibility:vis,signatureRequired:signReq})})).json();
  inp.value=''; document.getElementById('doc-sign').checked=false;
  if(r && r.signUrl){ toast('Uploaded — signature requested'); }
  else toast('Document added');
  load();
};
window.delDoc=async function(id){ if(!confirm('Delete this document?'))return; await fetch('/api/documents/'+id,{method:'DELETE'}); toast('Deleted'); load(); };

// ── Project Notes (internal, persistent scratchpad — auto-saves) ────────────
function notesSection(){
  return '<div class="section"><h2>Project Notes <div class="ln"></div></h2>'+
    '<div class="row" style="display:block;">'+
      '<textarea id="proj-notes" class="minput" style="width:100%;min-height:96px;resize:vertical;" placeholder="Internal notes — scope details, site access, gate codes, special requests… anything the team should know." oninput="queueNotesSave()">'+esc(project.notes||'')+'</textarea>'+
      '<div class="muted" style="font-size:11px;margin-top:6px;">Internal · auto-saves · not shown to the customer.</div>'+
    '</div></div>';
}
let _notesT=null;
window.queueNotesSave=function(){ clearTimeout(_notesT); _notesT=setTimeout(saveNotes,900); };
async function saveNotes(){
  const ta=document.getElementById('proj-notes'); if(!ta) return;
  const val=ta.value; if(project) project.notes=val;
  try{ await fetch('/api/customers/'+custId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:val})}); toast('Notes saved'); }catch(e){}
}

function notFoundHTML(msg){
  return '<div class="pcard" style="margin-top:30px;text-align:center;">'+
    '<div class="pn" style="font-size:18px;">'+esc(msg||'Project not found')+'</div>'+
    '<div class="pm" style="margin:8px 0 16px;">This project may have been deleted, or the link is out of date.</div>'+
    '<div class="navlinks" style="justify-content:center;"><a href="/home.html">← Home</a><a href="/dashboard.html">Dashboard</a><a href="/dispatch.html">Dispatch</a></div>'+
    '</div>';
}
function render(){
  if(!project){ document.getElementById('app').innerHTML=notFoundHTML('Project not found'); return; }
  document.querySelectorAll('.role').forEach(b=>b.classList.toggle('on', b.dataset.v===view));
  let h=signBanner()+header()+tracker();
  if(view==='admin') h+=adminBlock()+addendumApprovalSection()+woLineItemsSection()+notesSection()+signSection(true)+paymentsSection(true)+documentsSection('admin')+logsSection(true);
  else if(view==='tech') h+=techBlock()+techEstimateSection()+notesSection()+logsSection(true);
  else h+=customerBlock()+addendumApprovalSection()+signSection(false)+paymentsSection(false)+woSection('customer')+documentsSection('customer')+logsSection(false);
  h+='<footer><span class="g">IOT TECHS / La Vague Inc.</span> &nbsp;·&nbsp; (646) 396-0775 · support@iot-techs.com</footer>';
  document.getElementById('app').innerHTML=h;
}

window.setView=function(v){ view=v; const u=new URLSearchParams(location.search); u.set('view',v); history.replaceState(null,'','?'+u.toString()); load(); };

// ── Project switcher: a customer can hold several independent projects ───────
let projectsCache=null;
window.switchProject=function(pid){
  if(String(pid)===String(activeProject)) { const m=document.getElementById('projsel-menu'); if(m) m.classList.remove('on'); return; }
  activeProject=pid;
  const u=new URLSearchParams(location.search); u.set('project',pid); history.replaceState(null,'','?'+u.toString());
  load();
};
window.toggleProjMenu=function(e){ if(e) e.stopPropagation(); const m=document.getElementById('projsel-menu'); if(m) m.classList.toggle('on'); };
document.addEventListener('click',()=>{ const m=document.getElementById('projsel-menu'); if(m) m.classList.remove('on'); });
async function renderProjectSelector(){
  const host=document.getElementById('projsel'); if(!host) return;
  // Admin always; a logged-in customer (no share token) may switch among their own projects.
  // Token/tech views are pinned to one project — no switcher.
  const isStaff = view==='admin';
  const canSwitch = isStaff || (view==='customer' && !urlToken);
  if(!canSwitch){ host.style.display='none'; return; }
  if(!projectsCache){ try{ projectsCache=await (await fetch('/api/customers/'+custId+'/projects')).json(); }catch(e){ projectsCache=[]; } }
  const list=Array.isArray(projectsCache)?projectsCache:[];
  // Customers only get a switcher when they actually have more than one project.
  if(list.length<=0 || (!isStaff && list.length<2)){ host.style.display='none'; return; }
  const cur=list.find(p=>String(p.id)===String(activeProject)) || list[0];
  const single=list.length===1;
  host.style.display='block';
  host.innerHTML=
    '<button class="projsel-btn" onclick="toggleProjMenu(event)" title="Switch project">'+
      '<span class="pn">'+esc(cur?(cur.name||cur.site_address||('Project #'+cur.id)):'Project')+'</span>'+
      '<span class="cv">'+(single?'':(list.length+' projects'))+'</span>'+
      '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>'+
    '</button>'+
    '<div class="projsel-menu" id="projsel-menu">'+
      list.map(p=>'<div class="projsel-item'+(String(p.id)===String(cur&&cur.id)?' cur':'')+'" onclick="switchProject('+p.id+')">'+
        '<span class="t">'+(String(p.id)===String(cur&&cur.id)?'<span class="dot"></span>':'')+esc(p.name||p.site_address||('Project #'+p.id))+'</span>'+
        '<span class="s">'+esc(p.currentLabel||p.status||'')+(p.total?(' · $'+money(p.total)):'')+'</span>'+
      '</div>').join('')+
      (isStaff?'<div class="projsel-new"><button onclick="staffNewProject()">+ New project for this customer</button></div>':'')+
    '</div>';
}
window.staffNewProject=async function(){
  const name=prompt('New project name (e.g. address or location):',''); if(name===null) return;
  const addr=prompt('Site address (optional):','')||'';
  const r=await (await fetch('/api/customers/'+custId+'/projects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:(name||'').trim(),site_address:addr.trim()})})).json();
  if(r&&r.ok&&r.projectId){ projectsCache=null; toast('Project created'); switchProject(r.projectId); }
  else toast(r&&r.error||'Could not create project');
};
window.setLeadStatus=async function(s){ await fetch('/api/customers/'+custId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})}); toast('Status → '+s); load(); };
window.createWO=async function(){ const r=await (await fetch('/api/workorders/from-lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customerId:custId,projectId:activeProject})})).json(); if(r.ok){ toast('Work order created'); load(); } };
window.copyCustomerLink=function(){ const t=(project&&project.access_token)?('&token='+project.access_token):''; const pp=activeProject?('&project='+encodeURIComponent(activeProject)):''; const link=location.origin+'/project.html?customer='+custId+pp+'&view=customer'+t; navigator.clipboard.writeText(link).then(()=>toast('Customer link copied')).catch(()=>prompt('Customer link:',link)); };
window.proposalLink=function(id){ fetch('/api/proposals/'+id+'/share-link',{method:'POST'}).then(r=>r.json()).then(d=>{ if(d&&d.url){ const link=location.origin+d.url; navigator.clipboard.writeText(link).then(()=>toast('Proposal link copied — opening preview')).catch(()=>prompt('Proposal link:',link)); window.open(link,'_blank'); } else toast(d&&d.error||'Could not create link'); }).catch(()=>toast('Could not create link')); };

// ── Customer self-service: Need Help + Start Another Project ────────────────
// Universal builder for project-scoped endpoints: path :id is the CUSTOMER id;
// ?project=<pid> tells the server which of the customer's projects to act on.
function actionUrl(path){
  const parts=[]; if(activeProject) parts.push('project='+encodeURIComponent(activeProject));
  if(urlToken) parts.push('token='+encodeURIComponent(urlToken));
  return '/api/project/'+custId+path+(parts.length?('?'+parts.join('&')):'');
}
function ensureModal(){
  if(document.getElementById('mscrim')) return document.getElementById('mscrim');
  const d=document.createElement('div'); d.id='mscrim'; d.className='mscrim';
  d.innerHTML='<div class="msheet"><div class="mhead"><span id="m-title"></span><button class="x" onclick="closeModal()">&times;</button></div><div class="mbody" id="m-body"></div></div>';
  document.body.appendChild(d);
  d.addEventListener('click',e=>{ if(e.target===d) closeModal(); });
  return d;
}
window.closeModal=function(){ const d=document.getElementById('mscrim'); if(d) d.classList.remove('on'); };
function openModal(title, body){ const d=ensureModal(); document.getElementById('m-title').textContent=title; document.getElementById('m-body').innerHTML=body; d.classList.add('on'); }

window.openHelp=function(){
  openModal('Need Help?',
    '<label>How can we help?</label>'+
    '<textarea id="help-msg" rows="4" placeholder="Describe the issue or question…"></textarea>'+
    '<button class="btn green" style="margin-top:16px;width:100%;" onclick="submitHelp()">Send Help Request</button>');
  setTimeout(()=>document.getElementById('help-msg').focus(),50);
};
window.submitHelp=async function(){
  const msg=(document.getElementById('help-msg').value||'').trim();
  if(!msg){ toast('Please describe how we can help'); return; }
  const r=await (await fetch(actionUrl('/help'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})})).json();
  closeModal(); if(r&&r.ok){ toast('Help request sent — we’ll be in touch'); load(); } else toast(r&&r.error||'Could not send');
};
window.resolveHelp=async function(){ await fetch(actionUrl('/resolve-help'),{method:'POST'}); toast('Marked resolved'); load(); };

let npMode='existing';
window.openNewProject=function(){
  const cur=esc(project.business||project.name||'this project');
  openModal('Start Another Project',
    '<div class="muted" style="font-size:12.5px;margin-bottom:12px;">Want more work done? Add it to your current project, or set up a new location.</div>'+
    '<div class="mchoice">'+
      '<div class="mopt sel" id="np-existing" onclick="npSelect(\'existing\')"><div class="ot">Add to this project</div><div class="od">'+cur+'</div></div>'+
      '<div class="mopt" id="np-new" onclick="npSelect(\'new\')"><div class="ot">New location</div><div class="od">A different address</div></div>'+
    '</div>'+
    '<div id="np-new-fields" style="display:none;">'+
      '<label>Address</label><div class="addrbox"><input id="np-addr" placeholder="Start typing the address…" autocomplete="off" oninput="npAddr(this.value)"><div class="addrsug" id="np-sug" style="display:none;"></div></div>'+
      '<label>Business / location name</label><input id="np-biz" placeholder="e.g. Second store">'+
      '<label>Phone (optional)</label><input id="np-phone">'+
    '</div>'+
    '<label>Details (optional)</label><textarea id="np-details" rows="3" placeholder="What would you like done?"></textarea>'+
    '<button class="btn green" style="margin-top:16px;width:100%;" onclick="submitNewProject()">Submit Request</button>');
  npMode='existing';
};
window.npSelect=function(m){ npMode=m;
  document.getElementById('np-existing').classList.toggle('sel',m==='existing');
  document.getElementById('np-new').classList.toggle('sel',m==='new');
  document.getElementById('np-new-fields').style.display = m==='new'?'block':'none';
};
let _npAddrT;
window.npAddr=function(q){
  clearTimeout(_npAddrT); const box=document.getElementById('np-sug');
  if(!q || q.length<3){ box.style.display='none'; return; }
  _npAddrT=setTimeout(async()=>{
    try{
      const r=await (await fetch('/api/address/autocomplete?q='+encodeURIComponent(q))).json();
      const preds=r.predictions||[];
      if(!preds.length){ box.style.display='none'; return; }
      box.innerHTML=preds.slice(0,6).map(p=>'<div onclick="npPick(\''+(p.place_id||'').replace(/\x27/g,'')+'\',\''+esc(p.description||p.formatted||'').replace(/\x27/g,'')+'\')">'+esc(p.description||p.formatted||'')+'</div>').join('');
      box.style.display='block';
    }catch(e){ box.style.display='none'; }
  },280);
};
window.npPick=async function(placeId,desc){
  const box=document.getElementById('np-sug'); box.style.display='none';
  document.getElementById('np-addr').value=desc;
  if(placeId){ try{ const d=await (await fetch('/api/address/details?placeId='+encodeURIComponent(placeId))).json();
    if(d && (d.formatted||d.street)){ document.getElementById('np-addr').value=d.formatted||[d.street,d.city,d.state,d.zip].filter(Boolean).join(', '); if(d.name && !document.getElementById('np-biz').value) document.getElementById('np-biz').value=d.name; } }catch(e){} }
};
window.submitNewProject=async function(){
  const body={ mode:npMode, details:(document.getElementById('np-details').value||'').trim() };
  if(npMode==='new'){
    body.address=(document.getElementById('np-addr').value||'').trim();
    body.business=(document.getElementById('np-biz').value||'').trim();
    body.phone=(document.getElementById('np-phone').value||'').trim();
    if(!body.address && !body.business){ toast('Enter an address or location name'); return; }
  }
  const r=await (await fetch(actionUrl('/new-lead'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
  closeModal();
  if(r&&r.ok){
    toast(npMode==='new'?'New project started — switching to it.':'Added to your project — we’ll follow up.');
    if(npMode==='new' && r.projectId){ projectsCache=null; switchProject(r.projectId); }   // jump to the freshly created project
    else load();
  }
  else toast(r&&r.error||'Could not submit');
};

const urlToken = qs('token') || '';
let activeProject = qs('project') || null;   // which project of the customer to show (null → server picks most-recent)
function scopeQ(){
  const parts=[]; const sc = view==='customer'?'external':view==='tech'?'tech':'';
  if(sc) parts.push('scope='+sc);
  if(activeProject) parts.push('project='+encodeURIComponent(activeProject));
  if(urlToken) parts.push('token='+encodeURIComponent(urlToken));
  return parts.length?('?'+parts.join('&')):'';
}
function editingNote(){
  if(signModalOpen) return true;              // signature modal open — don't re-render under it
  const a=document.activeElement; return a && a.closest && a.closest('.section') && /TEXTAREA|INPUT|SELECT|CANVAS/.test(a.tagName);
}
async function load(){
  try{ project = await (await fetch('/api/project/'+custId+scopeQ())).json(); }catch(e){ project=null; }
  if(project && project.error) project=null;
  if(project && project.project_id) activeProject = project.project_id;   // pin to the resolved project
  render();
  renderProjectSelector();
}
async function poll(){
  if(editingNote()) return;          // don't wipe a note being typed
  let p; try{ p = await (await fetch('/api/project/'+custId+scopeQ())).json(); }catch(e){ return; }
  if(p && p.error) return;
  project = p; if(!editingNote()) render();
}

custId = qs('customer');
const v0 = qs('view'); if(v0) view=v0;
if(!custId){ document.getElementById('app').innerHTML=notFoundHTML('No project selected'); }
else { initRole(); }

// Lock the view to the signed-in role (or customer, via token). Toggle is admin-only.
async function initRole(){
  let me={}; try{ me = await (await fetch('/api/me')).json(); }catch(e){}
  const roles=document.getElementById('roles');
  if(!me.authEnabled){ if(!v0) view='admin'; }                              // pre-setup: open, full toggle
  else if(me.user && me.user.role==='admin'){ if(!v0) view='admin'; }       // admin: keep toggle
  else if(me.user && me.user.role==='tech'){ view='tech'; if(roles) roles.style.display='none'; }
  else { view='customer'; if(roles) roles.style.display='none'; }           // customer via token link
  load(); setInterval(poll, 4000); window.addEventListener('focus', poll);
}
</script>
