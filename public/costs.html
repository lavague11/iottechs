<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standard Costs — IOT TECHS</title>
<script>window.IOT_REQUIRE='manager'</script><script src="/auth.js"></script>
<style>
  :root{ --cream:#FAF8F4; --slate:#2C3347; --gold:#C9A96E; --gold-dim:#9c7f48; --ink:#0B0F1A; --ink-2:#121726; --line:#2a3247; --green:#4ADE80; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:var(--ink);min-height:100%;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--cream);min-height:100vh;line-height:1.5;
    background:radial-gradient(900px 500px at 80% -5%, rgba(201,169,110,.12), transparent 60%), var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:120px;}
  header{background:linear-gradient(180deg,var(--slate) 0%, #232a3b 100%);border-bottom:3px solid var(--gold);padding:22px 0;}
  .wrap{max-width:880px;margin:0 auto;padding:0 22px;}
  .hwrap{max-width:880px;margin:0 auto;padding:0 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .brand h1{font-size:20px;letter-spacing:3px;font-weight:700;color:#fff;}
  .brand .tag{color:var(--gold);letter-spacing:2px;font-size:10px;margin-top:4px;text-transform:uppercase;}
  .back{color:var(--gold);text-decoration:none;font-size:13px;font-weight:700;border:1px solid var(--gold-dim);border-radius:8px;padding:8px 13px;}
  .intro{color:#b9c0cf;font-size:13px;margin:22px 0 8px;}
  .cat{background:var(--ink-2);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:14px;padding:18px 20px;margin-top:18px;}
  .cat h2{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:4px;}
  .cat .sub{font-size:11px;color:#7e879a;margin-bottom:14px;}
  .row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #1c2230;}
  .row:last-child{border-bottom:none;}
  .row .nm{flex:1;min-width:0;font-size:14px;color:#e6e9f0;}
  .row input.nmin{flex:1;min-width:0;background:#0e1422;border:1px solid var(--line);color:#fff;border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;}
  .pwrap{display:flex;align-items:center;background:#0e1422;border:1px solid var(--line);border-radius:8px;padding:0 10px;}
  .pwrap span{color:#8a93a6;font-size:13px;}
  .pwrap input{width:90px;background:transparent;border:none;color:#fff;font:inherit;font-size:14px;font-weight:700;padding:9px 6px;text-align:right;outline:none;}
  .pwrap input:focus{color:var(--gold);}
  .del{background:none;border:1px solid #5a2b2e;color:#d98a8e;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:15px;flex:0 0 auto;}
  .add{margin-top:10px;background:none;border:1px dashed var(--gold-dim);color:var(--gold);border-radius:8px;padding:8px 13px;font-size:12px;font-weight:700;cursor:pointer;}
  .savebar{position:fixed;left:0;right:0;bottom:0;background:rgba(11,15,26,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:14px 0;z-index:50;}
  .savebar .wrap{display:flex;align-items:center;gap:14px;justify-content:flex-end;}
  .savebar .msg{margin-right:auto;font-size:12px;color:#9aa3b5;}
  .btn{background:linear-gradient(135deg,var(--gold),#A07840);color:var(--ink);border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:800;cursor:pointer;}
  .btn:disabled{opacity:.55;cursor:default;}
  .btn.ghost{background:transparent;color:var(--gold);border:1px solid var(--gold-dim);}
  .muted{color:#7e879a;}
</style>
</head>
<body>
<header><div class="hwrap"><div class="brand"><h1>IOT&nbsp;TECHS</h1><div class="tag">Standard Costs</div></div>
  <a class="back" href="/index.html">← Calculator</a></div></header>
<div class="wrap">
  <p class="intro">Edit your standard prices once here — every new proposal uses them. Changing a price here does <b>not</b> alter proposals you've already saved.</p>
  <div id="cats"><div class="muted" style="margin-top:30px;">Loading…</div></div>
</div>
<div class="savebar"><div class="wrap"><span class="msg" id="msg"></span>
  <a class="btn ghost" href="/index.html">Cancel</a>
  <button class="btn" id="saveBtn" onclick="save()">Save Standard Costs</button></div></div>
<script>
const CATS = [
  { key:'camera',  title:'Security Cameras', sub:'Labor & equipment for camera installs' },
  { key:'speaker', title:'Speakers',          sub:'Audio install, drops & equipment' },
  { key:'toast',   title:'Toast',             sub:'Drop, test, mount, per-diem & setup rates' },
  { key:'adt',     title:'ADT',               sub:'Alarm panel, sensors, install & monitoring — set your prices' },
];
let book = {};
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function money(n){ return (Number(n)||0).toLocaleString('en-US'); }
async function load(){
  try{ book = await (await fetch('/api/pricebook')).json(); }catch(e){ document.getElementById('cats').innerHTML='<p class="muted">Could not load.</p>'; return; }
  render();
}
function render(){
  document.getElementById('cats').innerHTML = CATS.map(function(c){
    const items = book[c.key]||[];
    return '<div class="cat"><h2>'+esc(c.title)+'</h2><div class="sub">'+esc(c.sub)+'</div>'+
      '<div id="rows-'+c.key+'">'+ items.map(function(it,i){ return rowHTML(c.key,it,i); }).join('') +'</div>'+
      '<button class="add" onclick="addItem(\''+c.key+'\')">+ Add item</button></div>';
  }).join('');
}
function rowHTML(cat,it,i){
  return '<div class="row" data-cat="'+cat+'" data-i="'+i+'">'+
    '<input class="nmin" value="'+esc(it.desc)+'" oninput="setField(\''+cat+'\','+i+',\'desc\',this.value)" placeholder="Item name">'+
    '<div class="pwrap"><span>$</span><input type="number" min="0" step="1" value="'+(Number(it.price)||0)+'" oninput="setField(\''+cat+'\','+i+',\'price\',this.value)"></div>'+
    '<button class="del" title="Remove" onclick="delItem(\''+cat+'\','+i+')">×</button></div>';
}
window.setField=function(cat,i,f,v){ if(!book[cat]||!book[cat][i])return; book[cat][i][f] = f==='price'?(Number(v)||0):v; dirty(); };
window.addItem=function(cat){ if(!book[cat])book[cat]=[]; book[cat].push({desc:'',price:0}); render(); dirty(); };
window.delItem=function(cat,i){ if(!book[cat])return; book[cat].splice(i,1); render(); dirty(); };
function dirty(){ document.getElementById('msg').textContent='Unsaved changes'; }
window.save=async function(){
  const btn=document.getElementById('saveBtn'); btn.disabled=true; document.getElementById('msg').textContent='Saving…';
  try{
    const r=await (await fetch('/api/pricebook',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({priceBook:book})})).json();
    if(r&&r.ok){ book=r.priceBook; render(); document.getElementById('msg').textContent='Saved — new proposals use these prices'; }
    else document.getElementById('msg').textContent=(r&&r.error)||'Save failed';
  }catch(e){ document.getElementById('msg').textContent='Save failed'; }
  btn.disabled=false;
};
load();
</script>
</body>
</html>
