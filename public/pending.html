<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOT TECHS — Pending Approval</title>
<style>
  :root{ --cream:#FAF8F4; --ink:#0B0F1A; --ink-2:#121726; --slate:#2C3347; --gold:#C9A96E; --line:#2a3247; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center;
    background:radial-gradient(900px 500px at 50% -10%, rgba(201,169,110,.12), transparent 60%), var(--ink);}
  .card{max-width:440px;width:100%;background:var(--ink-2);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:16px;padding:34px 30px;box-shadow:0 30px 80px rgba(0,0,0,.5);}
  .brand h1{font-size:22px;letter-spacing:5px;font-weight:700;color:#fff;}
  .brand .tag{color:var(--gold);letter-spacing:3px;font-size:10px;margin-top:6px;text-transform:uppercase;}
  .clock{font-size:42px;margin:22px 0 12px;}
  h2{font-size:17px;color:#fff;margin-bottom:8px;}
  p{font-size:13.5px;color:#9aa3b5;line-height:1.6;}
  p b{color:#cfd5e0;}
  .btn{margin-top:22px;background:transparent;color:var(--gold);border:1px solid var(--gold);border-radius:8px;padding:11px 20px;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><h1>IOT&nbsp;TECHS</h1><div class="tag">La Vague Inc.</div></div>
  <div class="clock"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M6 2h12M6 22h12M6 2c0 5 4 6 6 8 2-2 6-3 6-8M6 22c0-5 4-6 6-8 2 2 6 3 6 8"/></svg></div>
  <h2 id="hi">Account pending approval</h2>
  <p>Your login was created<span id="who"></span>. An administrator needs to grant your access (role) before you can use the app.</p>
  <p style="margin-top:10px;">You'll be able to sign in normally once your role is assigned.</p>
  <button class="btn" onclick="logout()">Sign out</button>
</div>
<script>
fetch('/api/me').then(r=>r.json()).then(d=>{
  if(!d.user){ location.href='/login.html'; return; }
  // already has access? send them on
  if(d.user.roles && d.user.roles.length){ location.href = d.user.role==='customer' && d.user.customer_id ? ('/project.html?customer='+d.user.customer_id+'&view=customer') : '/home.html'; return; }
  document.getElementById('who').textContent = d.user.name ? (', '+d.user.name) : '';
}).catch(()=>{});
function logout(){ fetch('/api/logout',{method:'POST'}).then(()=>location.href='/login.html'); }
</script>
</body>
</html>
