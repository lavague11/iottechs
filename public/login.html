<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IOT TECHS — Sign In</title>
<style>
  :root{ --cream:#FAF8F4; --ink:#0B0F1A; --ink-2:#121726; --slate:#2C3347; --gold:#C9A96E; --gold-dim:#9c7f48; --line:#2a3247; --green:#1f6b4f; --red:#b04545; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(900px 500px at 50% -10%, rgba(201,169,110,.12), transparent 60%), var(--ink);}
  .card{width:100%;max-width:380px;background:var(--ink-2);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:16px;padding:30px 28px 26px;box-shadow:0 30px 80px rgba(0,0,0,.5);}
  .brand{text-align:center;margin-bottom:22px;}
  .brand h1{font-size:22px;letter-spacing:5px;font-weight:700;color:#fff;}
  .brand .tag{color:var(--gold);letter-spacing:3px;font-size:10px;margin-top:6px;text-transform:uppercase;}
  h2{font-size:15px;letter-spacing:.06em;color:#fff;margin-bottom:4px;font-weight:700;}
  .sub{font-size:12px;color:#8b93a5;margin-bottom:18px;}
  label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8b93a5;font-weight:700;margin:14px 0 6px;}
  input{width:100%;background:var(--ink);border:1px solid var(--line);color:#fff;border-radius:8px;padding:12px 13px;font-size:15px;outline:none;}
  input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.2);}
  .btn{width:100%;margin-top:20px;background:var(--gold);color:var(--ink);border:none;border-radius:8px;padding:13px;font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .err{margin-top:14px;background:#3a1d1d;border:1px solid #6b2f2f;color:#ffd9d9;border-radius:8px;padding:10px 12px;font-size:12.5px;display:none;}
  .err.on{display:block;}
  .foot{text-align:center;color:#6b7385;font-size:11px;letter-spacing:1.5px;margin-top:22px;}
  .alt{text-align:center;margin-top:18px;font-size:12.5px;color:#8b93a5;}
  .linkbtn{background:none;border:none;color:var(--gold);font:inherit;font-weight:700;cursor:pointer;text-decoration:underline;padding:0;}
  .orline{display:flex;align-items:center;gap:12px;margin:18px 0 14px;color:#6b7385;font-size:11px;letter-spacing:2px;}
  .orline::before,.orline::after{content:"";flex:1;height:1px;background:var(--line);}
  #gbtn{display:flex;justify-content:center;}
  #gbtn-inner{color-scheme:light;}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><h1>IOT&nbsp;TECHS</h1><div class="tag">La Vague Inc.</div></div>
  <div id="formArea"><div class="sub">Loading…</div></div>
  <div class="err" id="err"></div>
  <div class="foot">SECURE TOMORROW. TODAY.</div>
</div>
<script>
const $=id=>document.getElementById(id);
function nextUrl(){ try{ return new URLSearchParams(location.search).get('next')||''; }catch(e){ return ''; } }
function go(user){
  if(user && (!user.roles || !user.roles.length)){ location.href='/pending.html'; return; }
  if(user && user.role==='customer'){ location.href = user.customer_id ? ('/project.html?customer='+user.customer_id+'&view=customer') : '/home.html'; return; }
  const n=nextUrl(); if(n && n.indexOf('/login')<0){ location.href=n; return; }
  location.href = '/home.html';
}
function showErr(m){ const e=$('err'); e.textContent=m; e.className='err on'; }
function clearErr(){ $('err').className='err'; }

fetch('/api/me').then(r=>r.json()).then(d=>{
  if(d.user) return go(d.user);                 // already signed in
  if(!d.authEnabled) renderSetup(); else renderLogin();
}).catch(()=>renderLogin());

function renderLogin(){
  $('formArea').innerHTML =
    '<h2>Sign in</h2><div class="sub">Sign in to your account.</div>'+
    '<form id="f"><label>Username</label><input id="u" autocomplete="username" autofocus>'+
    '<label>Password</label><input id="p" type="password" autocomplete="current-password">'+
    '<button class="btn" type="submit">Sign In</button></form>'+
    '<div id="gbtn"></div>'+
    '<div class="alt">New here? <button class="linkbtn" type="button" onclick="renderSignup()">Create a login</button></div>';
  $('f').onsubmit = async e=>{ e.preventDefault(); clearErr();
    const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:$('u').value,password:$('p').value})}).then(r=>r.json()).catch(()=>({}));
    if(r.ok) go(r.user); else showErr(r.error||'Sign in failed');
  };
  initGoogle();
}
function renderSignup(){
  clearErr();
  $('formArea').innerHTML =
    '<h2>Create a login</h2><div class="sub">Create your account — an admin will grant your access.</div>'+
    '<form id="f"><label>Your name</label><input id="n" autocomplete="name" autofocus>'+
    '<label>Username</label><input id="u" autocomplete="username">'+
    '<label>Email</label><input id="e" type="email" autocomplete="email">'+
    '<label>Password (6+ characters)</label><input id="p" type="password" autocomplete="new-password">'+
    '<button class="btn" type="submit">Create Login</button></form>'+
    '<div id="gbtn"></div>'+
    '<div class="alt">Already have an account? <button class="linkbtn" type="button" onclick="renderLogin()">Sign in</button></div>';
  $('f').onsubmit = async e=>{ e.preventDefault(); clearErr();
    if(($('p').value||'').length<6) return showErr('Password must be at least 6 characters');
    const r = await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:$('n').value,username:$('u').value,email:$('e').value,password:$('p').value})}).then(r=>r.json()).catch(()=>({}));
    if(r.ok) go(r.user); else showErr(r.error||'Could not create login');
  };
  initGoogle();
}
function renderSetup(){
  $('formArea').innerHTML =
    '<h2>Create admin account</h2><div class="sub">First-time setup — this becomes the owner account.</div>'+
    '<form id="f"><label>Your name</label><input id="n" autocomplete="name" autofocus>'+
    '<label>Username</label><input id="u" autocomplete="username">'+
    '<label>Password (6+ characters)</label><input id="p" type="password" autocomplete="new-password">'+
    '<button class="btn" type="submit">Create account</button></form>'+
    '<div id="gbtn"></div>';
  $('f').onsubmit = async e=>{ e.preventDefault(); clearErr();
    if(($('p').value||'').length<6) return showErr('Password must be at least 6 characters');
    const r = await fetch('/api/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:$('n').value,username:$('u').value,password:$('p').value})}).then(r=>r.json()).catch(()=>({}));
    if(r.ok) go(r.user); else showErr(r.error||'Setup failed');
  };
  initGoogle();
}
// ── Sign in with Google (Google Identity Services) ──
let _gsiLoaded=false, _gClientId='';
function initGoogle(){
  fetch('/api/config').then(r=>r.json()).then(cfg=>{
    if(!cfg.googleClientId){ return; }     // not configured → no button (graceful)
    _gClientId=cfg.googleClientId;
    if(_gsiLoaded) return renderG();
    const s=document.createElement('script'); s.src='https://accounts.google.com/gsi/client'; s.async=true; s.defer=true;
    s.onload=()=>{ _gsiLoaded=true; renderG(); };
    s.onerror=()=>{ /* offline — Google button just won't show */ };
    document.head.appendChild(s);
  }).catch(()=>{});
}
function renderG(){
  const host=$('gbtn'); if(!host || !window.google || !google.accounts || !google.accounts.id) return;
  try{
    google.accounts.id.initialize({ client_id:_gClientId, callback:onGoogle });
    host.innerHTML='<div class="orline">OR</div><div id="gbtn-inner"></div>';
    google.accounts.id.renderButton($('gbtn-inner'), { theme:'filled_blue', size:'large', width:324, text:'continue_with', shape:'rectangular' });
  }catch(e){}
}
function onGoogle(resp){ clearErr();
  fetch('/api/auth/google',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({credential:resp.credential})})
    .then(r=>r.json()).then(r=>{ if(r.ok) go(r.user); else showErr(r.error||'Google sign-in failed'); })
    .catch(()=>showErr('Google sign-in failed'));
}
</script>
</body>
</html>
