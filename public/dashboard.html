<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOT TECHS — Dashboard</title>
<style>
  :root{
    --cream:#FAF8F4; --slate:#2C3347; --slate-2:#363E54; --gold:#C9A96E; --gold-dim:#9c7f48;
    --ink:#0B0F1A; --ink-2:#121726; --line:#2a3247; --green:#1f6b4f; --red:#7a2f33;
    --cust:#6E8FB0; --tech:#7FA98C; --admin:#B08C6E; --sales:#B0768F;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:var(--ink);min-height:100%;}
  body{
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--cream);min-height:100vh;
    background:radial-gradient(900px 500px at 80% -5%, rgba(201,169,110,.10), transparent 60%),
               radial-gradient(700px 600px at -10% 30%, rgba(110,143,176,.06), transparent 55%), var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;padding-bottom:80px;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px;}
  header{background:linear-gradient(180deg,var(--slate) 0%, #232a3b 100%);border-bottom:3px solid var(--gold);padding:30px 0 26px;}
  .hwrap{max-width:1180px;margin:0 auto;padding:0 22px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;}
  .brand h1{font-size:24px;letter-spacing:4px;font-weight:700;color:#fff;}
  .brand .tag{color:var(--gold);letter-spacing:3px;font-size:10px;margin-top:6px;text-transform:uppercase;}
  .topnav{display:flex;gap:10px;align-items:center;}
  .navbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:.04em;cursor:pointer;text-decoration:none;border:1px solid var(--gold);}
  .navbtn.primary{background:var(--gold);color:var(--ink);}
  .navbtn.ghost{background:transparent;color:var(--gold);}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:26px 0 8px;}
  .stat{background:var(--ink-2);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:12px;padding:18px 18px;}
  .stat .lab{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8b93a5;font-weight:700;}
  .stat .val{font-size:28px;font-weight:800;color:#fff;margin-top:6px;font-variant-numeric:tabular-nums;}
  .stat .sub{font-size:11px;color:#9aa3b5;margin-top:2px;}
  .stat.green{border-top-color:var(--green);} .stat.green .val{color:#8fd6b3;}
  .stat.cust{border-top-color:var(--cust);}
  .stat.sales{border-top-color:var(--sales);}

  /* pipeline status bar */
  .pipe{display:flex;gap:6px;flex-wrap:wrap;margin:18px 0 6px;}
  .pchip{display:flex;align-items:center;gap:8px;background:var(--ink-2);border:1px solid var(--line);border-radius:30px;
    padding:7px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#aab2c4;cursor:pointer;transition:all .15s;}
  .pchip:hover{border-color:var(--gold-dim);}
  .pchip.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700;}
  .pchip .c{font-weight:800;font-variant-numeric:tabular-nums;}
  .pchip.active .c{color:var(--ink);}

  .toolbar{display:flex;gap:12px;align-items:center;margin:18px 0 14px;flex-wrap:wrap;}
  .search{flex:1;min-width:220px;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;background:var(--ink-2);color:#fff;font-size:13px;outline:none;}
  .search:focus{border-color:var(--gold);}

  /* lead cards */
  .leads{display:flex;flex-direction:column;gap:12px;}
  .lead{background:linear-gradient(180deg,var(--slate-2),var(--slate));border:1px solid var(--line);border-left:3px solid var(--gold);
    border-radius:11px;padding:16px 18px;}
  .lead .top{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;}
  .lead .title{font-size:16px;color:#fff;font-weight:700;}
  .lead .title .title-link{color:#fff;text-decoration:none;border-bottom:1px solid transparent;}
  .lead .title .title-link:hover{color:var(--gold);border-bottom-color:var(--gold-dim);}
  .lead .meta{font-size:12px;color:#9aa3b5;margin-top:2px;}
  .maplink{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold-dim);}
  .maplink:hover{color:#e8cf9d;}
  .lead .prop{font-size:11px;color:var(--gold);font-weight:700;margin-top:4px;}
  .lead .right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  select,.minput{background:var(--ink-2);border:1px solid var(--line);color:#fff;border-radius:7px;padding:7px 9px;font-size:12px;outline:none;font-family:inherit;}
  select:focus,.minput:focus{border-color:var(--gold);}
  .temp{display:inline-flex;gap:4px;}
  .tbtn{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 9px;border-radius:30px;border:1px solid var(--line);background:var(--ink-2);color:#8b93a5;cursor:pointer;font-weight:700;}
  .tbtn.on.Urgent{background:#4a2326;border-color:#8c3b40;color:#f0bcc0;}
  .tbtn.on.Hot{background:#4a3520;border-color:#9c7038;color:#f0cf9d;}
  .tbtn.on.Warm{background:#3a3220;border-color:var(--gold-dim);color:#e8cf9d;}
  .tbtn.on.Cold{background:#1f2c3a;border-color:#3d5a78;color:#a9c4de;}
  .iconbtn{background:none;border:1px solid var(--line);color:#aab2c4;border-radius:7px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;}
  .iconbtn.open{border-color:var(--gold);color:var(--gold);}
  .iconbtn.del{border-color:#5a2b2e;color:#d98a8e;}
  .lead .notes{margin-top:10px;}
  .lead .notes textarea{width:100%;background:var(--ink-2);border:1px solid var(--line);border-radius:8px;color:#cfd5e0;font-size:12px;padding:9px 11px;outline:none;resize:vertical;min-height:38px;font-family:inherit;}
  .lead .notes textarea:focus{border-color:var(--gold);}
  .closed-wrap{display:none;}
  .lead.is-closed .closed-wrap{display:inline-flex;}
  .empty{text-align:center;color:#8b93a5;padding:50px 0;font-size:14px;}
  .badge-src{font-size:10px;letter-spacing:.5px;color:#9aa3b5;background:var(--ink-2);border:1px solid var(--line);padding:3px 8px;border-radius:20px;}
  footer{margin-top:50px;border-top:1px solid var(--line);padding-top:20px;text-align:center;color:#6b7385;font-size:11px;letter-spacing:1.5px;}
  footer .g{color:var(--gold);}
  /* analytics */
  .section-h{display:flex;align-items:center;gap:14px;margin:28px 0 14px;}
  .section-h h2{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#fff;font-weight:800;}
  .section-h .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}
  .akpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:8px;}
  .akpi{background:var(--ink-2);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:12px;padding:14px 14px 12px;}
  .akpi.cust{border-top-color:var(--cust);} .akpi.green{border-top-color:var(--green);} .akpi.green .av{color:#8fd6b3;}
  .akpi.sales{border-top-color:var(--sales);} .akpi.red{border-top-color:#a85;} .akpi.red .av{color:#e8cf9d;}
  .akpi .al{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:#8b93a5;font-weight:700;}
  .akpi .av{font-size:22px;font-weight:800;color:#fff;margin-top:5px;font-variant-numeric:tabular-nums;}
  .akpi .as{font-size:10.5px;color:#9aa3b5;margin-top:2px;}
  .acharts{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-top:14px;}
  .acard{background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
  .act{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:14px;}
  .abars{display:flex;align-items:flex-end;gap:10px;height:120px;}
  .abar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;}
  .abar-fill{width:70%;max-width:42px;background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:5px 5px 0 0;min-height:6px;}
  .abar-lab{font-size:10px;color:#9aa3b5;} .abar-val{font-size:9.5px;color:#7e879a;font-variant-numeric:tabular-nums;}
  .funnel{display:flex;flex-direction:column;gap:7px;}
  .frow{display:flex;align-items:center;gap:10px;font-size:12px;}
  .frow .flab{width:96px;color:#aab2c4;flex:0 0 auto;} .frow .fn{width:26px;text-align:right;color:#cfd5e0;font-weight:700;font-variant-numeric:tabular-nums;}
  .fbar{flex:1;height:14px;background:var(--ink);border:1px solid var(--line);border-radius:5px;overflow:hidden;}
  .fbar-fill{height:100%;background:linear-gradient(90deg,var(--cust),var(--gold));border-radius:5px;}
  /* follow-up reminders */
  .remlist{display:flex;flex-direction:column;gap:7px;}
  .remitem{display:flex;align-items:center;gap:12px;text-decoration:none;background:var(--ink-2);border:1px solid var(--line);border-left:3px solid var(--gold-dim);border-radius:9px;padding:10px 14px;color:var(--cream);}
  .remitem:hover{border-color:var(--gold-dim);background:#161b29;}
  .remitem.overdue{border-left-color:var(--red);} .remitem.today{border-left-color:var(--gold);}
  .remitem .rdot{width:8px;height:8px;border-radius:50%;background:var(--gold-dim);flex:0 0 auto;}
  .remitem.overdue .rdot{background:#d98a8e;} .remitem.today .rdot{background:var(--gold);}
  .remitem .rwhen{font-size:11px;color:#9aa3b5;width:54px;flex:0 0 auto;font-weight:700;}
  .remitem .rwho{font-weight:700;color:#fff;font-size:13px;} .remitem .rnote{font-size:12px;color:#9aa3b5;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  @media(max-width:760px){ .stats{grid-template-columns:1fr 1fr;} .lead .right{margin-left:0;} .akpis{grid-template-columns:1fr 1fr 1fr;} .acharts{grid-template-columns:1fr;} }
</style>
<script>window.IOT_REQUIRE='manager'</script><script src="/auth.js"></script>
</head>
<body>
<header>
  <div class="hwrap">
    <div class="brand"><h1>IOT&nbsp;TECHS</h1><div class="tag">Dashboard · Analytics &amp; Pipeline</div></div>
    <div class="topnav">
      <a class="navbtn ghost" href="/">Workspace</a>
      <a class="navbtn primary" href="/dashboard.html">Dashboard</a>
      <a class="navbtn ghost" href="/dispatch.html">Dispatch</a>
      <a class="navbtn ghost" href="/payroll.html">Payroll</a>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="analytics"></div>
  <div id="reminders"></div>
  <div class="section-h"><h2>Pipeline</h2><div class="ln"></div></div>
  <div class="stats" id="stats"></div>
  <div class="pipe" id="pipe"></div>

  <div class="toolbar">
    <input class="search" id="search" placeholder="Search leads by name, business, phone, email, address…" oninput="onSearch(this.value)">
    <button class="iconbtn" onclick="loadAll()">↻ Refresh</button>
  </div>

  <div class="leads" id="leads"><div class="empty">Loading…</div></div>

  <footer><span class="g">IOT TECHS / La Vague Inc.</span> &nbsp;·&nbsp; CRM Pipeline · VAULT DARK</footer>
</div>

<script>
const STATUSES = ['New','Contacted','Quoted','Follow-Up','Approved','Scheduled','In Progress','Completed','Closed'];
const TEMPS = ['Urgent','Hot','Warm','Cold'];
const SOURCES = ['','Online Search','Referral','Flyer','Mailer','Social Media','Other'];
const CLOSED_REASONS = ['','Completed','Ghosted','Price','Competitor','Cancelled','Not Qualified','Out of Area'];
let allLeads = [];
let filterStatus = 'All';
let searchQ = '';

function money(n){ return (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){
  let t=document.getElementById('t'); if(!t){t=document.createElement('div');t.id='t';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--slate);border:1px solid var(--gold);color:var(--cream);padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:99;opacity:0;transition:opacity .25s;';document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1'; clearTimeout(t._x); t._x=setTimeout(()=>t.style.opacity='0',2200);
}

async function loadStats(){
  const s = await (await fetch('/api/stats')).json();
  document.getElementById('stats').innerHTML =
    statCard('','Total Leads', s.totalLeads, s.totalProposals+' proposal'+(s.totalProposals!==1?'s':'')) +
    statCard('cust','Open Pipeline', '$'+money(s.openPipeline), 'value of active leads') +
    statCard('green','Won', '$'+money(s.wonValue), 'completed jobs') +
    statCard('sales','Conversion', pct(s), 'approved+ of all leads');
  // pipeline chips
  let chips = chip('All', s.totalLeads, filterStatus==='All');
  STATUSES.forEach(st=> chips += chip(st, s.byStatus[st]||0, filterStatus===st));
  document.getElementById('pipe').innerHTML = chips;
}
function pct(s){
  const won = (s.byStatus['Approved']||0)+(s.byStatus['Scheduled']||0)+(s.byStatus['In Progress']||0)+(s.byStatus['Completed']||0)+(s.byStatus['Closed']||0);
  return s.totalLeads ? Math.round(won/s.totalLeads*100)+'%' : '0%';
}
function statCard(cls,lab,val,sub){ return '<div class="stat '+cls+'"><div class="lab">'+lab+'</div><div class="val">'+val+'</div><div class="sub">'+sub+'</div></div>'; }
function chip(label,count,active){ return '<div class="pchip'+(active?' active':'')+'" onclick="setFilter(\''+label+'\')">'+esc(label)+' <span class="c">'+count+'</span></div>'; }

window.setFilter = function(st){ filterStatus=st; render(); loadStats(); };
window.onSearch = function(q){ searchQ=q.trim().toLowerCase(); render(); };

let _lastSig = '';
function dataSig(rows){
  return rows.map(c=>[c.id,c.status,c.temperature,c.source,c.closed_reason,c.notes,c.business,c.name,c.phone,c.email,c.address,c.last_proposal_num,c.last_total].join('␟')).join('|');
}
async function loadAll(){
  allLeads = await (await fetch('/api/customers')).json();
  _lastSig = dataSig(allLeads);
  await loadStats();
  render();
  loadAnalytics(); loadReminders();
}

// ── Analytics dashboard ────────────────────────────────────────────────────
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtMonth(m){ if(!m)return''; const p=m.split('-'); return MON[(+p[1])-1]+" '"+(p[0]||'').slice(2); }
function fmtDay(s){ if(!s)return''; try{ return new Date(s.slice(0,10)+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }catch(e){ return s; } }
async function loadAnalytics(){
  let a; try{ a=await (await fetch('/api/analytics')).json(); }catch(e){ return; }
  if(!a || a.error){ document.getElementById('analytics').innerHTML=''; return; }
  const kpis=[
    ['Pipeline','$'+money(a.pipelineValue),'open lead value','cust'],
    ['Won','$'+money(a.wonValue),a.signedCount+' signed','green'],
    ['Win rate',a.winRate+'%','signed of all leads','sales'],
    ['Avg deal','$'+money(a.avgDeal),'per signed job',''],
    ['Collected','$'+money(a.payCollected),'payments in','green'],
    ['Outstanding','$'+money(a.payDue),'payments due','red'],
  ];
  const months=a.signedByMonth||[]; const maxV=Math.max(1,...months.map(m=>m.v||0));
  const bars = months.length ? months.map(m=>'<div class="abar"><div class="abar-fill" style="height:'+(Math.round((m.v/maxV)*96)+6)+'px" title="$'+money(m.v)+'"></div><div class="abar-val">$'+money(m.v)+'</div><div class="abar-lab">'+fmtMonth(m.m)+'</div></div>').join('') : '<div class="muted" style="align-self:center;">No signed jobs yet — they’ll chart here.</div>';
  const st=a.statuses||{}; const order=a.leadStatuses||[]; const maxC=Math.max(1,...order.map(s=>st[s]||0));
  const funnel = order.map(s=>{ const n=st[s]||0; const w=n?Math.max(Math.round((n/maxC)*100),5):0; return '<div class="frow"><span class="flab">'+s+'</span><div class="fbar"><div class="fbar-fill" style="width:'+w+'%"></div></div><span class="fn">'+n+'</span></div>'; }).join('');
  document.getElementById('analytics').innerHTML=
    '<div class="section-h"><h2>Analytics</h2><div class="ln"></div></div>'+
    '<div class="akpis">'+kpis.map(k=>'<div class="akpi '+k[3]+'"><div class="al">'+k[0]+'</div><div class="av">'+k[1]+'</div><div class="as">'+k[2]+'</div></div>').join('')+'</div>'+
    '<div class="acharts">'+
      '<div class="acard"><div class="act">Signed revenue — last 6 months</div><div class="abars">'+bars+'</div></div>'+
      '<div class="acard"><div class="act">Lead funnel</div><div class="funnel">'+funnel+'</div></div>'+
    '</div>';
}
async function loadReminders(){
  let r; try{ r=await (await fetch('/api/reminders')).json(); }catch(e){ return; }
  const host=document.getElementById('reminders'); if(!host) return;
  const items=[].concat((r.overdue||[]).map(x=>['overdue',x]),(r.today||[]).map(x=>['today',x]),(r.upcoming||[]).map(x=>['upcoming',x]));
  if(!items.length){ host.innerHTML=''; return; }
  host.innerHTML='<div class="section-h"><h2>Follow-ups <span style="font-size:10px;color:#9aa3b5;letter-spacing:1px;">'+( (r.overdue||[]).length?(r.overdue.length+' overdue · '):'')+items.length+' total</span></h2><div class="ln"></div></div>'+
    '<div class="remlist">'+items.map(function(it){ const cls=it[0],x=it[1]; return '<a class="remitem '+cls+'" href="/project.html?customer='+x.customer_id+'"><span class="rdot"></span><span class="rwhen">'+fmtDay(x.follow_up_date)+'</span><span class="rwho">'+esc(x.customer_business||x.customer_name||x.title||'Job')+'</span><span class="rnote">'+esc(x.follow_up_note||x.title||'')+'</span></a>'; }).join('')+'</div>';
}

// ── Live refresh — poll for changes from the calculator and reflect them,
// without disrupting an edit the user is making here.
async function poll(){
  let rows;
  try { rows = await (await fetch('/api/customers')).json(); } catch(e){ return; }
  const sig = dataSig(rows);
  if(sig === _lastSig) return;          // nothing changed
  _lastSig = sig;
  allLeads = rows;
  loadStats(); loadAnalytics(); loadReminders();
  const ae = document.activeElement;
  const editingHere = ae && ae.closest && ae.closest('.lead'); // don't yank focus mid-edit
  if(!editingHere) render();
}
setInterval(poll, 3500);
window.addEventListener('focus', poll);
document.addEventListener('visibilitychange', function(){ if(!document.hidden) poll(); });

function render(){
  const host = document.getElementById('leads');
  let rows = allLeads.slice();
  if(filterStatus!=='All') rows = rows.filter(c => (c.status||'New')===filterStatus);
  if(searchQ) rows = rows.filter(c => [c.name,c.business,c.phone,c.email,c.address].filter(Boolean).join(' ').toLowerCase().includes(searchQ));
  if(!rows.length){ host.innerHTML = '<div class="empty">'+(allLeads.length?'No leads match this filter.':'No leads yet. Build a proposal and hit Save to create one.')+'</div>'; return; }
  host.innerHTML = rows.map(leadCard).join('');
}

function isApple(){ return /iPad|iPhone|iPod|Macintosh|Mac OS X/i.test(navigator.userAgent||''); }
function mapsHref(addr){ const q=encodeURIComponent(addr); return isApple()?('https://maps.apple.com/?q='+q):('https://www.google.com/maps/search/?api=1&query='+q); }
function mapsLink(addr,cls){ if(!addr) return ''; return '<a class="'+(cls||'maplink')+'" href="'+mapsHref(addr)+'" target="_blank" rel="noopener" title="Open in '+(isApple()?'Apple':'Google')+' Maps">'+esc(addr)+' ↗</a>'; }
function leadCard(c){
  const title = esc(c.business||c.name||'—');
  const meta = [c.name&&c.name!==c.business?c.name:'', c.phone, c.email].filter(Boolean).map(esc).join('  ·  ');
  const isClosed = (c.status==='Closed');
  return ''+
  '<div class="lead'+(isClosed?' is-closed':'')+'" data-id="'+c.id+'">'+
    '<div class="top">'+
      '<div style="min-width:0;">'+
        '<div class="title"><a class="title-link" href="/project.html?customer='+c.id+'" title="Open the project hub">'+title+'</a></div>'+
        (meta?'<div class="meta">'+meta+'</div>':'')+
        (c.address?'<div class="meta">'+mapsLink(c.address)+'</div>':'')+
        (c.last_proposal_num?'<div class="prop">'+esc(c.last_proposal_num)+' · $'+money(c.last_total)+'</div>':'<div class="meta" style="color:#6b7385;">no proposal yet</div>')+
      '</div>'+
      '<div class="right">'+
        '<span class="temp">'+TEMPS.map(t=>'<button class="tbtn '+(c.temperature===t?'on '+t:'')+'" onclick="setTemp('+c.id+',\''+t+'\')">'+t+'</button>').join('')+'</span>'+
        '<select onchange="setStatus('+c.id+',this.value)" title="Pipeline status">'+STATUSES.map(s=>'<option'+((c.status||'New')===s?' selected':'')+'>'+s+'</option>').join('')+'</select>'+
        '<select onchange="setField('+c.id+',\'source\',this.value)" title="Lead source" class="minput">'+SOURCES.map(s=>'<option value="'+s+'"'+((c.source||'')===s?' selected':'')+'>'+(s||'Source…')+'</option>').join('')+'</select>'+
        '<select class="closed-wrap minput" onchange="setField('+c.id+',\'closed_reason\',this.value)" title="Closed reason">'+CLOSED_REASONS.map(s=>'<option value="'+s+'"'+((c.closed_reason||'')===s?' selected':'')+'>'+(s||'Reason…')+'</option>').join('')+'</select>'+
        '<button class="iconbtn open" onclick="openInCalc('+c.id+')">Open</button>'+
        '<a class="iconbtn" href="/project.html?customer='+c.id+'" title="Open the project hub" style="text-decoration:none;">Project</a>'+
        '<button class="iconbtn" onclick="createWO('+c.id+')" title="Create a work order from this lead">→ WO</button>'+
        '<button class="iconbtn del" onclick="delLead('+c.id+',\''+esc(title).replace(/\x27/g,"\\x27")+'\')">×</button>'+
      '</div>'+
    '</div>'+
    '<div class="notes"><textarea placeholder="Notes — call summary, next step, site details…" onchange="setField('+c.id+',\'notes\',this.value)">'+esc(c.notes||'')+'</textarea></div>'+
  '</div>';
}

async function patch(id, body){
  try{
    const r = await (await fetch('/api/customers/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
    if(r.ok){ const i=allLeads.findIndex(x=>x.id===id); if(i>=0) Object.assign(allLeads[i], r.customer); }
    return r;
  }catch(e){ toast('Update failed — server offline?'); return null; }
}
window.setStatus = async function(id,v){ await patch(id,{status:v}); toast('Status → '+v); render(); loadStats(); };
window.setTemp   = async function(id,v){ await patch(id,{temperature:v}); render(); };
window.setField  = async function(id,f,v){ await patch(id,{[f]:v}); toast('Saved'); };
window.delLead = async function(id,label){
  if(!confirm('Delete "'+label+'" and all their proposals?')) return;
  await fetch('/api/customers/'+id,{method:'DELETE'});
  allLeads = allLeads.filter(x=>x.id!==id); toast('Deleted'); render(); loadStats();
};
window.openInCalc = function(id){ location.href='/?customer='+id; };
window.createWO = async function(id){
  try{
    const r = await (await fetch('/api/workorders/from-lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customerId:id})})).json();
    if(r.ok){ toast('Work order created'); if(confirm('Work order created. Open the Dispatch board now?')) location.href='/dispatch.html'; }
    else toast('Could not create work order');
  }catch(e){ toast('Could not create work order'); }
};

loadAll();
</script>
