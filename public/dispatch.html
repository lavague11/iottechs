<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOT TECHS — Dispatch & Work Orders</title>
<style>
  :root{
    --cream:#FAF8F4; --slate:#2C3347; --slate-2:#363E54; --gold:#C9A96E; --gold-dim:#9c7f48;
    --ink:#0B0F1A; --ink-2:#121726; --line:#2a3247; --green:#1f6b4f; --red:#7a2f33;
    --cust:#6E8FB0; --tech:#7FA98C; --admin:#B08C6E; --sales:#B0768F;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:var(--ink);min-height:100%;}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--cream);min-height:100vh;
    background:radial-gradient(900px 500px at 80% -5%, rgba(201,169,110,.10), transparent 60%),
               radial-gradient(700px 600px at -10% 30%, rgba(127,169,140,.06), transparent 55%), var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;padding-bottom:80px;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px;}
  header{background:linear-gradient(180deg,var(--slate) 0%, #232a3b 100%);border-bottom:3px solid var(--gold);padding:30px 0 26px;}
  .hwrap{max-width:1180px;margin:0 auto;padding:0 22px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;}
  .brand h1{font-size:24px;letter-spacing:4px;font-weight:700;color:#fff;}
  .brand .tag{color:var(--gold);letter-spacing:3px;font-size:10px;margin-top:6px;text-transform:uppercase;}
  .topnav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .navbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:.04em;cursor:pointer;text-decoration:none;border:1px solid var(--gold);color:var(--gold);background:transparent;}
  .navbtn.active{background:var(--gold);color:var(--ink);}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:24px 0 6px;}
  .stat{background:var(--ink-2);border:1px solid var(--line);border-top:3px solid var(--gold);border-radius:12px;padding:15px 16px;}
  .stat .lab{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#8b93a5;font-weight:700;}
  .stat .val{font-size:24px;font-weight:800;color:#fff;margin-top:4px;font-variant-numeric:tabular-nums;}
  .stat.tech{border-top-color:var(--tech);} .stat.green{border-top-color:var(--green);} .stat.red{border-top-color:#a85;}

  .section-h{display:flex;align-items:center;gap:14px;margin:30px 0 14px;}
  .section-h h2{font-size:14px;letter-spacing:3px;text-transform:uppercase;color:#fff;font-weight:700;}
  .section-h .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}

  /* technicians */
  .techbar{display:flex;gap:8px;flex-wrap:wrap;background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;}
  .techbar input{flex:1;min-width:120px;background:var(--ink);border:1px solid var(--line);color:#fff;border-radius:7px;padding:9px 11px;font-size:13px;outline:none;}
  .techbar input:focus{border-color:var(--gold);}
  .btn{background:var(--gold);color:var(--ink);border:none;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:800;letter-spacing:.04em;cursor:pointer;white-space:nowrap;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:#aab2c4;}
  .techlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
  .tcard{background:linear-gradient(180deg,var(--slate-2),var(--slate));border:1px solid var(--line);border-left:3px solid var(--tech);border-radius:10px;padding:12px 14px;}
  .tcard.off{opacity:.5;border-left-color:#555;}
  .tcard .tn{font-size:15px;font-weight:700;color:#fff;}
  .tcard .td{font-size:11.5px;color:#9aa3b5;margin-top:2px;}
  .tcard .trow{display:flex;align-items:center;gap:8px;margin-top:9px;}
  .tcard .trow label{font-size:11px;color:#aab2c4;display:flex;align-items:center;gap:5px;cursor:pointer;}
  .iconbtn{background:none;border:1px solid var(--line);color:#aab2c4;border-radius:7px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;}
  .iconbtn.del{border-color:#5a2b2e;color:#d98a8e;}
  .iconbtn.edit{border-color:var(--gold-dim);color:var(--gold);}

  /* work orders */
  .pipe{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 14px;}
  .pchip{display:flex;align-items:center;gap:8px;background:var(--ink-2);border:1px solid var(--line);border-radius:30px;padding:7px 13px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#aab2c4;cursor:pointer;}
  .pchip.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700;}
  .pchip .c{font-weight:800;}
  .wolist{display:flex;flex-direction:column;gap:12px;}
  .wo{background:linear-gradient(180deg,var(--slate-2),var(--slate));border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:11px;padding:15px 17px;}
  .wo.s-Unassigned{border-left-color:#8b93a5;} .wo.s-Assigned{border-left-color:var(--admin);}
  .wo.s-Scheduled{border-left-color:var(--cust);} .wo\.s-In{border-left-color:var(--gold);}
  .wo.s-InProgress{border-left-color:var(--gold);} .wo.s-Completed{border-left-color:var(--green);} .wo.s-Cancelled{border-left-color:var(--red);}
  .wo .top{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;}
  .wo .title{font-size:15px;font-weight:700;color:#fff;}
  .wo .meta{font-size:12px;color:#9aa3b5;margin-top:2px;}
  .wo .amt{font-size:12px;color:var(--gold);font-weight:700;margin-top:3px;}
  .wo .prog{display:flex;align-items:center;gap:9px;margin-top:7px;}
  .pbar{flex:1;min-width:90px;max-width:240px;height:8px;background:var(--ink);border:1px solid var(--line);border-radius:5px;overflow:hidden;}
  .pbar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--tech),var(--gold));transition:width .35s ease;}
  .pbar-fill.done{background:linear-gradient(90deg,var(--green),var(--tech));}
  .prog .ptxt{font-size:11px;color:#9aa3b5;white-space:nowrap;font-variant-numeric:tabular-nums;}
  .maplink{color:var(--gold);text-decoration:none;border-bottom:1px dotted var(--gold-dim);}
  .maplink:hover{color:#e8cf9d;}
  .wonum{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--gold);background:#2a2418;border:1px solid var(--gold-dim);border-radius:6px;padding:2px 8px;margin-right:9px;vertical-align:middle;font-variant-numeric:tabular-nums;}
  .wo .ctrls{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  select,.minput{background:var(--ink-2);border:1px solid var(--line);color:#fff;border-radius:7px;padding:7px 9px;font-size:12px;outline:none;font-family:inherit;}
  select:focus,.minput:focus{border-color:var(--gold);}
  .wo .notes textarea{width:100%;margin-top:10px;background:var(--ink-2);border:1px solid var(--line);border-radius:8px;color:#cfd5e0;font-size:12px;padding:8px 10px;outline:none;resize:vertical;min-height:34px;font-family:inherit;}
  .wo .notes textarea:focus{border-color:var(--gold);}
  .empty{text-align:center;color:#8b93a5;padding:40px 0;font-size:14px;}
  footer{margin-top:50px;border-top:1px solid var(--line);padding-top:20px;text-align:center;color:#6b7385;font-size:11px;letter-spacing:1.5px;}
  footer .g{color:var(--gold);}
  @media(max-width:760px){ .stats{grid-template-columns:1fr 1fr;} .wo .ctrls{margin-left:0;} }
</style>
<script>window.IOT_REQUIRE='manager'</script><script src="/auth.js"></script>
</head>
<body>
<header>
  <div class="hwrap">
    <div class="brand"><h1>IOT&nbsp;TECHS</h1><div class="tag">Dispatch · Work Orders</div></div>
    <div class="topnav">
      <a class="navbtn" href="/">Workspace</a>
      <a class="navbtn" href="/dashboard.html">Dashboard</a>
      <a class="navbtn active" href="/dispatch.html">Dispatch</a>
      <a class="navbtn" href="/payroll.html">Payroll</a>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="stats" id="stats"></div>

  <div class="section-h"><h2>Technicians</h2><div class="ln"></div></div>
  <div class="techbar">
    <input id="t-name" placeholder="Name *">
    <input id="t-phone" placeholder="Phone">
    <input id="t-email" placeholder="Email">
    <input id="t-skills" placeholder="Skills (e.g. CCTV, Access, Audio)">
    <button class="btn" onclick="addTech()">+ Add Technician</button>
  </div>
  <div class="techbar" id="techPayBar" style="margin-top:8px;align-items:center;">
    <span style="font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);">Pay / unit</span>
    <input id="t-pay-cableRun" type="number" min="0" step="1" placeholder="Cable Run · 28" title="Cable Run per camera (default $28)">
    <input id="t-pay-termination" type="number" min="0" step="1" placeholder="Termination · 12" title="Termination per camera (default $12)">
    <input id="t-pay-mounting" type="number" min="0" step="1" placeholder="Mounting · 12" title="Mounting per camera (default $12)">
    <input id="t-pay-nvrSetup" type="number" min="0" step="1" placeholder="NVR Setup · 15" title="NVR setup per recorder (default $15)">
    <span style="font-size:11px;color:#7e879a;">Leave blank → $52/camera flat default</span>
  </div>
  <div class="techlist" id="techlist"></div>

  <div class="section-h" id="loginsHead" style="display:none"><h2>Team Logins</h2><div class="ln"></div></div>
  <div id="loginsArea" style="display:none">
    <div class="techbar">
      <input id="lg-name" placeholder="Display name">
      <input id="lg-user" placeholder="Username *" autocomplete="off">
      <input id="lg-pass" type="password" placeholder="Password (6+)" autocomplete="new-password">
      <input id="lg-email" placeholder="Google email (for Google sign-in)" autocomplete="off">
      <select id="lg-role" class="minput"><option value="tech">Technician</option><option value="admin">Admin</option></select>
      <select id="lg-tech" class="minput" title="Link to roster technician"></select>
      <button class="btn" onclick="addLogin()">+ Create Login</button>
    </div>
    <div class="techlist" id="loginlist"></div>
  </div>

  <div class="section-h"><h2>Work Orders</h2><div class="ln"></div></div>
  <div class="pipe" id="wopipe"></div>
  <div class="wolist" id="wolist"><div class="empty">Loading…</div></div>

  <footer><span class="g">IOT TECHS / La Vague Inc.</span> &nbsp;·&nbsp; Dispatch · VAULT DARK</footer>
</div>

<script>
const WO_STATUSES = ['Unassigned','Assigned','Scheduled','In Progress','Completed','Cancelled'];
let techs = [], workOrders = [], woFilter = 'All';

function money(n){ return (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){
  let t=document.getElementById('t'); if(!t){t=document.createElement('div');t.id='t';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--slate);border:1px solid var(--gold);color:var(--cream);padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:99;opacity:0;transition:opacity .25s;';document.body.appendChild(t);}
  t.textContent=msg; t.style.opacity='1'; clearTimeout(t._x); t._x=setTimeout(()=>t.style.opacity='0',2200);
}
const sId = s => 's-'+String(s).replace(/\s+/g,'');
function isApple(){ return /iPad|iPhone|iPod|Macintosh|Mac OS X/i.test(navigator.userAgent||''); }
function mapsHref(addr){ const q=encodeURIComponent(addr); return isApple()?('https://maps.apple.com/?q='+q):('https://www.google.com/maps/search/?api=1&query='+q); }
function mapsLink(addr,cls){ if(!addr) return ''; return '<a class="'+(cls||'maplink')+'" href="'+mapsHref(addr)+'" target="_blank" rel="noopener" title="Open in '+(isApple()?'Apple':'Google')+' Maps">'+esc(addr)+' ↗</a>'; }
// Unified project number: proposal # = work order ID = invoice #
function woNum(w){ return w.proposal_num || ('WO-'+w.id); }

// ── Technicians ───────────────────────────────────────────────────────────
const PAY_FIELDS=[['cableRun','t-pay-cableRun'],['termination','t-pay-termination'],['mounting','t-pay-mounting'],['nvrSetup','t-pay-nvrSetup']];
function collectPay(){ const ps={}; PAY_FIELDS.forEach(([k,id])=>{ const v=(document.getElementById(id).value||'').trim(); if(v!=='') ps[k]=Number(v)||0; }); return ps; }
function fillPay(ps){ ps=ps||{}; PAY_FIELDS.forEach(([k,id])=>{ document.getElementById(id).value=(ps[k]!=null?ps[k]:''); }); }
function clearTechForm(){ ['t-name','t-phone','t-email','t-skills'].forEach(id=>document.getElementById(id).value=''); fillPay({}); }
async function addTech(){
  const name=document.getElementById('t-name').value.trim();
  if(!name){ toast('Enter a technician name'); return; }
  const body={ name, phone:document.getElementById('t-phone').value.trim(), email:document.getElementById('t-email').value.trim(), skills:document.getElementById('t-skills').value.trim(), pay_structure:collectPay() };
  await fetch('/api/technicians',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  clearTechForm();
  toast('Technician added'); await loadAll();
}
async function saveTech(t){ await fetch('/api/technicians',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(t)}); }
window.toggleTechActive = async function(id,active){ const t=techs.find(x=>x.id===id); if(!t)return; t.active=active?1:0; await saveTech(t); loadAll(); };
window.delTech = async function(id,name){ if(!confirm('Remove technician "'+name+'"? Their work orders become Unassigned.'))return; await fetch('/api/technicians/'+id,{method:'DELETE'}); toast('Removed'); loadAll(); };
window.editTech = function(id){
  const t=techs.find(x=>x.id===id); if(!t)return;
  document.getElementById('t-name').value=t.name||''; document.getElementById('t-phone').value=t.phone||'';
  document.getElementById('t-email').value=t.email||''; document.getElementById('t-skills').value=t.skills||'';
  let ps={}; try{ ps=t.pay_structure?JSON.parse(t.pay_structure):{}; }catch(e){ ps={}; }
  fillPay(ps);
  // turn Add into Save-this-one by deleting old on add? simpler: update in place via a one-off
  const bar=document.querySelector('.techbar .btn'); bar.textContent='Save Changes';
  bar.onclick=async function(){
    t.name=document.getElementById('t-name').value.trim(); t.phone=document.getElementById('t-phone').value.trim();
    t.email=document.getElementById('t-email').value.trim(); t.skills=document.getElementById('t-skills').value.trim();
    t.pay_structure=collectPay();
    await saveTech(t); clearTechForm();
    bar.textContent='+ Add Technician'; bar.onclick=addTech; toast('Saved'); loadAll();
  };
  document.getElementById('t-name').focus();
};

function techPaySummary(t){
  let ps=null; try{ ps=t.pay_structure?JSON.parse(t.pay_structure):null; }catch(e){ ps=null; }
  if(!ps||!Object.keys(ps).length) return 'Default $52/camera + $15/NVR';
  const d={cableRun:28,termination:12,mounting:12,nvrSetup:15}; const r=Object.assign({},d,ps);
  const perCam=(Number(r.cableRun)||0)+(Number(r.termination)||0)+(Number(r.mounting)||0);
  return '$'+perCam+'/camera + $'+(Number(r.nvrSetup)||0)+'/NVR';
}
function renderTechs(){
  const host=document.getElementById('techlist');
  if(!techs.length){ host.innerHTML='<div class="empty" style="grid-column:1/-1;">No technicians yet. Add your field team above.</div>'; return; }
  host.innerHTML=techs.map(t=>''+
    '<div class="tcard'+(t.active?'':' off')+'">'+
      '<div class="tn">'+esc(t.name)+'</div>'+
      '<div class="td">'+[t.phone,t.email].filter(Boolean).map(esc).join(' · ')+'</div>'+
      (t.skills?'<div class="td" style="color:#a7d3b5;">'+esc(t.skills)+'</div>':'')+
      '<div class="td" style="color:#cdb482;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> '+techPaySummary(t)+'</div>'+
      '<div class="trow">'+
        '<label><input type="checkbox" '+(t.active?'checked':'')+' onchange="toggleTechActive('+t.id+',this.checked)"> Active</label>'+
        '<button class="iconbtn edit" style="margin-left:auto;" onclick="editTech('+t.id+')">Edit</button>'+
        '<button class="iconbtn del" onclick="delTech('+t.id+',\''+esc(t.name).replace(/\x27/g,"\\x27")+'\')">×</button>'+
      '</div>'+
    '</div>').join('');
}

// ── Work orders ───────────────────────────────────────────────────────────
window.setWoFilter = function(s){ woFilter=s; renderWOs(); renderStats(); };
async function patchWO(id, body){
  const r=await (await fetch('/api/workorders/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
  const w=workOrders.find(x=>x.id===id); if(w) Object.assign(w, body);
  return r;
}
window.assignTech = async function(id,val){
  const w=workOrders.find(x=>x.id===id); if(!w)return;
  const body={ technician_id: val||null };
  if(val && (w.status==='Unassigned')) body.status='Assigned';
  if(!val && w.status==='Assigned') body.status='Unassigned';
  await patchWO(id, body); toast('Updated'); loadAll();
};
window.scheduleWO = async function(id,date){
  const w=workOrders.find(x=>x.id===id); if(!w)return;
  const body={ scheduled_date: date };
  if(date && (w.status==='Assigned')) body.status='Scheduled';
  await patchWO(id, body); toast('Scheduled'); loadAll();
};
window.setWoStatus = async function(id,v){ await patchWO(id,{status:v}); toast('Status → '+v); loadAll(); };
window.setWoField = async function(id,f,v){ await patchWO(id,{[f]:v}); toast('Saved'); };
window.delWO = async function(id,title){ if(!confirm('Delete work order "'+title+'"?'))return; await fetch('/api/workorders/'+id,{method:'DELETE'}); toast('Deleted'); loadAll(); };

function renderStats(){
  const n=s=>workOrders.filter(w=>w.status===s).length;
  document.getElementById('stats').innerHTML=
    card('','Work Orders', workOrders.length, 'total') +
    card('red','Unassigned', n('Unassigned'), 'need a tech') +
    card('tech','Scheduled', n('Scheduled')+n('Assigned'), 'on the calendar') +
    card('green','Completed', n('Completed'), 'finished jobs');
  // filter chips
  let chips=chip('All', workOrders.length, woFilter==='All');
  WO_STATUSES.forEach(s=> chips+=chip(s, n(s), woFilter===s));
  document.getElementById('wopipe').innerHTML=chips;
}
function card(cls,lab,val,sub){ return '<div class="stat '+cls+'"><div class="lab">'+lab+'</div><div class="val">'+val+'</div><div class="lab" style="color:#6b7385;margin-top:2px;letter-spacing:.5px;">'+sub+'</div></div>'; }
function chip(label,count,active){ return '<div class="pchip'+(active?' active':'')+'" onclick="setWoFilter(\''+label+'\')">'+esc(label)+' <span class="c">'+count+'</span></div>'; }

function techOptions(sel){
  const opts=['<option value="">— Unassigned —</option>'];
  techs.filter(t=>t.active||t.id===sel).forEach(t=>opts.push('<option value="'+t.id+'"'+(sel===t.id?' selected':'')+'>'+esc(t.name)+'</option>'));
  return opts.join('');
}
function renderWOs(){
  const host=document.getElementById('wolist');
  let rows=workOrders.slice();
  const isResched=w=>w.reschedule_requested && ['Completed','Cancelled'].indexOf(w.status)<0;
  rows.sort((a,b)=>((b.awaiting_schedule||isResched(b))?1:0)-((a.awaiting_schedule||isResched(a))?1:0));   // scheduling + reschedule requests float to the top
  if(woFilter!=='All') rows=rows.filter(w=>w.status===woFilter);
  if(!rows.length){ host.innerHTML='<div class="empty">'+(workOrders.length?'No work orders in this status.':'No work orders yet. Create one from an Approved lead on the Pipeline page.')+'</div>'; return; }
  const reqCount=workOrders.filter(w=>w.awaiting_schedule).length;
  const reCount=workOrders.filter(isResched).length;
  let banner='';
  if(reqCount) banner+='<div style="background:linear-gradient(180deg,rgba(201,169,110,.15),rgba(201,169,110,.05));border:1px solid #b5862f;color:#f0c674;border-radius:10px;padding:11px 15px;margin-bottom:10px;font-size:13px;font-weight:700;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M6 2h12M6 22h12M6 2c0 5 4 6 6 8 2-2 6-3 6-8M6 22c0-5 4-6 6-8 2 2 6 3 6 8"/></svg> '+reqCount+' job'+(reqCount>1?'s':'')+' awaiting a schedule date — deposit’s in, ready to book.</div>';
  if(reCount) banner+='<div style="background:linear-gradient(180deg,rgba(176,110,110,.18),rgba(176,110,110,.05));border:1px solid #a85a5a;color:#f0a9a9;border-radius:10px;padding:11px 15px;margin-bottom:12px;font-size:13px;font-weight:700;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> '+reCount+' reschedule request'+(reCount>1?'s':'')+' — customer asked to move the date.</div>';
  host.innerHTML=banner+rows.map(w=>{
    const cust=esc(w.customer_business||w.customer_name||'—');
    const sub=[w.customer_name&&w.customer_name!==w.customer_business?w.customer_name:'', w.customer_phone].filter(Boolean).map(esc).join('  ·  ');
    return ''+
    '<div class="wo '+sId(w.status)+'" data-id="'+w.id+'">'+
      '<div class="top">'+
        '<div style="min-width:0;">'+
          '<div class="title"><span class="wonum" title="Proposal # · Work Order ID · Invoice #">#'+esc(woNum(w))+'</span>'+esc(w.title||cust)+
            (w.awaiting_schedule?'<span style="display:inline-block;margin-left:8px;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:10px;background:#3a2e16;color:#f0c674;border:1px solid #b5862f;vertical-align:middle;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><path d="M6 2h12M6 22h12M6 2c0 5 4 6 6 8 2-2 6-3 6-8M6 22c0-5 4-6 6-8 2 2 6 3 6 8"/></svg> Request to schedule</span>':'')+
            (isResched(w)?'<span style="display:inline-block;margin-left:8px;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:10px;background:#3a1d1d;color:#f0a9a9;border:1px solid #a85a5a;vertical-align:middle;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> Reschedule requested</span>':'')+'</div>'+
            (isResched(w)&&w.reschedule_note?'<div class="meta" style="color:#f0a9a9;">↳ '+esc(w.reschedule_note)+'</div>':'')+
          '<div class="meta">'+cust+(sub?' — '+sub:'')+'</div>'+
          (w.customer_address?'<div class="meta">'+mapsLink(w.customer_address)+'</div>':'')+
          '<div class="amt">$'+money(w.total!=null?w.total:w.amount)+(w.addendum_total>0?' <span style="color:#9aa3b5;font-weight:400;">(base $'+money(w.amount)+' + add-ons $'+money(w.addendum_total)+')</span>':'')+'</div>'+
          '<div class="prog">'+
            '<div class="pbar" title="Build-out checklist '+(w.checklist_progress||0)+'% complete"><div class="pbar-fill'+((w.checklist_progress||0)>=100?' done':'')+'" style="width:'+(w.checklist_progress||0)+'%;"></div></div>'+
            '<span class="ptxt">'+(w.checklist_progress||0)+'% · QC: <span style="font-weight:700;color:'+(w.qc_status==='Passed'?'#8fd6b3':w.qc_status==='Failed'?'#e0a9a9':'#9aa3b5')+';">'+esc(w.qc_status||'Pending')+'</span></span>'+
          '</div>'+
        '</div>'+
        '<div class="ctrls">'+
          '<select title="Technician" onchange="assignTech('+w.id+',this.value)">'+techOptions(w.technician_id)+'</select>'+
          '<input class="minput" type="date" value="'+(w.scheduled_date||'')+'" title="Scheduled date" onchange="scheduleWO('+w.id+',this.value)">'+
          '<input class="minput" style="width:78px;" placeholder="9–12" value="'+esc(w.time_window||'')+'" title="Time window" onchange="setWoField('+w.id+',\'time_window\',this.value)">'+
          '<select title="Status" onchange="setWoStatus('+w.id+',this.value)">'+WO_STATUSES.map(s=>'<option'+(w.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select>'+
          '<button class="iconbtn edit" onclick="openWODetail('+w.id+')">Details</button>'+
          '<button class="iconbtn del" onclick="delWO('+w.id+',\''+esc(w.title||cust).replace(/\x27/g,"\\x27")+'\')">×</button>'+
        '</div>'+
      '</div>'+
      '<div class="notes"><textarea placeholder="Dispatch notes — gate code, parking, contact on site…" onchange="setWoField('+w.id+',\'notes\',this.value)">'+esc(w.notes||'')+'</textarea></div>'+
    '</div>';
  }).join('');
}

// ── Work order detail: build-out checklist · addendums · QC ────────────────
let openWO = null;
function woById(id){ return workOrders.find(w=>w.id===id); }
window.openWODetail = function(id){ openWO = id; renderWODetail(); };
window.closeWODetail = function(){ openWO = null; document.getElementById('wo-modal')?.remove(); loadAll(); };

function renderWODetail(){
  document.getElementById('wo-modal')?.remove();
  const w = woById(openWO); if(!w) return;
  const cl = w.checklist||[], ad = w.addendums||[];
  const addTotal = ad.reduce((s,a)=>s+(Number(a.qty||1)*Number(a.amount||0)),0);
  const total = (Number(w.amount)||0)+addTotal;
  const done = cl.filter(i=>i.done).length;
  const prog = cl.length? Math.round(done/cl.length*100):0;
  const qcColor = s => s==='Passed'?'#1f6b4f':s==='Failed'?'#7a2f33':'#C9A96E';
  const m=document.createElement('div'); m.id='wo-modal';
  m.style.cssText='position:fixed;inset:0;background:rgba(11,15,26,.78);z-index:10000;display:flex;align-items:flex-start;justify-content:center;padding:30px 18px;overflow-y:auto;';
  m.innerHTML=
   '<div style="background:#121726;border:2px solid #C9A96E;border-radius:14px;max-width:640px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.5);">'+
     '<div style="background:#0B0F1A;color:#C9A96E;padding:14px 18px;font-weight:800;letter-spacing:.04em;display:flex;justify-content:space-between;align-items:center;">'+
       '<span>#'+esc(woNum(w))+' · '+esc(w.title||'Work Order')+'</span>'+
       '<button onclick="closeWODetail()" style="background:none;border:none;color:#C9A96E;font-size:22px;cursor:pointer;line-height:1;">×</button>'+
     '</div>'+
     '<div style="padding:18px;">'+
       '<div style="font-size:12px;color:#9aa3b5;margin-bottom:16px;">'+esc(w.customer_business||w.customer_name||'')+(w.proposal_num?' · '+esc(w.proposal_num):'')+' · <span style="color:#C9A96E;font-weight:700;">$'+money(total)+'</span>'+(addTotal>0?' <span style="color:#7e879a;">(base $'+money(w.amount)+' + add-ons $'+money(addTotal)+')</span>':'')+'</div>'+
       '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#7FA98C;font-weight:700;margin-bottom:6px;">Build-out Checklist · '+prog+'%</div>'+
       '<div style="height:6px;background:#0B0F1A;border-radius:4px;overflow:hidden;margin-bottom:10px;"><div style="height:100%;width:'+prog+'%;background:#7FA98C;transition:width .2s;"></div></div>'+
       '<div style="display:flex;flex-direction:column;gap:2px;margin-bottom:20px;">'+
         cl.map((it,i)=>'<label style="display:flex;align-items:center;gap:9px;font-size:13px;color:'+(it.done?'#8fd6b3':'#cfd5e0')+';cursor:pointer;padding:4px 0;"><input type="checkbox" '+(it.done?'checked':'')+' onchange="toggleCheck('+i+')" style="width:16px;height:16px;accent-color:#7FA98C;cursor:pointer;"> '+esc(it.label)+'</label>').join('')+
         (cl.length?'':'<div style="font-size:12px;color:#7e879a;">No checklist on this work order.</div>')+
       '</div>'+
       '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A96E;font-weight:700;margin-bottom:8px;">On-Site Addendums <span style="font-weight:400;color:#7e879a;text-transform:none;letter-spacing:0;">— extra scope, added to total</span></div>'+
       '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">'+
         ad.map((a,i)=>'<div style="display:flex;align-items:center;gap:8px;background:#1a1f2e;border:1px solid #2a3247;border-radius:7px;padding:7px 10px;font-size:12px;"><span style="flex:1;color:#e8eaf0;">'+esc(a.desc)+' <span style="color:#9aa3b5;">× '+(a.qty||1)+'</span></span><span style="color:#C9A96E;font-weight:700;">+$'+money((a.qty||1)*(a.amount||0))+'</span><button onclick="removeAddendum('+i+')" style="background:none;border:none;color:#d98a8e;cursor:pointer;font-size:15px;line-height:1;">×</button></div>').join('')+
       '</div>'+
       '<div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;">'+
         '<input id="wo-add-desc" placeholder="Added scope (e.g. extra camera, more cable)" style="flex:1;min-width:160px;background:#0B0F1A;border:1px solid #2a3247;color:#fff;border-radius:7px;padding:8px;font-size:12px;outline:none;">'+
         '<input id="wo-add-qty" type="number" value="1" min="1" title="Qty" style="width:54px;background:#0B0F1A;border:1px solid #2a3247;color:#fff;border-radius:7px;padding:8px;font-size:12px;outline:none;">'+
         '<input id="wo-add-amt" type="number" placeholder="$ ea" min="0" title="Unit price" style="width:78px;background:#0B0F1A;border:1px solid #2a3247;color:#fff;border-radius:7px;padding:8px;font-size:12px;outline:none;">'+
         '<button class="btn" onclick="addAddendum()">+ Add</button>'+
       '</div>'+
       '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A96E;font-weight:700;margin-bottom:8px;">Quality Control</div>'+
       '<div style="display:flex;gap:6px;margin-bottom:8px;">'+
         ['Pending','Passed','Failed'].map(s=>'<button onclick="setQC(\''+s+'\')" style="flex:1;padding:9px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;border:1px solid '+(w.qc_status===s?qcColor(s):'#2a3247')+';background:'+(w.qc_status===s?qcColor(s):'transparent')+';color:'+(w.qc_status===s?'#fff':'#aab2c4')+';">'+s+'</button>').join('')+
       '</div>'+
       '<textarea id="wo-qc-notes" placeholder="Punch-list items / QC notes…" onchange="setQCNotes(this.value)" style="width:100%;background:#0B0F1A;border:1px solid #2a3247;color:#cfd5e0;border-radius:8px;padding:9px;font-size:12px;min-height:52px;resize:vertical;outline:none;font-family:inherit;">'+esc(w.qc_notes||'')+'</textarea>'+
       '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A96E;font-weight:700;margin:20px 0 8px;">Follow-up Reminder</div>'+
       '<div style="display:flex;gap:8px;flex-wrap:wrap;">'+
         '<input type="date" id="wo-fu-date" value="'+(w.follow_up_date||'')+'" onchange="setFollowDate(this.value)" style="background:#0B0F1A;border:1px solid #2a3247;color:#fff;border-radius:7px;padding:8px;font-size:12px;outline:none;">'+
         '<input id="wo-fu-note" placeholder="Reminder note (e.g. call to confirm install)" value="'+esc(w.follow_up_note||'')+'" onchange="setFollowNote(this.value)" style="flex:1;min-width:160px;background:#0B0F1A;border:1px solid #2a3247;color:#fff;border-radius:7px;padding:8px;font-size:12px;outline:none;">'+
         (w.follow_up_date?'<button class="iconbtn del" onclick="clearFollow()">Clear</button>':'')+
       '</div>'+
       (w.follow_up_date?'<div style="font-size:11px;color:#9aa3b5;margin-top:6px;">Shows on the Dashboard under Follow-ups.</div>':'')+
       '<button class="btn" style="width:100%;margin-top:18px;" onclick="closeWODetail()">Done</button>'+
     '</div>'+
   '</div>';
  m.onclick=function(e){ if(e.target===m) closeWODetail(); };
  document.body.appendChild(m);
}
window.toggleCheck = async function(i){ const w=woById(openWO); if(!w)return; w.checklist[i].done=!w.checklist[i].done; await patchWO(w.id,{checklist:w.checklist}); renderWODetail(); };
window.addAddendum = async function(){ const w=woById(openWO); if(!w)return; const desc=document.getElementById('wo-add-desc').value.trim(); if(!desc){toast('Enter a description');return;} const qty=Math.max(1,+document.getElementById('wo-add-qty').value||1); const amt=+document.getElementById('wo-add-amt').value||0; w.addendums=w.addendums||[]; w.addendums.push({desc,qty,amount:amt}); await patchWO(w.id,{addendums:w.addendums}); toast('Addendum added'); renderWODetail(); };
window.removeAddendum = async function(i){ const w=woById(openWO); if(!w)return; w.addendums.splice(i,1); await patchWO(w.id,{addendums:w.addendums}); renderWODetail(); };
window.setQC = async function(s){ const w=woById(openWO); if(!w)return; w.qc_status=s; await patchWO(w.id,{qc_status:s}); toast('QC → '+s); renderWODetail(); };
window.setQCNotes = async function(v){ const w=woById(openWO); if(!w)return; w.qc_notes=v; await patchWO(w.id,{qc_notes:v}); };
window.setFollowDate = async function(v){ const w=woById(openWO); if(!w)return; w.follow_up_date=v; await patchWO(w.id,{follow_up_date:v}); toast(v?'Follow-up set':'Follow-up cleared'); };
window.setFollowNote = async function(v){ const w=woById(openWO); if(!w)return; w.follow_up_note=v; await patchWO(w.id,{follow_up_note:v}); };
window.clearFollow = async function(){ const w=woById(openWO); if(!w)return; w.follow_up_date=''; w.follow_up_note=''; await patchWO(w.id,{follow_up_date:'',follow_up_note:''}); toast('Follow-up cleared'); renderWODetail(); };

// ── Load + live refresh ───────────────────────────────────────────────────
let _sig='';
function sig(){ return JSON.stringify([techs.map(t=>[t.id,t.name,t.phone,t.email,t.skills,t.active]), workOrders.map(w=>[w.id,w.title,w.technician_id,w.status,w.scheduled_date,w.time_window,w.amount,w.notes,w.customer_business,w.customer_name])]); }
async function loadAll(){
  techs = await (await fetch('/api/technicians')).json();
  workOrders = (await (await fetch('/api/workorders')).json()).workOrders || [];
  _sig=sig();
  renderTechs(); renderStats(); renderWOs(); loadLogins();
}

// ── Team logins (admin only) ──────────────────────────────────────────────
let users=[];
function isAdmin(){ return window.IOT_USER && window.IOT_USER.role==='admin'; }
async function loadLogins(){
  if(!isAdmin()){ document.getElementById('loginsHead').style.display='none'; document.getElementById('loginsArea').style.display='none'; return; }
  document.getElementById('loginsHead').style.display=''; document.getElementById('loginsArea').style.display='';
  try{ users = (await (await fetch('/api/users')).json()).users || []; }catch(e){ users=[]; }
  const sel=document.getElementById('lg-tech');
  sel.innerHTML='<option value="">— link technician (optional) —</option>'+techs.map(t=>'<option value="'+t.id+'">'+esc(t.name)+'</option>').join('');
  renderLogins();
}
function renderLogins(){
  const host=document.getElementById('loginlist');
  if(!users.length){ host.innerHTML='<div class="empty" style="grid-column:1/-1;">No logins yet. Create one above.</div>'; return; }
  host.innerHTML=users.map(u=>''+
    '<div class="tcard'+(u.active?'':' off')+'" style="border-left-color:'+(u.role==='admin'?'var(--admin)':'var(--tech)')+';">'+
      '<div class="tn">'+esc(u.name||u.username)+' <span style="font-size:11px;color:'+(u.role==='admin'?'#d9b48c':'#a7d3b5')+';">'+(u.role==='admin'?'Admin':'Tech')+'</span></div>'+
      '<div class="td">@'+esc(u.username)+(u.email?' · '+esc(u.email):'')+(u.technician_id?' · linked':'')+'</div>'+
      (u.email?'<div class="td" style="color:#a7d3b5;font-size:10.5px;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.125em"><polyline points="20 6 9 17 4 12"/></svg> Google sign-in enabled</div>':'')+
      '<div class="trow">'+
        '<button class="iconbtn" onclick="resetLogin('+u.id+',\''+esc(u.username).replace(/\x27/g,"\\x27")+'\')">Reset password</button>'+
        '<button class="iconbtn del" style="margin-left:auto;" onclick="delLogin('+u.id+',\''+esc(u.username).replace(/\x27/g,"\\x27")+'\')">×</button>'+
      '</div>'+
    '</div>').join('');
}
window.addLogin=async function(){
  const username=document.getElementById('lg-user').value.trim();
  const password=document.getElementById('lg-pass').value;
  const email=document.getElementById('lg-email').value.trim();
  if(!username){ toast('Username required'); return; }
  if(!email && password.length<6){ toast('Set a 6+ char password or a Google email'); return; }
  const body={ username, password, email, role:document.getElementById('lg-role').value, name:document.getElementById('lg-name').value.trim(), technician_id:document.getElementById('lg-tech').value||null };
  const r=await (await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
  if(r.ok){ ['lg-name','lg-user','lg-pass','lg-email'].forEach(id=>document.getElementById(id).value=''); toast('Login created'); loadLogins(); }
  else toast(r.error||'Failed');
};
window.resetLogin=async function(id,username){ const p=prompt('New password for "'+username+'" (6+ chars):'); if(!p)return; if(p.length<6){toast('Too short');return;} await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,password:p,active:1,role:(users.find(u=>u.id===id)||{}).role,name:(users.find(u=>u.id===id)||{}).name})}); toast('Password reset'); };
window.delLogin=async function(id,username){ if(!confirm('Remove login "'+username+'"?'))return; const r=await (await fetch('/api/users/'+id,{method:'DELETE'})).json(); if(r.ok){ toast('Removed'); loadLogins(); } else toast(r.error||'Failed'); };
async function poll(){
  if(openWO) return;  // don't refresh under the open detail modal
  let t,w;
  try{ t=await (await fetch('/api/technicians')).json(); w=(await (await fetch('/api/workorders')).json()).workOrders||[]; }catch(e){ return; }
  const prevTechs=techs, prevWO=workOrders; techs=t; workOrders=w;
  const ns=sig();
  if(ns===_sig){ techs=prevTechs; workOrders=prevWO; return; }
  _sig=ns;
  const ae=document.activeElement;
  const editing = ae && ae.closest && (ae.closest('.wo')||ae.closest('.tcard')||ae.closest('.techbar'));
  renderStats();
  if(!editing){ renderTechs(); renderWOs(); }
}
setInterval(poll, 3500);
window.addEventListener('focus', poll);
document.addEventListener('visibilitychange', function(){ if(!document.hidden) poll(); });

loadAll();
document.addEventListener('iot-auth', loadLogins);   // refresh logins panel once role is known
</script>
</body>
</html>
