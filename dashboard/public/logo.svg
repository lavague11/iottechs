<svg viewBox="0 0 742 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IOT TECHS — Make Tomorrow Safer Today">
  <!-- IOT TECHS wordmark — squared, segment-gapped letterforms on a 100-unit cap grid.
