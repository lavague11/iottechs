    <rect x="0" y="0" width="22" height="100" rx="11" />
    <!-- O -->
    <rect x="49" y="11" width="62" height="78" rx="26" fill="none" stroke="#111111" stroke-width="22" />
    <!-- T -->
    <g transform="translate(138)">
      <rect x="0" y="0" width="84" height="22" rx="11" />
